<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ironwood Solutions — ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e13;--bg2:#111520;--bg3:#171d2b;--bg4:#1e2638;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --amber:#c47b2b;--amber2:#e8a24a;--amber3:#f5d9a8;
  --cream:#f0e8d8;--mist:#6b7a99;--muted:#3d4a63;
  --green:#2d6a4f;--green2:#52b788;--green3:#d8f3dc;
  --red:#9b2226;--red2:#e63946;--red3:#ffd6d8;
  --blue:#1d3557;--blue2:#457b9d;--blue3:#cce5f5;
  --purple:#4a1942;--purple2:#9b5de5;--purple3:#ede0ff;
  --gold:#c9a84c;--gold2:#f0d080;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --radius:10px;
}
html{height:100%}
body{background:var(--bg);color:var(--cream);font-family:'Outfit',sans-serif;height:100%;display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--muted);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--amber)}
button{cursor:pointer}
input,select,textarea{font-family:'Outfit',sans-serif}
a{color:var(--amber);text-decoration:none}
a:hover{text-decoration:underline}

.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.logo-mark{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.08em;color:var(--amber2);line-height:1;display:block}
.logo-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--mist);letter-spacing:0.18em;text-transform:uppercase;margin-top:2px}
.sidebar-nav{padding:12px 8px;flex:1}
.nav-section{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.16em;padding:12px 8px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;cursor:pointer;transition:all 0.18s;border:none;background:none;color:var(--mist);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,0.05);color:var(--cream)}
.nav-item.active{background:rgba(196,123,43,0.15);color:var(--amber2)}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--amber);color:var(--bg);font-family:'DM Mono',monospace;font-size:9px;padding:2px 6px;border-radius:8px;font-weight:700}
.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.sync-status{display:flex;align-items:center;gap:7px;padding:8px 10px;background:var(--bg3);border-radius:6px;margin-bottom:6px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:all 0.3s}
.sync-dot.live{background:var(--green2);box-shadow:0 0 6px var(--green2)}
.sync-dot.syncing{background:var(--amber2);animation:pulse 1s infinite}
.sync-dot.error{background:var(--red2)}
.sync-text{font-family:'DM Mono',monospace;font-size:10px;color:var(--mist)}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.06em;color:var(--cream)}
.topbar-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.content{flex:1;overflow-y:auto;padding:24px}

.btn{border:none;border-radius:6px;padding:8px 16px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;transition:all 0.18s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--amber);color:var(--bg)}
.btn-primary:hover{background:var(--amber2);transform:translateY(-1px)}
.btn-ghost{background:rgba(255,255,255,0.06);color:var(--mist);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border2);color:var(--cream)}
.btn-danger{background:rgba(230,57,70,0.12);color:var(--red2);border:1px solid rgba(230,57,70,0.25)}
.btn-danger:hover{background:rgba(230,57,70,0.2)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card-title{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--mist);margin-bottom:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi-amber::before{background:var(--amber)}
.kpi-green::before{background:var(--green2)}
.kpi-blue::before{background:var(--blue2)}
.kpi-purple::before{background:var(--purple2)}
.kpi-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--mist);margin-bottom:8px}
.kpi-value{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:0.04em;color:var(--cream);line-height:1}
.kpi-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--mist);margin-top:4px}

.badge{font-family:'DM Mono',monospace;font-size:10px;padding:3px 8px;border-radius:3px;white-space:nowrap;display:inline-block}
.badge-watching{background:rgba(69,123,157,0.12);color:var(--blue2);border:1px solid rgba(69,123,157,0.25)}
.badge-quoting{background:rgba(196,123,43,0.12);color:var(--amber2);border:1px solid rgba(196,123,43,0.25)}
.badge-submitted{background:rgba(155,93,229,0.12);color:var(--purple2);border:1px solid rgba(155,93,229,0.25)}
.badge-won{background:rgba(82,183,136,0.15);color:var(--green2);border:1px solid rgba(82,183,136,0.3)}
.badge-loss{background:rgba(107,122,153,0.12);color:var(--mist);border:1px solid rgba(107,122,153,0.2)}
.badge-won{background:rgba(82,183,136,0.15);color:var(--green2);border:1px solid rgba(82,183,136,0.3)}
.badge-lost{background:rgba(230,57,70,0.1);color:var(--red2);border:1px solid rgba(230,57,70,0.2)}
.badge-active{background:rgba(82,183,136,0.1);color:var(--green2);border:1px solid rgba(82,183,136,0.25)}
.badge-inactive{background:rgba(107,122,153,0.1);color:var(--mist);border:1px solid rgba(107,122,153,0.2)}
.badge-sources{background:rgba(82,183,136,0.1);color:var(--green2);border:1px solid rgba(82,183,136,0.25)}
.badge-presol{background:rgba(196,123,43,0.1);color:var(--amber2);border:1px solid rgba(196,123,43,0.25)}
.badge-rfp{background:rgba(230,57,70,0.08);color:var(--red2);border:1px solid rgba(230,57,70,0.2)}
.badge-award{background:rgba(107,122,153,0.1);color:var(--mist);border:1px solid rgba(107,122,153,0.2)}
.badge-default{background:rgba(107,122,153,0.08);color:var(--mist);border:1px solid rgba(107,122,153,0.15)}

.form-group{margin-bottom:14px}
.form-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--amber);margin-bottom:6px;display:block}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--cream);font-family:'Outfit',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--amber)}
.form-input::placeholder,.form-textarea::placeholder{color:var(--muted)}
.form-select option{background:var(--bg3)}
.form-textarea{resize:vertical;min-height:80px;line-height:1.5}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

.table{width:100%;border-collapse:collapse}
.table th{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--mist);padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;font-weight:400}
.table td{padding:11px 12px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;vertical-align:middle}
.table tr:hover td{background:rgba(255,255,255,0.02)}
.table tr:last-child td{border-bottom:none}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:0.05em;color:var(--cream)}
.divider{height:1px;background:var(--border);margin:20px 0}
.mono{font-family:'DM Mono',monospace}
.muted{color:var(--mist)}
.amber{color:var(--amber2)}
.green{color:var(--green2)}
.red{color:var(--red2)}

.spinner{width:28px;height:28px;border:2px solid rgba(196,123,43,0.2);border-top-color:var(--amber);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.25s ease both}

.empty-state{text-align:center;padding:60px 20px;color:var(--mist)}
.empty-icon{font-size:40px;margin-bottom:12px;display:block;opacity:0.5}
.empty-title{font-size:16px;font-weight:600;color:var(--cream);margin-bottom:6px;opacity:0.7}
.empty-sub{font-size:13px;line-height:1.6}

.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);color:var(--cream);padding:11px 18px;border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;border-left:3px solid var(--amber);z-index:9999;transform:translateY(60px);opacity:0;transition:all 0.3s;pointer-events:none;box-shadow:var(--shadow)}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{border-left-color:var(--red2)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.05em;color:var(--cream)}
.modal-close{background:none;border:none;color:var(--mist);font-size:20px;cursor:pointer;padding:2px 6px;border-radius:4px;transition:color 0.15s}
.modal-close:hover{color:var(--cream)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* SEARCH */
.search-hero-inner{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.ai-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--amber);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.ai-badge{background:rgba(196,123,43,0.15);border:1px solid rgba(196,123,43,0.3);border-radius:3px;padding:2px 6px;font-size:9px;color:var(--amber2)}
.search-row{display:flex;gap:8px}
.search-ta{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:12px 14px;color:var(--cream);font-size:14px;outline:none;resize:none;min-height:48px;max-height:100px;transition:border-color 0.2s;font-family:'Outfit',sans-serif}
.search-ta:focus{border-color:var(--amber)}
.search-ta::placeholder{color:var(--muted);font-style:italic}
.chip{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:4px 11px;font-family:'DM Mono',monospace;font-size:10px;color:var(--mist);cursor:pointer;transition:all 0.18s}
.chip:hover{border-color:var(--amber);color:var(--amber2)}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-sel{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--cream);font-family:'DM Mono',monospace;font-size:11px;outline:none;cursor:pointer}
.filter-sel:focus{border-color:var(--amber)}
.opp-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;transition:all 0.18s;position:relative;overflow:hidden;margin-bottom:10px}
.opp-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--bg4);transition:background 0.2s}
.opp-card:hover{border-color:var(--border2)}
.opp-card:hover::before{background:var(--amber)}
.opp-card.tagged-watching::before{background:var(--blue2)}
.opp-card.tagged-quoting::before{background:var(--amber2)}
.opp-card.tagged-submitted::before{background:var(--purple2)}
.opp-card.tagged-won::before{background:var(--green2)}
.opp-card.tagged-loss::before{background:var(--muted)}
.opp-title{font-size:14px;font-weight:600;color:var(--cream);line-height:1.4;margin-bottom:8px;flex:1}
.opp-meta{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px}
.meta-k{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em}
.meta-v{font-family:'DM Mono',monospace;font-size:11px;color:var(--mist)}
.ai-sum{background:rgba(196,123,43,0.05);border-left:2px solid var(--amber);padding:8px 12px;border-radius:0 5px 5px 0;font-size:12px;color:var(--mist);line-height:1.5;font-style:italic;margin:8px 0}
.ai-sum-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--amber);text-transform:uppercase;letter-spacing:0.12em;font-style:normal;margin-bottom:3px}
.opp-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.05);flex-wrap:wrap;gap:8px}
.tag-sel{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:4px 8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--cream);cursor:pointer;outline:none}
.tag-sel:focus{border-color:var(--amber)}

/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;min-width:1100px}
.lane{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius);padding:14px;min-height:300px}
.lane-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.lane-title{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.14em}
.lane-watching .lane-title{color:var(--blue2)}
.lane-quoting .lane-title{color:var(--amber2)}
.lane-submitted .lane-title{color:var(--purple2)}
.lane-won .lane-title{color:var(--green2)}
.lane-loss .lane-title{color:var(--mist)}
.lane-count{font-family:'DM Mono',monospace;font-size:10px;background:rgba(255,255,255,0.06);border-radius:8px;padding:2px 7px;color:var(--mist)}
.pipe-card{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:12px 13px;margin-bottom:8px;cursor:grab;transition:all 0.18s;position:relative;overflow:hidden}
.pipe-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.lane-watching .pipe-card::before{background:var(--blue2)}
.lane-quoting .pipe-card::before{background:var(--amber2)}
.lane-submitted .pipe-card::before{background:var(--purple2)}
.lane-won .pipe-card::before{background:var(--green2)}
.lane-loss .pipe-card::before{background:var(--muted)}
.pipe-card:hover{border-color:var(--border2);box-shadow:0 4px 16px rgba(0,0,0,0.3)}
.pipe-card:active{cursor:grabbing}
.pipe-title{font-size:12px;font-weight:600;color:var(--cream);line-height:1.4;margin-bottom:7px}
.pipe-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--mist);margin-bottom:3px}
.pipe-actions{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.05)}
.move-sel{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-family:'DM Mono',monospace;font-size:10px;color:var(--mist);cursor:pointer;outline:none}
.rm-btn{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:2px 4px;border-radius:3px;transition:color 0.15s}
.rm-btn:hover{color:var(--red2)}
.empty-lane{text-align:center;padding:24px 10px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);border:1px dashed rgba(255,255,255,0.06);border-radius:6px}
.kanban-wrap{overflow-x:auto;padding-bottom:8px}

/* SUBS */
.sub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.sub-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:all 0.18s}
.sub-card:hover{border-color:var(--border2)}
.sub-name{font-size:15px;font-weight:700;color:var(--cream);margin-bottom:4px}
.sub-trade{font-family:'DM Mono',monospace;font-size:10px;color:var(--amber2);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px}
.sub-detail{font-family:'DM Mono',monospace;font-size:11px;color:var(--mist);margin-bottom:3px}
.sub-detail span{color:var(--cream)}
.star{color:var(--amber);font-size:12px}
.star.empty{color:var(--muted)}

/* FINANCIALS */
.fin-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.fin-row:last-child{border-bottom:none}
.fin-label{font-size:13px;color:var(--cream)}
.fin-amount{font-family:'DM Mono',monospace;font-size:13px;font-weight:600}
.fin-positive{color:var(--green2)}
.fin-negative{color:var(--red2)}
.fin-neutral{color:var(--mist)}
.inv-status{display:inline-block;padding:3px 8px;border-radius:3px;font-family:'DM Mono',monospace;font-size:10px}
.inv-paid{background:rgba(82,183,136,0.12);color:var(--green2);border:1px solid rgba(82,183,136,0.25)}
.inv-pending{background:rgba(196,123,43,0.1);color:var(--amber2);border:1px solid rgba(196,123,43,0.25)}
.inv-overdue{background:rgba(230,57,70,0.1);color:var(--red2);border:1px solid rgba(230,57,70,0.2)}
.margin-bar{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-top:6px}
.margin-fill{height:100%;background:linear-gradient(90deg,var(--red2),var(--amber),var(--green2));border-radius:4px;transition:width 0.4s}

/* ACTIVITY */
.activity-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.activity-text{font-size:13px;color:var(--cream);line-height:1.4}
.activity-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--mist);margin-top:2px}
.deadline-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.deadline-item:last-child{border-bottom:none}
.deadline-name{font-size:13px;color:var(--cream);flex:1;padding-right:12px}
.deadline-days{font-family:'DM Mono',monospace;font-size:11px;padding:3px 8px;border-radius:4px}
.deadline-urgent{background:rgba(230,57,70,0.12);color:var(--red2)}
.deadline-soon{background:rgba(196,123,43,0.12);color:var(--amber2)}
.deadline-ok{background:rgba(82,183,136,0.1);color:var(--green2)}





/* SUB PAYMENTS */
.subpay-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:10px;transition:all 0.18s;position:relative;overflow:hidden}
.subpay-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}

<script>
// ══ CONFIG ════════════════════════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbwnrsvF9lfuVYEt87iyRoLo-kjMP7y4GN_imN1V2dmh1JyMOY-gZddx0_1bWP2cAwaMDA/exec';
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1WkRuNrJNVsX6dfqol55WntASmrgqAXaB_FsGriZyCZ8/edit';
const SECRET = 'ironwood2024erp';
const SAM_KEY_STORE = 'iw_sam_key';

// ══ STATE ═════════════════════════════════════════════════════════════════════
const S = {
  pipeline: {},
  subs: [],
  quotes: [],
  invoices: [],
  agencies: [],
  winloss: [],
  activity: [],
  subAssignments: [],
  contracts: [],
  govPayments: [],
  subPayments: [],
  settings: { company: 'Ironwood Solutions', margin: 15, samKey: '' }
};

let currentView = 'dashboard';
let searchOffset = 0, searchTotal = 0, searchLimit = 25;
let lastKeywords = '';
let dragPid = null;
let syncing = false;

const TAG_LABELS = { watching:'Watching', quoting:'Quoting', submitted:'Bid Submitted', won:'Contract Won', loss:'Loss / Pass' };
const NOTICE_LABELS = { o:'Sources Sought', p:'Pre-Solicitation', k:'Combined Synopsis', r:'RFP', a:'Award', s:'Special' };
const NOTICE_BADGE  = { o:'badge-sources', p:'badge-presol', k:'badge-presol', r:'badge-rfp', a:'badge-award' };
const TABS = ['Pipeline','Subcontractors','Quotes','Invoices','Agencies','WinLoss','Activity','Settings','SubAssignments','Contracts','GovPayments','SubPayments'];





// SubPayments serialization
function subPaymentsToRows() {
  const rows = [['payId','contractId','subName','description','dueDate','paidDate','amount','status','govPayId','notes']];
  S.subPayments.forEach(p => rows.push([
    p.payId||'', p.contractId||'', p.subName||'', p.description||'',
    p.dueDate||'', p.paidDate||'', p.amount||0,
    p.status||'pending', p.govPayId||'', p.notes||''
  ]));
  return rows;
}
function rowsToSubPayments(rows) {
  return rows.slice(1).filter(r=>r[0]).map(r=>({
    payId:r[0], contractId:r[1], subName:r[2], description:r[3],
    dueDate:r[4], paidDate:r[5], amount:parseFloat(r[6])||0,
    status:r[7]||'pending', govPayId:r[8]||'', notes:r[9]||''
  }));
}

// GovPayments serialization
function govPaymentsToRows() {
  const rows = [['payId','contractId','description','scheduledDate','receivedDate','amount','status','notes']];
  S.govPayments.forEach(p => rows.push([
    p.payId||'', p.contractId||'', p.description||'',
    p.scheduledDate||'', p.receivedDate||'',
    p.amount||0, p.status||'scheduled', p.notes||''
  ]));
  return rows;
}
function rowsToGovPayments(rows) {
  return rows.slice(1).filter(r=>r[0]).map(r=>({
    payId:r[0], contractId:r[1], description:r[2],
    scheduledDate:r[3], receivedDate:r[4],
    amount:parseFloat(r[5])||0, status:r[6]||'scheduled', notes:r[7]||''
  }));
}

// Contracts serialization
function contractsToRows() {
  const rows = [['contractId','oppId','title','agency','contractNum','poNum','totalValue','startDate','endDate','status','paymentCadence','paymentAmount','paymentDay','netTermsGov','netTermsSub','retainage','notes']];
  S.contracts.forEach(c => rows.push([
    c.contractId||'', c.oppId||'', c.title||'', c.agency||'',
    c.contractNum||'', c.poNum||'', c.totalValue||0,
    c.startDate||'', c.endDate||'', c.status||'active',
    c.paymentCadence||'monthly', c.paymentAmount||0, c.paymentDay||1,
    c.netTermsGov||30, c.netTermsSub||30, c.retainage||0, c.notes||''
  ]));
  return rows;
}
function rowsToContracts(rows) {
  return rows.slice(1).filter(r=>r[0]).map(r=>({
    contractId:r[0], oppId:r[1], title:r[2], agency:r[3],
    contractNum:r[4], poNum:r[5], totalValue:parseFloat(r[6])||0,
    startDate:r[7], endDate:r[8], status:r[9],
    paymentCadence:r[10], paymentAmount:parseFloat(r[11])||0,
    paymentDay:parseInt(r[12])||1, netTermsGov:parseInt(r[13])||30,
    netTermsSub:parseInt(r[14])||30, retainage:parseFloat(r[15])||0, notes:r[16]||''
  }));
}

// SubAssignments serialization
function subAssignmentsToRows() {
  const rows = [['assignId','oppId','contractId','subName','scope','quotedAmount','status','notes']];
  S.subAssignments.forEach(a => rows.push([a.assignId||'',a.oppId||'',a.contractId||'',a.subName||'',a.scope||'',a.quotedAmount||0,a.status||'proposed',a.notes||'']));
  return rows;
}
function rowsToSubAssignments(rows) {
  return rows.slice(1).filter(r=>r[0]).map(r=>({assignId:r[0],oppId:r[1],contractId:r[2],subName:r[3],scope:r[4],quotedAmount:parseFloat(r[5])||0,status:r[6],notes:r[7]}));
}

// ══ GOOGLE SHEETS SYNC ════════════════════════════════════════════════════════
function setSyncStatus(state, msg) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  dot.className = 'sync-dot';
  if (state === 'live') { dot.classList.add('live'); txt.textContent = msg || 'Synced'; }
  else if (state === 'syncing') { dot.classList.add('syncing'); txt.textContent = msg || 'Syncing…'; }
  else if (state === 'error') { dot.classList.add('error'); txt.textContent = msg || 'Sync error'; }
  else { txt.textContent = msg || 'Not synced'; }
}

async function sheetRead(tab) {
  const url = `${API_URL}?token=${SECRET}&action=read&tab=${tab}&sheetUrl=${encodeURIComponent(SHEET_URL)}`;
  const res = await fetch(url);
  const d = await res.json();
  if (d.error) throw new Error(d.error);
  return d.data || [];
}

async function sheetWrite(tab, rows) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: SECRET, action: 'write', tab, sheetUrl: SHEET_URL, rows })
  });
  const d = await res.json();
  if (d.error) throw new Error(d.error);
  return true;
}

// Serialize/deserialize each module to/from sheet rows
function pipelineToRows() {
  const rows = [['pid','tag','title','agency','naics','solNum','deadline','url','notes','solNum2','finalBid','prevContractValue','prevContractSource']];
  Object.entries(S.pipeline).forEach(([pid, p]) => rows.push([
    pid, p.tag||'', p.title||'', p.agency||'', p.naics||'',
    p.solNum||'', p.deadline||'', p.url||'', p.notes||'',
    p.solNum||'', p.finalBid||0, p.prevContractValue||0, p.prevContractSource||''
  ]));
  return rows;
}
function rowsToPipeline(rows) {
  const p = {};
  rows.slice(1).forEach(r => {
    if (r[0]) p[r[0]] = {
      tag:r[1], title:r[2], agency:r[3], naics:r[4],
      solNum:r[5], deadline:r[6], url:r[7],
      notes:r[8]||'', finalBid:parseFloat(r[10])||0,
      prevContractValue:parseFloat(r[11])||0, prevContractSource:r[12]||''
    };
  });
  return p;
}
function subsToRows() {
  const rows = [['name','trade','phone','email','naics','samStatus','insExpiry','status','rating','notes']];
  S.subs.forEach(s => rows.push([s.name||'',s.trade||'',s.phone||'',s.email||'',s.naics||'',s.samStatus||'',s.insExpiry||'',s.status||'active',s.rating||0,s.notes||'']));
  return rows;
}
function rowsToSubs(rows) { return rows.slice(1).filter(r=>r[0]).map(r=>({name:r[0],trade:r[1],phone:r[2],email:r[3],naics:r[4],samStatus:r[5],insExpiry:r[6],status:r[7],rating:parseInt(r[8])||0,notes:r[9]})); }
function quotesToRows() {
  const rows = [['name','opportunity','marginPct','created','lines']];
  S.quotes.forEach(q => rows.push([q.name||'',q.opportunity||'',q.marginPct||15,q.created||'',JSON.stringify(q.lines||[])]));
  return rows;
}
function rowsToQuotes(rows) { return rows.slice(1).filter(r=>r[0]).map(r=>({name:r[0],opportunity:r[1],marginPct:parseFloat(r[2])||15,created:r[3],lines:JSON.parse(r[4]||'[]')})); }
function invoicesToRows() {
  const rows = [['desc','amount','date','type','status']];
  S.invoices.forEach(i => rows.push([i.desc||'',i.amount||0,i.date||'',i.type||'income',i.status||'pending']));
  return rows;
}
function rowsToInvoices(rows) { return rows.slice(1).filter(r=>r[0]).map(r=>({desc:r[0],amount:parseFloat(r[1])||0,date:r[2],type:r[3],status:r[4]})); }
function agenciesToRows() {
  const rows = [['name','abbr','lastContact','notes','contacts']];
  S.agencies.forEach(a => rows.push([a.name||'',a.abbr||'',a.lastContact||'',a.notes||'',JSON.stringify(a.contacts||[])]));
  return rows;
}
function rowsToAgencies(rows) { return rows.slice(1).filter(r=>r[0]).map(r=>({name:r[0],abbr:r[1],lastContact:r[2],notes:r[3],contacts:JSON.parse(r[4]||'[]')})); }
function wlToRows() {
  const rows = [['name','agency','value','outcome','date','reason']];
  S.winloss.forEach(w => rows.push([w.name||'',w.agency||'',w.value||0,w.outcome||'',w.date||'',w.reason||'']));
  return rows;
}
function rowsToWL(rows) { return rows.slice(1).filter(r=>r[0]).map(r=>({name:r[0],agency:r[1],value:parseFloat(r[2])||0,outcome:r[3],date:r[4],reason:r[5]})); }
function activityToRows() {
  const rows = [['text','color','time']];
  S.activity.slice(0,50).forEach(a => rows.push([a.text||'',a.color||'',a.time||'']));
  return rows;
}
function rowsToActivity(rows) { return rows.slice(1).filter(r=>r[0]).map(r=>({text:r[0],color:r[1],time:r[2]})); }
function settingsToRows() { return [['key','value'],['company',S.settings.company||'Ironwood Solutions'],['margin',S.settings.margin||15]]; }
function rowsToSettings(rows) {
  const s = { company:'Ironwood Solutions', margin:15, samKey: localStorage.getItem(SAM_KEY_STORE)||'' };
  rows.slice(1).forEach(r => { if (r[0]==='company') s.company=r[1]; if (r[0]==='margin') s.margin=parseFloat(r[1])||15; });
  return s;
}

async function syncToSheet(tab) {
  const map = {
    Pipeline: pipelineToRows, Subcontractors: subsToRows, Quotes: quotesToRows,
    Invoices: invoicesToRows, Agencies: agenciesToRows, WinLoss: wlToRows,
    Activity: activityToRows, Settings: settingsToRows,
    SubAssignments: subAssignmentsToRows,
    Contracts: contractsToRows,
    GovPayments: govPaymentsToRows,
    SubPayments: subPaymentsToRows
  };
  if (map[tab]) await sheetWrite(tab, map[tab]());
}

async function loadFromSheet() {
  setSyncStatus('syncing', 'Loading…');
  try {
    // Load all tabs in parallel, fall back to empty arrays on individual tab failures
    const safe = async (tab, fallback) => { try { return await sheetRead(tab); } catch(e) { console.warn(`Tab load failed: ${tab}`, e.message); return fallback; } };
    const [pipe, subs, quotes, inv, ag, wl, act, settings, sa, contracts, govpay, subpay] = await Promise.all([
      safe('Pipeline', [['pid','tag','title','agency','naics','solNum','deadline','url','notes','solNum2','finalBid','prevContractValue','prevContractSource']]),
      safe('Subcontractors', [['name','trade','phone','email','naics','samStatus','insExpiry','status','rating','notes']]),
      safe('Quotes', [['name','opportunity','marginPct','created','lines']]),
      safe('Invoices', [['desc','amount','date','type','status']]),
      safe('Agencies', [['name','abbr','lastContact','notes','contacts']]),
      safe('WinLoss', [['name','agency','value','outcome','date','reason']]),
      safe('Activity', [['text','color','time']]),
      safe('Settings', [['key','value']]),
      safe('SubAssignments', [['assignId','oppId','contractId','subName','scope','quotedAmount','status','notes']]),
      safe('Contracts', [['contractId','oppId','title','agency','contractNum','poNum','totalValue','startDate','endDate','status','paymentCadence','paymentAmount','paymentDay','netTermsGov','netTermsSub','retainage','notes']]),
      safe('GovPayments', [['payId','contractId','description','scheduledDate','receivedDate','amount','status','notes']]),
      safe('SubPayments', [['payId','contractId','subName','description','dueDate','paidDate','amount','status','govPayId','notes']]),
    ]);
    S.pipeline = rowsToPipeline(pipe);
    S.subs = rowsToSubs(subs);
    S.quotes = rowsToQuotes(quotes);
    S.invoices = rowsToInvoices(inv);
    S.agencies = rowsToAgencies(ag);
    S.winloss = rowsToWL(wl);
    S.activity = rowsToActivity(act);
    S.settings = rowsToSettings(settings);
    S.subAssignments = rowsToSubAssignments(sa);
    S.contracts = rowsToContracts(contracts);
    S.govPayments = rowsToGovPayments(govpay);
    S.subPayments = rowsToSubPayments(subpay);
    S.settings.samKey = localStorage.getItem(SAM_KEY_STORE) || '';
    setSyncStatus('live', 'Synced');
    updateBadges();
    renderView(currentView);
    toast('Data loaded from Google Sheets ✓');
  } catch(e) {
    setSyncStatus('error', 'Sync failed');
    toast('Sync error: ' + e.message + ' — check your Apps Script deployment', true);
  }
}

async function save(tab) {
  setSyncStatus('syncing', 'Saving…');
  try {
    if (tab) await syncToSheet(tab);
    else await Promise.all(TABS.map(t => syncToSheet(t)));
    setSyncStatus('live', 'Saved ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}));
  } catch(e) {
    setSyncStatus('error', 'Save failed');
    toast('Save error — check your connection', true);
  }
}

function logActivity(text, color='var(--amber)') {
  S.activity.unshift({ text, color, time: new Date().toISOString() });

}

async function doSearch() {
  const samKey = localStorage.getItem(SAM_KEY_STORE) || S.settings.samKey || '';
  if (!samKey) { toast('Add your SAM.gov API key in Settings first', true); nav('settings'); return; }
  const q = document.getElementById('aiQuery')?.value?.trim();
  if (!q) return;
  searchOffset = 0;
  const btn = document.getElementById('searchBtn');
  if (btn) btn.disabled = true;
  showSearchSpinner('Asking AI to interpret your search…');
  try {
    const aiR = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000,
        messages:[{role:'user',content:`Convert this government contract search to SAM.gov API params. Reply ONLY with JSON, no markdown:\n{"keywords":"2-4 search words","naicsCode":"6-digit or empty","noticeType":"o/p/k/r/a or empty","setAside":"SBA/8A/HZC/WOSB/SDVOSB or empty","state":"2-letter or empty","explanation":"one sentence"}\n\nQuery: "${q}"`}]
      })
    });
    const ad = await aiR.json();
    let params = {};
    try { params = JSON.parse(ad.content[0].text.replace(/```json|```/g,'').trim()); } catch(e) { params = {keywords:q.split(' ').slice(0,3).join(' ')}; }
    lastKeywords = params.keywords || q;
    showSearchSpinner(`Fetching from SAM.gov: "${lastKeywords}"…`);
    await fetchSAM(params, 0);
  } catch(e) { showSearchErr(`Search failed: ${e.message}`); }
  finally { if (btn) btn.disabled = false; }
}

async function fetchSAM(params, offset) {
  const samKey = localStorage.getItem(SAM_KEY_STORE) || S.settings.samKey || '';
  const limit = parseInt(document.getElementById('fLimit')?.value||25);
  searchLimit = limit;
  const p = new URLSearchParams({ api_key:samKey, limit, offset, postedFrom:postedFrom() });
  if (params.keywords) p.set('q', params.keywords);
  if (params.naicsCode) p.set('naicsCode', params.naicsCode);
  const fN = document.getElementById('fNotice')?.value||params.noticeType;
  const fS = document.getElementById('fSetAside')?.value||params.setAside;
  const fSt = document.getElementById('fState')?.value||params.state;
  if (fN) p.set('noticeType', fN);
  if (fS) p.set('typeOfSetAside', fS);
  if (fSt) p.set('placeOfPerformanceState', fSt);
  try {
    const res = await fetch(`https://api.sam.gov/opportunities/v2/search?${p}`);
    if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e?.description||e?.message||`HTTP ${res.status}`); }
    const data = await res.json();
    searchTotal = data.totalRecords||0;
    searchOffset = offset;
    renderSearchResults(data.opportunitiesData||[], params.explanation||'');
  } catch(e) { showSearchErr(`SAM.gov error: ${e.message}`); }
}

async function tagOpp(pid, tag, metaJson) {
  const meta = JSON.parse(metaJson);
  if (!tag) { delete S.pipeline[pid]; logActivity(`Removed opportunity from pipeline`,'var(--mist)'); }
  else {
    S.pipeline[pid] = { tag, ...meta };
    logActivity(`Tagged "${trunc(meta.title,40)}" as ${TAG_LABELS[tag]}`, tag==='won'?'var(--green2)':tag==='quoting'?'var(--amber2)':tag==='submitted'?'var(--purple2)':'var(--blue2)');
    toast(`Added to ${TAG_LABELS[tag]} ✓`);
  }
  updateBadges();
  await save('Pipeline');
  const card=document.getElementById(`oc-${pid}`);
  if(card){
    card.className=card.className.replace(/tagged-\w+/g,'').trim();
    if(tag)card.classList.add(`tagged-${tag}`);

}

function pipeCard(pid, p) {
  const dl=p.deadline?`<div class="pipe-meta">Due <span style="color:${isUrgent(p.deadline)?'var(--red2)':'var(--cream)'}">${fmtDate(p.deadline)}</span></div>`:'';
  const quotes = S.subAssignments.filter(a=>a.oppId===pid);
  const awarded = quotes.find(q=>q.status==='awarded');
  const quoteCount = quotes.length;
  const finalBid = parseFloat(p.finalBid||0);
  return `<div class="pipe-card" draggable="true" ondragstart="dragPid='${pid}';event.dataTransfer.setData('text/plain','${pid}')">
    <div class="pipe-title">${esc(trunc(p.title||'',65))}</div>
    <div class="pipe-meta">${esc(trunc(p.agency||'',40))}</div>
    ${p.naics?`<div class="pipe-meta">NAICS <span style="color:var(--cream)">${p.naics}</span></div>`:''}
    ${dl}
    ${awarded
      ? `<div class="pipe-meta" style="margin-top:4px">✓ <span style="color:var(--green2)">${esc(awarded.subName)}</span> · <span style="color:var(--amber2)">$${fmt(awarded.quotedAmount)}</span></div>`
      : quoteCount>0
        ? `<div class="pipe-meta" style="margin-top:4px">📋 <span style="color:var(--blue2)">${quoteCount} quote${quoteCount>1?'s':''} pending</span></div>`
        : `<div class="pipe-meta" style="margin-top:4px;color:var(--muted)">No sub quotes yet</div>`}
    ${finalBid>0?`<div class="pipe-meta" style="margin-top:2px">🎯 Final bid: <span style="color:var(--gold2)">$${fmt(finalBid)}</span></div>`:''}
    <div class="pipe-actions">
      <select class="move-sel" onchange="movePipe('${pid}',this.value)">
        ${Object.entries(TAG_LABELS).map(([vv,l])=>`<option value="${vv}" ${vv===p.tag?'selected':''}>${l}</option>`).join('')}
      </select>
      <div style="display:flex;gap:4px">
        <button class="btn btn-ghost btn-xs" onclick="openOppDetail('${pid}')">Detail</button>
        ${p.url?`<a class="btn btn-ghost btn-xs" href="${p.url}" target="_blank">SAM</a>`:''}
        <button class="rm-btn" onclick="removePipe('${pid}')">✕</button>
      </div>
    </div>
  </div>`;
}

async function dropCard(e, newTag) {
  e.preventDefault();
  const pid=e.dataTransfer.getData('text/plain')||dragPid;
  if(pid&&S.pipeline[pid]){S.pipeline[pid].tag=newTag;logActivity(`Moved "${trunc(S.pipeline[pid].title,30)}" to ${TAG_LABELS[newTag]}`,'var(--amber)');await save('Pipeline');renderPipeline();}
}
async function movePipe(pid,tag){if(S.pipeline[pid]){S.pipeline[pid].tag=tag;await save('Pipeline');renderPipeline();toast(`Moved to ${TAG_LABELS[tag]} ✓`);}}
async function removePipe(pid){const t=S.pipeline[pid]?.title||'opportunity';delete S.pipeline[pid];updateBadges();logActivity(`Removed "${trunc(t,30)}" from pipeline`,'var(--mist)');await save('Pipeline');renderPipeline();}


// ══ OPP DETAIL & SUB ASSIGNMENTS ═════════════════════════════════════════════
// ══ OPP DETAIL & SUB QUOTING ═════════════════════════════════════════════════

function openOppDetail(pid, tab='quotes') {
  const p = S.pipeline[pid];
  if (!p) return;
  const existing = document.getElementById('oppDetailOverlay');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'opp-detail-overlay';
  overlay.id = 'oppDetailOverlay';
  overlay.onclick = (e) => { if(e.target===overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="opp-detail" style="max-width:820px">
      <div class="opp-detail-header">
        <div>
          <div class="opp-detail-title">${esc(p.title||'Untitled')}</div>
          <div class="opp-detail-agency">${esc(p.agency||'')} · ${p.naics||''} · Due ${fmtDate(p.deadline)}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
          <span class="badge badge-${p.tag||'default'}">${TAG_LABELS[p.tag]||p.tag}</span>
          <button class="modal-close" onclick="document.getElementById('oppDetailOverlay').remove()">✕</button>
        </div>
      </div>
      <div class="opp-tabs">
        <button class="opp-tab ${tab==='quotes'?'active':''}" onclick="oppTab('${pid}','quotes',this)">Sub Quotes</button>
        <button class="opp-tab ${tab==='bid'?'active':''}" onclick="oppTab('${pid}','bid',this)">Bid Builder</button>
        <button class="opp-tab ${tab==='notes'?'active':''}" onclick="oppTab('${pid}','notes',this)">Notes</button>
      </div>
      <div class="opp-detail-body" id="oppDetailBody">
        ${renderOppTab(pid, tab)}
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function oppTab(pid, tab, btn) {
  document.querySelectorAll('#oppDetailOverlay .opp-tab').forEach(t=>t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const body = document.getElementById('oppDetailBody');
  if (body) body.innerHTML = renderOppTab(pid, tab);
}

function renderOppTab(pid, tab) {
  if (tab==='quotes') return renderQuotesTab(pid);
  if (tab==='bid') return renderBidTab(pid);
  return renderNotesTab(S.pipeline[pid]);
}

// ── SUB QUOTES TAB ────────────────────────────────────────────────────────────
function renderQuotesTab(pid) {
  const quotes = S.subAssignments.filter(a=>a.oppId===pid);
  const received = quotes.filter(q=>q.status==='received'||q.status==='awarded'||q.status==='rejected');
  const amounts = received.map(q=>parseFloat(q.quotedAmount||0)).filter(n=>n>0);
  const highestBid = amounts.length > 0 ? Math.max(...amounts) : 0;
  const lowestBid = amounts.length > 0 ? Math.min(...amounts) : 0;
  const awarded = quotes.find(q=>q.status==='awarded');

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <div style="display:flex;gap:16px;flex-wrap:wrap">
        ${highestBid>0?`<div><span class="meta-k">Highest Sub Quote</span><br><span class="mono" style="font-size:14px;color:var(--red2);font-weight:700">$${fmt(highestBid)}</span></div>`:''}
        ${lowestBid>0&&lowestBid!==highestBid?`<div><span class="meta-k">Lowest Sub Quote</span><br><span class="mono" style="font-size:14px;color:var(--green2);font-weight:700">$${fmt(lowestBid)}</span></div>`:''}
        ${awarded?`<div><span class="meta-k">Awarded To</span><br><span class="mono" style="font-size:13px;color:var(--amber2);font-weight:700">${esc(awarded.subName)}</span></div>`:''}
      </div>
      <button class="btn btn-primary btn-sm" onclick="openAddQuoteModal('${pid}')">+ Add Sub Quote</button>
    </div>

    ${quotes.length===0
      ? `<div class="empty-state" style="padding:40px"><span class="empty-icon">📋</span><div class="empty-title">No Sub Quotes Yet</div><div class="empty-sub">Add quotes from subcontractors competing for this opportunity.</div></div>`
      : `<table class="table">
          <thead><tr>
            <th>Subcontractor</th>
            <th>Trade</th>
            <th>Scope</th>
            <th style="text-align:right">Quote</th>
            <th style="text-align:center">vs Highest</th>
            <th style="text-align:center">Status</th>
            <th></th>
          </tr></thead>
          <tbody>
          ${[...quotes].sort((a,b)=>parseFloat(a.quotedAmount||0)-parseFloat(b.quotedAmount||0)).map(q=>{
            const sub = S.subs.find(s=>s.name===q.subName);
            const amt = parseFloat(q.quotedAmount||0);
            const isLowest = amt===lowestBid && amounts.length>1;
            const isHighest = amt===highestBid && amounts.length>1;
            const diff = highestBid>0 ? ((amt-highestBid)/highestBid*100).toFixed(1) : 0;
            const statusColors = {quoting:'var(--mist)',received:'var(--blue2)',awarded:'var(--green2)',rejected:'var(--red2)'};
            const statusColor = statusColors[q.status||'quoting']||'var(--mist)';
            return `<tr style="background:${q.status==='awarded'?'rgba(82,183,136,0.05)':q.status==='rejected'?'rgba(230,57,70,0.03)':''}">
              <td>
                <div style="font-weight:600;color:var(--cream)">${esc(q.subName)}</div>
                ${sub?`<div class="mono muted" style="font-size:10px">${esc(sub.samStatus||'')} · Ins ${isInsExpiring(sub.insExpiry)?'<span style="color:var(--red2)">⚠ Expiring</span>':esc(sub.insExpiry||'—')}</div>`:''}
              </td>
              <td class="muted" style="font-size:12px">${esc(sub?.trade||'—')}</td>
              <td style="font-size:12px;color:var(--mist);max-width:180px">${esc(trunc(q.scope||'—',50))}</td>
              <td style="text-align:right">
                <span class="mono" style="font-size:14px;font-weight:700;color:${isLowest?'var(--green2)':isHighest?'var(--red2)':'var(--cream)'}">$${fmt(amt)}</span>
                ${isLowest?`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--green2)">LOWEST</div>`:''}
                ${isHighest?`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--red2)">HIGHEST</div>`:''}
              </td>
              <td style="text-align:center">
                ${amounts.length>1&&amt>0?`<span class="mono" style="font-size:11px;color:${diff<0?'var(--green2)':'var(--red2)'}">${diff>0?'+':''}${diff}%</span>`:'<span class="muted">—</span>'}
              </td>
              <td style="text-align:center">
                <span style="font-family:'DM Mono',monospace;font-size:10px;color:${statusColor};text-transform:uppercase;letter-spacing:0.08em">${q.status||'quoting'}</span>
              </td>
              <td>
                <div style="display:flex;gap:4px;justify-content:flex-end">
                  ${q.status!=='awarded'&&q.status!=='rejected'?`<button class="btn btn-primary btn-xs" onclick="awardSubQuote('${q.assignId}','${pid}')">Award</button>`:''}
                  ${q.status==='awarded'?`<button class="btn btn-ghost btn-xs" onclick="unawardSubQuote('${q.assignId}','${pid}')">Unaward</button>`:''}
                  <button class="btn btn-ghost btn-xs" onclick="editSubQuote('${q.assignId}','${pid}')">Edit</button>
                  <button class="rm-btn" onclick="removeSubQuote('${q.assignId}','${pid}')">✕</button>
                </div>
              </td>
            </tr>`;
          }).join('')}
          </tbody>
        </table>`}
    ${awarded?`<div style="margin-top:14px;padding:12px 16px;background:rgba(82,183,136,0.08);border:1px solid rgba(82,183,136,0.2);border-radius:8px;font-size:13px;color:var(--green2)">
      ✓ <strong>${esc(awarded.subName)}</strong> awarded at <strong>$${fmt(awarded.quotedAmount)}</strong> — go to <button class="btn btn-ghost btn-xs" style="color:var(--amber2)" onclick="oppTab('${pid}','bid',null)">Bid Builder →</button> to set your final bid
    </div>`:''}`;
}

// ── BID BUILDER TAB ───────────────────────────────────────────────────────────
function renderBidTab(pid) {
  const p = S.pipeline[pid];
  const quotes = S.subAssignments.filter(a=>a.oppId===pid);
  const awarded = quotes.find(q=>q.status==='awarded');
  const margin = parseFloat(S.settings.margin||15);
  const subCost = parseFloat(awarded?.quotedAmount||0);
  const recBid = subCost > 0 ? subCost/(1-(margin/100)) : 0;
  const finalBid = parseFloat(p.finalBid||0);
  const actualMargin = finalBid > 0 ? ((finalBid-subCost)/finalBid*100).toFixed(1) : 0;
  const actualProfit = finalBid > 0 ? finalBid - subCost : 0;
  const receivedQuotes = quotes.filter(q=>q.quotedAmount>0);
  const amounts = receivedQuotes.map(q=>parseFloat(q.quotedAmount||0));
  const highestAmt = amounts.length>0 ? Math.max(...amounts) : 0;
  const lowestAmt = amounts.length>0 ? Math.min(...amounts) : 0;

  return `
    ${!awarded?`<div class="pwp-banner" style="background:rgba(196,123,43,0.08);border-color:rgba(196,123,43,0.2);color:var(--amber2)">
      ⚠ No sub awarded yet — go to <button class="btn btn-ghost btn-xs" style="color:var(--amber2)" onclick="oppTab('${pid}','quotes',null)">Sub Quotes</button> and award a sub first.
    </div>`:''}

    ${quotes.length>0?`
    <div class="card-title" style="margin-bottom:10px">All Sub Quotes</div>
    <table class="table" style="margin-bottom:20px">
      <thead><tr>
        <th>Subcontractor</th>
        <th style="text-align:right">Quote</th>
        <th style="text-align:right">Rec. Bid at ${margin}%</th>

      </tr></thead>
      <tbody>
      ${[...quotes].sort((a,b)=>parseFloat(a.quotedAmount||0)-parseFloat(b.quotedAmount||0)).map(q=>{
        const amt = parseFloat(q.quotedAmount||0);
        const qRecBid = amt>0 ? amt/(1-(margin/100)) : 0;
        const isAwarded = q.status==='awarded';
        const isLowest = amt===lowestAmt && amt>0 && amounts.length>1;
        const isHighest = amt===highestAmt && amounts.length>1;
        const statusColors = {quoting:'var(--mist)',received:'var(--blue2)',awarded:'var(--green2)',rejected:'var(--red2)'};
        return `<tr style="background:${isAwarded?'rgba(82,183,136,0.06)':q.status==='rejected'?'rgba(230,57,70,0.03)':''}">
          <td>
            <div style="font-weight:${isAwarded?'700':'400'};color:${isAwarded?'var(--green2)':'var(--cream)'}">${esc(q.subName)}${isAwarded?' ✓':''}</div>
            ${q.scope?`<div class="mono muted" style="font-size:10px">${esc(trunc(q.scope,40))}</div>`:''}
          </td>
          <td style="text-align:right">
            <span class="mono" style="font-size:13px;font-weight:700;color:${isLowest?'var(--green2)':isHighest?'var(--red2)':'var(--cream)'}">
              ${amt>0?'$'+fmt(amt):'—'}
            </span>
            ${isLowest&&amounts.length>1?`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--green2)">LOWEST</div>`:''}
            ${isHighest&&amounts.length>1?`<div style="font-family:'DM Mono',monospace;font-size:9px;color:var(--red2)">HIGHEST</div>`:''}
          </td>
          <td style="text-align:right">
            <span class="mono muted" style="font-size:12px">${qRecBid>0?'$'+fmt(qRecBid):'—'}</span>
          </td>
          <td style="text-align:center">
            <span style="font-family:'DM Mono',monospace;font-size:10px;color:${statusColors[q.status||'quoting']};text-transform:uppercase">${q.status||'quoting'}</span>
          </td>
        </tr>`;
      }).join('')}
      ${highestAmt>0?`<tr style="border-top:2px solid var(--border)">
        <td class="mono muted" style="font-size:11px">Highest Sub Quote</td>
        <td style="text-align:right"><span class="mono" style="color:var(--red2);font-weight:700">$${fmt(highestAmt)}</span></td>
        <td></td><td></td>
      </tr>`:''}
      </tbody>
    </table>`:''}


    <div class="grid3" style="margin-bottom:20px">
      <div class="kpi kpi-amber" style="padding:14px 16px">
        <div class="kpi-label">Awarded Sub Cost</div>
        <div class="kpi-value" style="font-size:24px">${subCost>0?'$'+fmt(subCost):'—'}</div>
        <div class="kpi-sub">${esc(awarded?.subName||'No sub awarded')}</div>
      </div>
      <div class="kpi kpi-blue" style="padding:14px 16px">
        <div class="kpi-label">Recommended Bid (${margin}% margin)</div>
        <div class="kpi-value" style="font-size:24px">${recBid>0?'$'+fmt(recBid):'—'}</div>
        <div class="kpi-sub">Sub cost ÷ (1 − ${margin}%)</div>
      </div>
      <div class="kpi ${actualMargin>=margin?'kpi-green':'kpi-purple'}" style="padding:14px 16px">
        <div class="kpi-label">Actual Margin on Final Bid</div>
        <div class="kpi-value" style="font-size:24px">${finalBid>0?actualMargin+'%':'—'}</div>
        <div class="kpi-sub">${finalBid>0?'Profit: $'+fmt(actualProfit):'Enter final bid below'}</div>
      </div>

    ${recBid>0?`
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:20px">

            <button class="btn btn-ghost btn-xs" style="margin-top:8px;font-size:10px" onclick="useBidScenario('${pid}',${bid.toFixed(2)})">Use This</button>
          </div>`;
        }).join('')}
      </div>
    </div>`:''}

    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:14px 18px;margin-bottom:20px">

          </div>
        </div>
        ${p.prevContractSource?`<span class="mono muted" style="font-size:10px">Source: ${esc(p.prevContractSource)}</span>`:''}
      </div>
      <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
        <div class="form-group" style="margin-bottom:0;flex:1;min-width:160px">
          <label class="form-label">Previous Contract Value ($)</label>

        <div class="form-group" style="margin-bottom:0;flex:2;min-width:200px">
          <label class="form-label">Source (USASpending, SAM.gov, etc.)</label>

      ${p.prevContractValue>0?`
      <div style="margin-top:12px;display:flex;gap:20px;flex-wrap:wrap;padding-top:10px;border-top:1px solid var(--border)">
        <div>
          <span class="meta-k">Previous Value</span><br>
          <span class="mono" style="font-size:13px;color:var(--cream)">$${fmt(p.prevContractValue)}</span>
        </div>
        ${finalBid>0?`
        <div>
          <span class="meta-k">Your Bid vs Previous</span><br>
          <span class="mono" style="font-size:13px;color:${finalBid<=p.prevContractValue?'var(--green2)':'var(--amber2)'}">
            ${finalBid<=p.prevContractValue?'▼':'▲'} ${Math.abs(((finalBid-p.prevContractValue)/p.prevContractValue)*100).toFixed(1)}% ${finalBid<=p.prevContractValue?'below':'above'} previous

        <div>
          <span class="meta-k">Competitiveness</span><br>
          <span class="mono" style="font-size:13px;color:${finalBid<p.prevContractValue*0.95?'var(--green2)':finalBid<p.prevContractValue*1.05?'var(--amber2)':'var(--red2)'}">

          </span>
        </div>`:''} 
        ${recBid>0?`
        <div>
          <span class="meta-k">Rec. Bid vs Previous</span><br>
          <span class="mono" style="font-size:13px;color:${recBid<=p.prevContractValue?'var(--green2)':'var(--amber2)'}">
            ${recBid<=p.prevContractValue?'▼':'▲'} ${Math.abs(((recBid-p.prevContractValue)/p.prevContractValue)*100).toFixed(1)}%

        <div><span class="meta-k">Your Profit</span><br><span class="mono" style="color:var(--green2);font-size:14px;font-weight:700">$${fmt(actualProfit)}</span></div>
        <div><span class="meta-k">Actual Margin</span><br><span class="mono" style="color:${actualMargin>=margin?'var(--green2)':'var(--amber2)'};font-size:14px;font-weight:700">${actualMargin}%</span></div>
      </div>
      <div class="margin-bar" style="margin-top:12px"><div class="margin-fill" style="width:${Math.min(actualMargin*3,100)}%"></div></div>
    </div>`:''}`;
}

function updateBidPreview(pid) {
  const input = document.getElementById('finalBidInput');
  const preview = document.getElementById('bidPreview');
  if (!input || !preview) return;
  const finalBid = parseFloat(input.value)||0;
  const awarded = S.subAssignments.find(a=>a.oppId===pid&&a.status==='awarded');
  const subCost = parseFloat(awarded?.quotedAmount||0);
  const prevVal = parseFloat(document.getElementById('prevContractInput')?.value)||parseFloat(S.pipeline[pid]?.prevContractValue||0);
  if (finalBid>0&&subCost>0) {
    const profit = finalBid-subCost;
    const margin = ((profit/finalBid)*100).toFixed(1);
    const color = profit>0?'var(--green2)':'var(--red2)';
    let html = `Final bid: <span style="color:var(--amber2)">$${fmt(finalBid)}</span> · Profit: <span style="color:${color}">$${fmt(profit)}</span> · Margin: <span style="color:${color}">${margin}%</span>`;
    if (prevVal>0) {
      const diff = ((finalBid-prevVal)/prevVal*100).toFixed(1);
      const diffColor = finalBid<=prevVal?'var(--green2)':'var(--amber2)';
      html += ` · vs Previous: <span style="color:${diffColor}">${diff>0?'+':''}${diff}%</span>`;
    }
    preview.innerHTML = html;
  } else if (finalBid>0) {
    preview.innerHTML = `Final bid: <span style="color:var(--amber2)">$${fmt(finalBid)}</span>`;
  } else {
    preview.innerHTML = '';
  }
}

async function saveFinalBid(pid) {
  const finalBid = parseFloat(document.getElementById('finalBidInput')?.value)||0;
  if (!finalBid) { toast('Enter a bid amount', true); return; }
  if (!S.pipeline[pid]) return;
  S.pipeline[pid].finalBid = finalBid;
  const prevVal = parseFloat(document.getElementById('prevContractInput')?.value)||0;
  const prevSrc = document.getElementById('prevContractSource')?.value||'';
  if (prevVal) S.pipeline[pid].prevContractValue = prevVal;
  if (prevSrc) S.pipeline[pid].prevContractSource = prevSrc;
  logActivity(`Set final bid for "${trunc(S.pipeline[pid].title,30)}": $${fmt(finalBid)}`, 'var(--gold2)');
  await save('Pipeline');
  toast('Final bid saved ✓');
  oppTab(pid, 'bid', null);
}

function useBidScenario(pid, amount) {
  const input = document.getElementById('finalBidInput');
  if (input) { input.value = Math.round(amount); updateBidPreview(pid); }
}

async function saveSubQuote(pid, existingId) {
  const subName = v('aqSub');
  if (!subName) { toast('Select a subcontractor', true); return; }
  const quote = {
    assignId: existingId || 'SA-' + Date.now(),
    oppId: pid,
    contractId: '',
    subName,
    scope: v('aqScope'),
    quotedAmount: parseFloat(v('aqAmount'))||0,
    status: v('aqStatus')||'quoting',
    notes: v('aqNotes')
  };
  if (existingId) {
    const idx = S.subAssignments.findIndex(a=>a.assignId===existingId);
    if (idx>=0) S.subAssignments[idx] = quote;
  } else {
    S.subAssignments.push(quote);
    logActivity(`Added sub quote: ${subName} for "${trunc(S.pipeline[pid]?.title||'',25)}"`, 'var(--blue2)');
  }
  await save('SubAssignments');
  closeModal();
  toast(`Quote saved ✓`);
  oppTab(pid, 'quotes', null);
  renderPipeline();
}

async function awardSubQuote(assignId, pid) {
  // Mark this one awarded, all others rejected
  S.subAssignments.filter(a=>a.oppId===pid).forEach(a => {
    if (a.assignId===assignId) { a.status='awarded'; }
    else if (a.status!=='quoting') { a.status='rejected'; }
    else { a.status='rejected'; }
  });
  const awarded = S.subAssignments.find(a=>a.assignId===assignId);
  logActivity(`Awarded sub quote: ${awarded?.subName} $${fmt(awarded?.quotedAmount)} for "${trunc(S.pipeline[pid]?.title||'',25)}"`, 'var(--green2)');
  await save('SubAssignments');
  toast(`${awarded?.subName} awarded ✓`);
  oppTab(pid, 'quotes', null);
  renderPipeline();
}

async function unawardSubQuote(assignId, pid) {
  S.subAssignments.filter(a=>a.oppId===pid).forEach(a => {
    if (a.status==='awarded'||a.status==='rejected') a.status='received';
  });
  await save('SubAssignments');
  toast('Award cleared — all quotes reset to Received');
  oppTab(pid, 'quotes', null);
  renderPipeline();
}

function editSubQuote(assignId, pid) {
  const q = S.subAssignments.find(a=>a.assignId===assignId);
  if (q) openAddQuoteModal(pid, q);
}

async function removeSubQuote(assignId, pid) {
  if (!confirm('Remove this sub quote?')) return;
  S.subAssignments = S.subAssignments.filter(a=>a.assignId!==assignId);

function isInsExpiring(dateStr) {
  if (!dateStr) return false;
  const diff = (new Date(dateStr) - new Date()) / 86400000;
  return diff >= 0 && diff <= 60;
}

function quoteLineHtml(li,l={},subs=[]){
  return `<div class="form-row3" id="ql-${li}" style="align-items:end;margin-bottom:8px">

function calcLine(li){const row=document.getElementById(`ql-${li}`);if(!row)return;const ins=row.querySelectorAll('input[type=number]');const t=document.getElementById(`lt-${li}`);if(t)t.textContent='$'+fmt((parseFloat(ins[0]?.value)||1)*(parseFloat(ins[1]?.value)||0));}
function addQL(snj){const subs=JSON.parse(snj);const c=document.getElementById('qLines');const li=c.children.length;const d=document.createElement('div');d.innerHTML=quoteLineHtml(li,{},subs);c.appendChild(d.firstChild);}

async function saveQuote(idx){

  const q={name,opportunity:v('qOpp'),marginPct:parseFloat(v('qMargin'))||15,lines,created:S.quotes[idx]?.created||new Date().toISOString()};
  if(idx!==undefined)S.quotes[idx]=q;else S.quotes.push(q);

function generatePaymentSchedule(ct) {
  if (!ct.startDate || !ct.endDate || !ct.paymentAmount) return [];
  const schedule = [];
  const start = new Date(ct.startDate);
  const end = new Date(ct.endDate);
  const now = new Date();
  const cadence = ct.paymentCadence || 'monthly';
  let current = new Date(start);
  let idx = 0;

  const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate()+n); return r; };
  const addMonths = (d, n) => { const r = new Date(d); r.setMonth(r.getMonth()+n); return r; };

  while (current <= end && idx < 60) {
    const payDate = new Date(current);
    const diff = (payDate - now) / 86400000;
    const status = diff < -1 ? 'past' : diff <= 7 ? 'due' : 'upcoming';
    schedule.push({ date: payDate.toISOString().split('T')[0], amount: ct.paymentAmount, status, label: `Payment ${idx+1}` });
    if (cadence === 'weekly') current = addDays(current, 7);
    else if (cadence === 'monthly') current = addMonths(current, 1);
    else if (cadence === 'quarterly') current = addMonths(current, 3);
    else break;
    idx++;
  }
  return schedule;
}

async function saveNewContract() {
  const title = v('ctTitle');
  if (!title) { toast('Contract title required', true); return; }
  const ct = {
    contractId: 'CT-' + Date.now(),
    oppId: v('ctOppId'),
    title,
    agency: v('ctAgency'),
    contractNum: v('ctNum'),
    poNum: v('ctPO'),
    totalValue: parseFloat(v('ctValue'))||0,
    paymentAmount: parseFloat(v('ctPayAmt'))||0,
    startDate: v('ctStart'),
    endDate: v('ctEnd'),
    paymentCadence: v('ctCadence')||'monthly',
    netTermsGov: parseInt(v('ctNetGov'))||30,
    netTermsSub: parseInt(v('ctNetSub'))||30,
    retainage: parseFloat(v('ctRetainage'))||0,
    status: 'active',
    notes: v('ctNotes')
  };
  S.contracts.push(ct);
  // Update linked sub assignments with contractId
  if (ct.oppId) {
    S.subAssignments.filter(a=>a.oppId===ct.oppId).forEach(a=>{ a.contractId=ct.contractId; a.status='active'; });
    await save('SubAssignments');
  }
  logActivity(`Created contract: ${trunc(title,40)}`, 'var(--green2)');
  await save('Contracts');
  closeModal();
  toast('Contract created ✓');
  renderContracts(document.getElementById('content'), document.getElementById('topbarActions'));
}

async function updateContractStatus(i, status) {
  if (S.contracts[i]) {
    S.contracts[i].status = status;
    await save('Contracts');
    toast(`Status updated to ${status} ✓`);
  }
}

async function deleteContract(i) {
  if (!confirm('Delete this contract?')) return;
  const title = S.contracts[i]?.title||'contract';
  S.contracts.splice(i,1);
  logActivity(`Deleted contract: ${trunc(title,40)}`, 'var(--mist)');
  await save('Contracts');
  renderContracts(document.getElementById('content'), document.getElementById('topbarActions'));
  toast('Contract deleted');
}

function addDaysToDate(dateStr, days) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}

async function saveGovPay(existingId) {
  const contractId = v('gpContract');
  const description = v('gpDesc');
  if (!description) { toast('Description required', true); return; }
  const pay = {
    payId: existingId || 'GP-' + Date.now(),
    contractId, description,
    amount: parseFloat(v('gpAmount'))||0,
    status: v('gpStatus')||'scheduled',
    scheduledDate: v('gpSched'),
    receivedDate: v('gpReceived'),
    notes: v('gpNotes')
  };
  if (existingId) {
    const idx = S.govPayments.findIndex(p=>p.payId===existingId);
    if (idx>=0) S.govPayments[idx] = pay;
  } else {
    S.govPayments.push(pay);
    const contract = S.contracts.find(c=>c.contractId===contractId);
    logActivity(`Logged gov payment: ${description} $${fmt(pay.amount)}`, 'var(--green2)');
  }
  await save('GovPayments');
  closeModal();
  toast('Payment saved ✓');
  renderGovPayments(document.getElementById('content'), document.getElementById('topbarActions'));
}

async function markGovPayReceived(payId) {
  const p = S.govPayments.find(p=>p.payId===payId);
  if (p) {
    p.status = 'received';
    p.receivedDate = new Date().toISOString().split('T')[0];
    logActivity(`Gov payment received: ${p.description} $${fmt(p.amount)}`, 'var(--green2)');
    await save('GovPayments');
    toast('Marked as received ✓');
    renderGovPayments(document.getElementById('content'), document.getElementById('topbarActions'));
  }
}

async function markGovPayOverdue(payId) {
  const p = S.govPayments.find(p=>p.payId===payId);
  if (p) {
    p.status = 'overdue';
    await save('GovPayments');
    toast('Marked as overdue');
    renderGovPayments(document.getElementById('content'), document.getElementById('topbarActions'));
  }
}

function editGovPay(payId) {
  const p = S.govPayments.find(p=>p.payId===payId);
  if (p) openGovPayModal(p);
}

async function deleteGovPay(payId) {
  if (!confirm('Delete this payment record?')) return;
  S.govPayments = S.govPayments.filter(p=>p.payId!==payId);
  await save('GovPayments');
  toast('Payment deleted');
  renderGovPayments(document.getElementById('content'), document.getElementById('topbarActions'));
}

  </div>

    ℹ️ Pay-when-paid: sub payments with status "Waiting" are owed but held until gov payment is received.
  </div>

  ${payments.length===0
    ? `<div class="empty-state"><span class="empty-icon">🔄</span><div class="empty-title">No Sub Payments Logged</div><div class="empty-sub">Track payments you owe to subcontractors, tied to government payment receipts.</div><div style="margin-top:16px"><button class="btn btn-primary" onclick="openSubPayModal()">+ Log Sub Payment</button></div></div>`
    : `<div class="card" style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">
          <div class="section-title" style="font-size:18px">Sub Payment Log</div>
          <div class="mono muted" style="font-size:11px">${payments.length} payment${payments.length!==1?'s':''}</div>
        </div>
        ${[...payments].sort((a,b)=>new Date(b.dueDate||0)-new Date(a.dueDate||0)).map(p=>subPayCard(p)).join('')}
      </div>`}

  ${S.subs.length>0 ? `
  <div class="card">
    <div class="card-title">Owed by Subcontractor</div>
    ${[...new Set(S.subPayments.filter(p=>contractFilter?p.contractId===contractFilter:true).map(p=>p.subName))].map(subName => {
      const subPays = S.subPayments.filter(p=>p.subName===subName&&(contractFilter?p.contractId===contractFilter:true));
      const subPaid = subPays.filter(p=>p.status==='paid').reduce((a,b)=>a+parseFloat(b.amount||0),0);
      const subOwed = subPays.filter(p=>p.status!=='paid').reduce((a,b)=>a+parseFloat(b.amount||0),0);
      const sub = S.subs.find(s=>s.name===subName);

        <div>
          <div style="font-size:13px;color:var(--cream)">${esc(subName)}</div>

        </div>

        ${S.govPayments.filter(g=>g.status==='received').map(g=>`<option value="${g.payId}" ${p.govPayId===g.payId?'selected':''}>${esc(trunc(g.description,45))} · $${fmt(g.amount)}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label class="form-label">Notes</label>
      <textarea class="form-textarea" id="spNotes" placeholder="Check number, bank reference, any details…">${esc(p.notes||'')}</textarea>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveSubPay('${p.payId||''}')">Save Payment</button>`,true);
}

function spPopulateSubs(contractId) {
  const assigns = S.subAssignments.filter(a=>a.contractId===contractId||a.oppId===(S.contracts.find(c=>c.contractId===contractId)?.oppId));
  const sel = document.getElementById('spSub');
  if (!sel || assigns.length===0) return;
  sel.innerHTML = '<option value="">— Select sub —</option>' +
    assigns.map(a=>`<option value="${esc(a.subName)}">${esc(a.subName)}</option>`).join('');
}

async function saveSubPay(existingId) {
  const subName = v('spSub');
  const description = v('spDesc');
  if (!subName || !description) { toast('Sub and description required', true); return; }
  const pay = {
    payId: existingId || 'SP-' + Date.now(),
    contractId: v('spContract'),
    subName, description,
    amount: parseFloat(v('spAmount'))||0,
    status: v('spStatus')||'pending',
    dueDate: v('spDue'),
    paidDate: v('spPaid'),
    govPayId: v('spGovPay'),
    notes: v('spNotes')
  };
  if (existingId) {
    const idx = S.subPayments.findIndex(p=>p.payId===existingId);
    if (idx>=0) S.subPayments[idx] = pay;
  } else {
    S.subPayments.push(pay);
    logActivity(`Logged sub payment: ${subName} $${fmt(pay.amount)}`, 'var(--blue2)');
  }
  await save('SubPayments');
  closeModal();
  toast('Sub payment saved ✓');
  renderSubPayments(document.getElementById('content'), document.getElementById('topbarActions'));
}

async function markSubPayPaid(payId) {
  const p = S.subPayments.find(p=>p.payId===payId);
  if (p) {
    p.status = 'paid';
    p.paidDate = new Date().toISOString().split('T')[0];
    logActivity(`Paid sub: ${p.subName} $${fmt(p.amount)}`, 'var(--green2)');
    await save('SubPayments');
    toast('Marked as paid ✓');
    renderSubPayments(document.getElementById('content'), document.getElementById('topbarActions'));
  }
}

async function markSubPayPending(payId) {
  const p = S.subPayments.find(p=>p.payId===payId);
  if (p) { p.status='pending'; await save('SubPayments'); toast('Marked as pending'); renderSubPayments(document.getElementById('content'), document.getElementById('topbarActions')); }
}

async function markSubPayOverdue(payId) {
  const p = S.subPayments.find(p=>p.payId===payId);
  if (p) { p.status='overdue'; await save('SubPayments'); toast('Marked as overdue'); renderSubPayments(document.getElementById('content'), document.getElementById('topbarActions')); }
}

function editSubPay(payId) {
  const p = S.subPayments.find(p=>p.payId===payId);
  if (p) openSubPayModal(p);
}

async function deleteSubPay(payId) {
  if (!confirm('Delete this sub payment record?')) return;
  S.subPayments = S.subPayments.filter(p=>p.payId!==payId);
  await save('SubPayments');
  toast('Deleted');
  renderSubPayments(document.getElementById('content'), document.getElementById('topbarActions'));
}

function renderWinLoss(c,ta){
  ta.innerHTML=`<button class="btn btn-primary btn-sm" onclick="openWLModal()">+ Log Bid</button>`;
  const won=S.winloss.filter(w=>w.outcome==='won').length;

  const total=won+lost;
  const rate=total>0?Math.round(won/total*100):0;
  const wonRev=S.winloss.filter(w=>w.outcome==='won').reduce((a,b)=>a+parseFloat(b.value||0),0);
  c.innerHTML=`
  <div class="grid4" style="margin-bottom:20px">
    <div class="kpi kpi-green"><div class="kpi-label">Won</div><div class="kpi-value">${won}</div></div>
    <div class="kpi kpi-amber"><div class="kpi-label">Lost</div><div class="kpi-value">${lost}</div></div>

  </div>
  ${S.winloss.length===0?'<div class="empty-state"><span class="empty-icon">🏆</span><div class="empty-title">No Bids Logged Yet</div><div class="empty-sub">Track every bid — won or lost — to build your pattern recognition over time.</div></div>':

  ${S.winloss.map((w,i)=>`<tr><td>${esc(trunc(w.name||'',40))}</td><td class="muted" style="font-size:12px">${esc(trunc(w.agency||'',30))}</td><td class="mono amber">$${fmt(w.value||0)}</td><td><span class="badge badge-${w.outcome==='won'?'won':'lost'}">${w.outcome}</span></td><td class="muted" style="font-size:12px">${esc(trunc(w.reason||'',35))}</td><td class="mono muted" style="font-size:11px">${fmtDate(w.date)}</td><td><button class="rm-btn" onclick="deleteWL(${i})">✕</button></td></tr>`).join('')}</tbody></table></div>`}`;

  S.settings.margin=parseFloat(v('setMargin'))||15;

  document.querySelector('.logo-mark').textContent=S.settings.company.split(' ')[0];
}

function saveSamKey(){
  const k=v('setSam');
  localStorage.setItem(SAM_KEY_STORE,k);
  S.settings.samKey=k;
  toast('SAM.gov key saved ✓');
}

function exportData() {
  const exportObj = {
    exportDate: new Date().toISOString(),
    version: '1.0',
    pipeline: S.pipeline,
    subs: S.subs,
    quotes: S.quotes,
    invoices: S.invoices,
    agencies: S.agencies,
    winloss: S.winloss,
    subAssignments: S.subAssignments,
    contracts: S.contracts,
    govPayments: S.govPayments,
    subPayments: S.subPayments,
    settings: { company: S.settings.company, margin: S.settings.margin }
  };
  const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ironwood-erp-backup-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  toast('Data exported ✓');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.pipeline) S.pipeline = d.pipeline;
        if (d.subs) S.subs = d.subs;
        if (d.quotes) S.quotes = d.quotes;
        if (d.invoices) S.invoices = d.invoices;
        if (d.agencies) S.agencies = d.agencies;
        if (d.winloss) S.winloss = d.winloss;
        if (d.subAssignments) S.subAssignments = d.subAssignments;
        if (d.contracts) S.contracts = d.contracts;
        if (d.govPayments) S.govPayments = d.govPayments;
        if (d.subPayments) S.subPayments = d.subPayments;
        if (d.settings) { S.settings.company = d.settings.company; S.settings.margin = d.settings.margin; }
        await save();
        updateBadges();
        nav(currentView);
        toast('Data imported and synced to Sheet ✓');
      } catch(e) { toast('Invalid JSON file', true); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ══ MODAL ═════════════════════════════════════════════════════════════════════
function openModal(title,body,footer,protect=false){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalFooter').innerHTML=footer;
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.add('open');
  overlay.dataset.protected = protect ? 'true' : 'false';
}
function closeModal(){
  const overlay = document.getElementById('modalOverlay');
  overlay.classList.remove('open');
  overlay.dataset.protected = 'false';
}
function closeModalOutside(e){
  const overlay = document.getElementById('modalOverlay');
  if(e.target===overlay && overlay.dataset.protected !== 'true') closeModal();
}

// ══ HELPERS ═══════════════════════════════════════════════════════════════════
function v(id){const el=document.getElementById(id);return el?el.value:'';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function trunc(s,n){s=String(s||'');return s.length>n?s.slice(0,n)+'…':s;}
function fmt(n){return parseFloat(n||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fmtDate(s){if(!s)return'—';try{return new Date(s).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch{return s;}}
function isUrgent(s){if(!s)return false;const d=(new Date(s)-new Date())/86400000;return d>=0&&d<=7;}
function postedFrom(){const d=new Date();d.setMonth(d.getMonth()-3);return`${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}/${d.getFullYear()}`;}
function timeAgo(iso){const s=Math.floor((Date.now()-new Date(iso))/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function setQ(el){const ta=document.getElementById('aiQuery');if(ta){ta.value=el.textContent;autoResize(ta);}}
function toast(msg,isErr=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(isErr?' error':'');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

// ══ INIT ══════════════════════════════════════════════════════════════════════
