<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ironwood Solutions — ERP</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0e13;--bg2:#111520;--bg3:#171d2b;--bg4:#1e2638;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --amber:#c47b2b;--amber2:#e8a24a;--amber3:#f5d9a8;
  --cream:#f0e8d8;--mist:#6b7a99;--muted:#3d4a63;
  --green:#2d6a4f;--green2:#52b788;--green3:#d8f3dc;
  --red:#9b2226;--red2:#e63946;--red3:#ffd6d8;
  --blue:#1d3557;--blue2:#457b9d;--blue3:#cce5f5;
  --purple:#4a1942;--purple2:#9b5de5;--purple3:#ede0ff;
  --gold:#c9a84c;--gold2:#f0d080;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --radius:10px;
}
html{height:100%}
body{background:var(--bg);color:var(--cream);font-family:'Outfit',sans-serif;height:100%;display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--muted);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--amber)}
button{cursor:pointer}
input,select,textarea{font-family:'Outfit',sans-serif}
a{color:var(--amber);text-decoration:none}
a:hover{text-decoration:underline}

.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.logo-mark{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.08em;color:var(--amber2);line-height:1;display:block}
.logo-sub{font-family:'DM Mono',monospace;font-size:9px;color:var(--mist);letter-spacing:0.18em;text-transform:uppercase;margin-top:2px}
.sidebar-nav{padding:12px 8px;flex:1}
.nav-section{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.16em;padding:12px 8px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;cursor:pointer;transition:all 0.18s;border:none;background:none;color:var(--mist);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;width:100%;text-align:left}
.nav-item:hover{background:rgba(255,255,255,0.05);color:var(--cream)}
.nav-item.active{background:rgba(196,123,43,0.15);color:var(--amber2)}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--amber);color:var(--bg);font-family:'DM Mono',monospace;font-size:9px;padding:2px 6px;border-radius:8px;font-weight:700}
.sidebar-footer{padding:12px;border-top:1px solid var(--border)}
.sync-status{display:flex;align-items:center;gap:7px;padding:8px 10px;background:var(--bg3);border-radius:6px;margin-bottom:6px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:all 0.3s}
.sync-dot.live{background:var(--green2);box-shadow:0 0 6px var(--green2)}
.sync-dot.syncing{background:var(--amber2);animation:pulse 1s infinite}
.sync-dot.error{background:var(--red2)}
.sync-text{font-family:'DM Mono',monospace;font-size:10px;color:var(--mist)}
@keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.06em;color:var(--cream)}
.topbar-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
.content{flex:1;overflow-y:auto;padding:24px}

.btn{border:none;border-radius:6px;padding:8px 16px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;transition:all 0.18s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--amber);color:var(--bg)}
.btn-primary:hover{background:var(--amber2);transform:translateY(-1px)}
.btn-ghost{background:rgba(255,255,255,0.06);color:var(--mist);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border2);color:var(--cream)}
.btn-danger{background:rgba(230,57,70,0.12);color:var(--red2);border:1px solid rgba(230,57,70,0.25)}
.btn-danger:hover{background:rgba(230,57,70,0.2)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card-title{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--mist);margin-bottom:8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi-amber::before{background:var(--amber)}
.kpi-green::before{background:var(--green2)}
.kpi-blue::before{background:var(--blue2)}
.kpi-purple::before{background:var(--purple2)}
.kpi-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--mist);margin-bottom:8px}
.kpi-value{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:0.04em;color:var(--cream);line-height:1}
.kpi-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--mist);margin-top:4px}

.badge{font-family:'DM Mono',monospace;font-size:10px;padding:3px 8px;border-radius:3px;white-space:nowrap;display:inline-block}
.badge-watching{background:rgba(69,123,157,0.12);color:var(--blue2);border:1px solid rgba(69,123,157,0.25)}
.badge-quoting{background:rgba(196,123,43,0.12);color:var(--amber2);border:1px solid rgba(196,123,43,0.25)}
.badge-submitted{background:rgba(155,93,229,0.12);color:var(--purple2);border:1px solid rgba(155,93,229,0.25)}
.badge-won{background:rgba(82,183,136,0.15);color:var(--green2);border:1px solid rgba(82,183,136,0.3)}
.badge-loss{background:rgba(107,122,153,0.12);color:var(--mist);border:1px solid rgba(107,122,153,0.2)}
.badge-pass{background:rgba(196,123,43,0.1);color:var(--amber2);border:1px solid rgba(196,123,43,0.2)}
.badge-won{background:rgba(82,183,136,0.15);color:var(--green2);border:1px solid rgba(82,183,136,0.3)}
.badge-lost{background:rgba(230,57,70,0.1);color:var(--red2);border:1px solid rgba(230,57,70,0.2)}
.badge-active{background:rgba(82,183,136,0.1);color:var(--green2);border:1px solid rgba(82,183,136,0.25)}
.badge-inactive{background:rgba(107,122,153,0.1);color:var(--mist);border:1px solid rgba(107,122,153,0.2)}
.badge-sources{background:rgba(82,183,136,0.1);color:var(--green2);border:1px solid rgba(82,183,136,0.25)}
.badge-presol{background:rgba(196,123,43,0.1);color:var(--amber2);border:1px solid rgba(196,123,43,0.25)}
.badge-rfp{background:rgba(230,57,70,0.08);color:var(--red2);border:1px solid rgba(230,57,70,0.2)}
.badge-award{background:rgba(107,122,153,0.1);color:var(--mist);border:1px solid rgba(107,122,153,0.2)}
.badge-default{background:rgba(107,122,153,0.08);color:var(--mist);border:1px solid rgba(107,122,153,0.15)}

.form-group{margin-bottom:14px}
.form-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--amber);margin-bottom:6px;display:block}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:9px 12px;color:var(--cream);font-family:'Outfit',sans-serif;font-size:13px;outline:none;transition:border-color 0.2s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--amber)}
.form-input::placeholder,.form-textarea::placeholder{color:var(--muted)}
.form-select option{background:var(--bg3)}
.form-textarea{resize:vertical;min-height:80px;line-height:1.5}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

.table{width:100%;border-collapse:collapse}
.table th{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--mist);padding:10px 12px;border-bottom:1px solid var(--border);text-align:left;font-weight:400}
.table td{padding:11px 12px;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;vertical-align:middle}
.table tr:hover td{background:rgba(255,255,255,0.02)}
.table tr:last-child td{border-bottom:none}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:0.05em;color:var(--cream)}
.divider{height:1px;background:var(--border);margin:20px 0}
.mono{font-family:'DM Mono',monospace}
.muted{color:var(--mist)}
.amber{color:var(--amber2)}
.green{color:var(--green2)}
.red{color:var(--red2)}

.spinner{width:28px;height:28px;border:2px solid rgba(196,123,43,0.2);border-top-color:var(--amber);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.25s ease both}

.empty-state{text-align:center;padding:60px 20px;color:var(--mist)}
.empty-icon{font-size:40px;margin-bottom:12px;display:block;opacity:0.5}
.empty-title{font-size:16px;font-weight:600;color:var(--cream);margin-bottom:6px;opacity:0.7}
.empty-sub{font-size:13px;line-height:1.6}

.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);color:var(--cream);padding:11px 18px;border-radius:8px;font-family:'DM Mono',monospace;font-size:11px;border-left:3px solid var(--amber);z-index:9999;transform:translateY(60px);opacity:0;transition:all 0.3s;pointer-events:none;box-shadow:var(--shadow)}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{border-left-color:var(--red2)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.05em;color:var(--cream)}
.modal-close{background:none;border:none;color:var(--mist);font-size:20px;cursor:pointer;padding:2px 6px;border-radius:4px;transition:color 0.15s}
.modal-close:hover{color:var(--cream)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* SEARCH */
.search-hero-inner{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.ai-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--amber);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.ai-badge{background:rgba(196,123,43,0.15);border:1px solid rgba(196,123,43,0.3);border-radius:3px;padding:2px 6px;font-size:9px;color:var(--amber2)}
.search-row{display:flex;gap:8px}
.search-ta{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:12px 14px;color:var(--cream);font-size:14px;outline:none;resize:none;min-height:48px;max-height:100px;transition:border-color 0.2s;font-family:'Outfit',sans-serif}
.search-ta:focus{border-color:var(--amber)}
.search-ta::placeholder{color:var(--muted);font-style:italic}
.chip{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:14px;padding:4px 11px;font-family:'DM Mono',monospace;font-size:10px;color:var(--mist);cursor:pointer;transition:all 0.18s}
.chip:hover{border-color:var(--amber);color:var(--amber2)}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-sel{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--cream);font-family:'DM Mono',monospace;font-size:11px;outline:none;cursor:pointer}
.filter-sel:focus{border-color:var(--amber)}
.opp-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;transition:all 0.18s;position:relative;overflow:hidden;margin-bottom:10px}
.opp-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--bg4);transition:background 0.2s}
.opp-card:hover{border-color:var(--border2)}
.opp-card:hover::before{background:var(--amber)}
.opp-card.tagged-watching::before{background:var(--blue2)}
.opp-card.tagged-quoting::before{background:var(--amber2)}
.opp-card.tagged-submitted::before{background:var(--purple2)}
.opp-card.tagged-won::before{background:var(--green2)}
.opp-card.tagged-loss::before{background:var(--muted)}
.opp-title{font-size:14px;font-weight:600;color:var(--cream);line-height:1.4;margin-bottom:8px;flex:1;word-break:break-word;overflow-wrap:anywhere}
.opp-meta{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px;word-break:break-word}
.meta-k{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em}
.meta-v{font-family:'DM Mono',monospace;font-size:11px;color:var(--mist)}
.ai-sum{background:rgba(196,123,43,0.05);border-left:2px solid var(--amber);padding:8px 12px;border-radius:0 5px 5px 0;font-size:12px;color:var(--mist);line-height:1.5;font-style:italic;margin:8px 0}
.ai-sum-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--amber);text-transform:uppercase;letter-spacing:0.12em;font-style:normal;margin-bottom:3px}
.opp-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.05);flex-wrap:wrap;gap:8px}
.tag-sel{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:4px 8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--cream);cursor:pointer;outline:none}
.tag-sel:focus{border-color:var(--amber)}

/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;min-width:1100px}
.lane{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:var(--radius);padding:14px;min-height:300px}
.lane-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.lane-title{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.14em}
.lane-watching .lane-title{color:var(--blue2)}
.lane-quoting .lane-title{color:var(--amber2)}
.lane-submitted .lane-title{color:var(--purple2)}
.lane-won .lane-title{color:var(--green2)}
.lane-loss .lane-title{color:var(--mist)}
.lane-pass .lane-title{color:var(--amber2)}
.lane-count{font-family:'DM Mono',monospace;font-size:10px;background:rgba(255,255,255,0.06);border-radius:8px;padding:2px 7px;color:var(--mist)}
.pipe-card{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:12px 13px;margin-bottom:8px;cursor:grab;transition:all 0.18s;position:relative;overflow:hidden}
.pipe-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.lane-watching .pipe-card::before{background:var(--blue2)}
.lane-quoting .pipe-card::before{background:var(--amber2)}
.lane-submitted .pipe-card::before{background:var(--purple2)}
.lane-won .pipe-card::before{background:var(--green2)}
.lane-loss .pipe-card::before{background:var(--muted)}
.lane-pass .pipe-card::before{background:var(--amber2)}
.pipe-card:hover{border-color:var(--border2);box-shadow:0 4px 16px rgba(0,0,0,0.3)}
.pipe-card:active{cursor:grabbing}
.pipe-title{font-size:12px;font-weight:600;color:var(--cream);line-height:1.4;margin-bottom:7px}
.pipe-meta{font-family:'DM Mono',monospace;font-size:10px;color:var(--mist);margin-bottom:3px}
.pipe-actions{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.05)}
.move-sel{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:2px 6px;font-family:'DM Mono',monospace;font-size:10px;color:var(--mist);cursor:pointer;outline:none}
.rm-btn{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:2px 4px;border-radius:3px;transition:color 0.15s}
.rm-btn:hover{color:var(--red2)}
.empty-lane{text-align:center;padding:24px 10px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);border:1px dashed rgba(255,255,255,0.06);border-radius:6px}
.kanban-wrap{overflow-x:auto;padding-bottom:8px}

/* SUBS */
.sub-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.sub-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:all 0.18s}
.sub-card:hover{border-color:var(--border2)}
.sub-name{font-size:15px;font-weight:700;color:var(--cream);margin-bottom:4px}
.sub-trade{font-family:'DM Mono',monospace;font-size:10px;color:var(--amber2);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:10px}
.sub-detail{font-family:'DM Mono',monospace;font-size:11px;color:var(--mist);margin-bottom:3px}
.sub-detail span{color:var(--cream)}
.star{color:var(--amber);font-size:12px}
.star.empty{color:var(--muted)}

/* FINANCIALS */
.fin-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.fin-row:last-child{border-bottom:none}
.fin-label{font-size:13px;color:var(--cream)}
.fin-amount{font-family:'DM Mono',monospace;font-size:13px;font-weight:600}
.fin-positive{color:var(--green2)}
.fin-negative{color:var(--red2)}
.fin-neutral{color:var(--mist)}
.inv-status{display:inline-block;padding:3px 8px;border-radius:3px;font-family:'DM Mono',monospace;font-size:10px}
.inv-paid{background:rgba(82,183,136,0.12);color:var(--green2);border:1px solid rgba(82,183,136,0.25)}
.inv-pending{background:rgba(196,123,43,0.1);color:var(--amber2);border:1px solid rgba(196,123,43,0.25)}
.inv-overdue{background:rgba(230,57,70,0.1);color:var(--red2);border:1px solid rgba(230,57,70,0.2)}
.margin-bar{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-top:6px}
.margin-fill{height:100%;background:linear-gradient(90deg,var(--red2),var(--amber),var(--green2));border-radius:4px;transition:width 0.4s}

/* ACTIVITY */
.activity-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.activity-text{font-size:13px;color:var(--cream);line-height:1.4}
.activity-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--mist);margin-top:2px}
.deadline-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.deadline-item:last-child{border-bottom:none}
.deadline-name{font-size:13px;color:var(--cream);flex:1;padding-right:12px}
.deadline-days{font-family:'DM Mono',monospace;font-size:11px;padding:3px 8px;border-radius:4px}
.deadline-urgent{background:rgba(230,57,70,0.12);color:var(--red2)}
.deadline-soon{background:rgba(196,123,43,0.12);color:var(--amber2)}

/* SUB ASSIGNMENTS */
.opp-detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}

.assign-confirmed{background:rgba(196,123,43,0.12);color:var(--amber2);border:1px solid rgba(196,123,43,0.25)}

.assign-active{background:rgba(82,183,136,0.12);color:var(--green2);border:1px solid rgba(82,183,136,0.25)}

.setting-group-title{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.14em;color:var(--amber);margin-bottom:14px}

<script>
// ══ CONFIG ════════════════════════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbwjZ1oFoCkQEexbMBh6kNuVXxVKqsxwM90QeWGUYqQDv-igTxKc0zUoPdaoWJbfPL4v/exec';
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1WkRuNrJNVsX6dfqol55WntASmrgqAXaB_FsGriZyCZ8/edit';
const SECRET = 'ironwood2024erp';
const SAM_KEY_STORE = 'iw_sam_key';
const SAM_KEY_DATE_STORE = 'iw_sam_key_date'; // ISO date when key was last saved
const DRIVE_CLIENT_ID_STORE = 'iw_drive_client_id';
const DRIVE_FOLDER_STORE = 'iw_drive_folder';

// ══ STATE ═════════════════════════════════════════════════════════════════════
const S = {
  pipeline: {},
  subs: [],
  quotes: [],
  invoices: [],
  agencies: [],
  winloss: [],
  activity: [],
  subAssignments: [],
  contracts: [],
  govPayments: [],
  subPayments: [],
  attachments: [],
  settings: { company: 'Ironwood Solutions', margin: 15, samKey: '' }
};

let currentView = 'dashboard';
let searchOffset = 0, searchTotal = 0, searchLimit = 25;
let lastKeywords = '';
let dragPid = null;
let syncing = false;

const TAG_LABELS = { watching:'Watching', quoting:'Quoting', submitted:'Bid Submitted', won:'Contract Won', loss:'Loss', pass:'Pass' };
const NOTICE_LABELS = { o:'Sources Sought', p:'Pre-Solicitation', k:'Combined Synopsis', r:'RFP', a:'Award', s:'Special' };
const NOTICE_BADGE  = { o:'badge-sources', p:'badge-presol', k:'badge-presol', r:'badge-rfp', a:'badge-award' };
const TABS = ['Pipeline','Subcontractors','Quotes','Invoices','Agencies','WinLoss','Activity','Settings','SubAssignments','Contracts','GovPayments','SubPayments','Attachments'];






// Attachments serialization
function attachmentsToRows() {
  const rows = [['attachId','recordType','recordId','fileName','fileType','driveFileId','driveUrl','uploadDate','uploadedBy']];
  S.attachments.forEach(a => rows.push([
    a.attachId||'', a.recordType||'', a.recordId||'', a.fileName||'',
    a.fileType||'', a.driveFileId||'', a.driveUrl||'',
    a.uploadDate||'', a.uploadedBy||''
  ]));
  return rows;
}
function rowsToAttachments(rows) {
  return rows.slice(1).filter(r=>r[0]).map(r=>({
    attachId:r[0], recordType:r[1], recordId:r[2], fileName:r[3],
    fileType:r[4], driveFileId:r[5], driveUrl:r[6],
    uploadDate:r[7], uploadedBy:r[8]||''
  }));
}

// SubPayments serialization
function subPaymentsToRows() {
  const rows = [['payId','contractId','subName','description','dueDate','paidDate','amount','status','govPayId','notes']];
  S.subPayments.forEach(p => rows.push([
    p.payId||'', p.contractId||'', p.subName||'', p.description||'',
    p.dueDate||'', p.paidDate||'', p.amount||0,
    p.status||'pending', p.govPayId||'', p.notes||''
  ]));
  return rows;
}
function rowsToSubPayments(rows) {
  return rows.slice(1).filter(r=>r[0]).map(r=>({
    payId:r[0], contractId:r[1], subName:r[2], description:r[3],
    dueDate:r[4], paidDate:r[5], amount:parseFloat(r[6])||0,
    status:r[7]||'pending', govPayId:r[8]||'', notes:r[9]||''
  }));
}

// GovPayments serialization
function govPaymentsToRows() {
  const rows = [['payId','contractId','description','scheduledDate','receivedDate','amount','status','notes']];
  S.govPayments.forEach(p => rows.push([
    p.payId||'', p.contractId||'', p.description||'',
    p.scheduledDate||'', p.receivedDate||'',
    p.amount||0, p.status||'scheduled', p.notes||''
  ]));
  return rows;
}
function rowsToGovPayments(rows) {
  return rows.slice(1).filter(r=>r[0]).map(r=>({
    payId:r[0], contractId:r[1], description:r[2],
    scheduledDate:r[3], receivedDate:r[4],
    amount:parseFloat(r[5])||0, status:r[6]||'scheduled', notes:r[7]||''
  }));
}

// Contracts serialization
function contractsToRows() {
  const rows = [['contractId','oppId','title','agency','contractNum','poNum','totalValue','startDate','endDate','status','paymentCadence','paymentAmount','paymentDay','netTermsGov','netTermsSub','retainage','notes','optionYears']];
  S.contracts.forEach(c => rows.push([
    c.contractId||'', c.oppId||'', c.title||'', c.agency||'',
    c.contractNum||'', c.poNum||'', c.totalValue||0,
    c.startDate||'', c.endDate||'', c.status||'active',
    c.paymentCadence||'monthly', c.paymentAmount||0, c.paymentDay||1,
    c.netTermsGov||30, c.netTermsSub||30, c.retainage||0, c.notes||'',
    JSON.stringify(c.optionYears||[])
  ]));
  return rows;
}
function rowsToContracts(rows) {
  return rows.slice(1).filter(r=>r[0]).map(r=>({
    contractId:r[0], oppId:r[1], title:r[2], agency:r[3],
    contractNum:r[4], poNum:r[5], totalValue:parseFloat(r[6])||0,
    startDate:r[7], endDate:r[8], status:r[9],
    paymentCadence:r[10], paymentAmount:parseFloat(r[11])||0,
    paymentDay:parseInt(r[12])||1, netTermsGov:parseInt(r[13])||30,
    netTermsSub:parseInt(r[14])||30, retainage:parseFloat(r[15])||0, notes:r[16]||'',
    optionYears: (() => { try { return JSON.parse(r[17]||'[]'); } catch(e) { return []; } })()
  }));
}

// SubAssignments serialization
function subAssignmentsToRows() {
  const rows = [['assignId','oppId','contractId','subName','scope','quotedAmount','status','notes']];
  S.subAssignments.forEach(a => rows.push([a.assignId||'',a.oppId||'',a.contractId||'',a.subName||'',a.scope||'',a.quotedAmount||0,a.status||'proposed',a.notes||'']));
  return rows;
}
function rowsToSubAssignments(rows) {
  return rows.slice(1).filter(r=>r[0]).map(r=>({assignId:r[0],oppId:r[1],contractId:r[2],subName:r[3],scope:r[4],quotedAmount:parseFloat(r[5])||0,status:r[6],notes:r[7]}));
}

// ══ GOOGLE SHEETS SYNC ════════════════════════════════════════════════════════
function setSyncStatus(state, msg) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  dot.className = 'sync-dot';
  if (state === 'live') { dot.classList.add('live'); txt.textContent = msg || 'Synced'; }
  else if (state === 'syncing') { dot.classList.add('syncing'); txt.textContent = msg || 'Syncing…'; }
  else if (state === 'error') { dot.classList.add('error'); txt.textContent = msg || 'Sync error'; }
  else { txt.textContent = msg || 'Not synced'; }
}

async function sheetRead(tab) {
  const url = `${API_URL}?token=${SECRET}&action=read&tab=${tab}&sheetUrl=${encodeURIComponent(SHEET_URL)}`;
  const res = await fetch(url);
  const d = await res.json();
  if (d.error) throw new Error(d.error);
  return d.data || [];
}

async function sheetWrite(tab, rows) {
  // Use GET with encoded payload — POST triggers CORS preflight that Apps Script blocks
  const payload = encodeURIComponent(JSON.stringify(rows));
  const url = `${API_URL}?token=${SECRET}&action=write&tab=${tab}&sheetUrl=${encodeURIComponent(SHEET_URL)}&rows=${payload}`;
  // URL length guard — Sheets rows can be large
  if (url.length < 8000) {
    const res = await fetch(url);
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    return true;
  }
  // Large payload fallback: POST with text/plain to avoid preflight
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ token: SECRET, action: 'write', tab, sheetUrl: SHEET_URL, rows })
  });
  const d = await res.json();
  if (d.error) throw new Error(d.error);
  return true;
}

// Serialize/deserialize each module to/from sheet rows
function pipelineToRows() {
  const rows = [['pid','tag','title','agency','naics','solNum','deadline','url','notes','solNum2','finalBid','prevContractValue','prevContractSource','description','aiSummary','aiSummaryDate']];
  Object.entries(S.pipeline).forEach(([pid, p]) => rows.push([
    pid, p.tag||'', p.title||'', p.agency||'', p.naics||'',
    p.solNum||'', p.deadline||'', p.url||'', p.notes||'',
    p.solNum||'', p.finalBid||0, p.prevContractValue||0, p.prevContractSource||'',
    p.description||'', p.aiSummary||'', p.aiSummaryDate||''
  ]));
  return rows;
}
function rowsToPipeline(rows) {
  const p = {};
  rows.slice(1).forEach(r => {
    if (r[0]) p[r[0]] = {
      tag:r[1], title:r[2], agency:r[3], naics:r[4],
      solNum:r[5], deadline:r[6], url:r[7],
      notes:r[8]||'', finalBid:parseFloat(r[10])||0,
      prevContractValue:parseFloat(r[11])||0, prevContractSource:r[12]||'',
      description:r[13]||'', aiSummary:r[14]||'', aiSummaryDate:r[15]||''
    };
  });
  return p;
}
function subsToRows() {
  const rows = [['name','trade','phone','email','naics','samStatus','insExpiry','status','rating','notes']];
  S.subs.forEach(s => rows.push([s.name||'',s.trade||'',s.phone||'',s.email||'',s.naics||'',s.samStatus||'',s.insExpiry||'',s.status||'active',s.rating||0,s.notes||'']));

function quotesToRows() {
  const rows = [['name','opportunity','marginPct','created','lines']];
  S.quotes.forEach(q => rows.push([q.name||'',q.opportunity||'',q.marginPct||15,q.created||'',JSON.stringify(q.lines||[])]));

function rowsToQuotes(rows) { return rows.slice(1).filter(r=>r[0]).map(r=>({name:r[0],opportunity:r[1],marginPct:parseFloat(r[2])||15,created:r[3],lines:JSON.parse(r[4]||'[]')})); }
function invoicesToRows() {

  S.invoices.forEach(i => rows.push([i.desc||'',i.amount||0,i.date||'',i.type||'income',i.status||'pending']));

function rowsToInvoices(rows) { return rows.slice(1).filter(r=>r[0]).map(r=>({desc:r[0],amount:parseFloat(r[1])||0,date:r[2],type:r[3],status:r[4]})); }
function agenciesToRows() {

function rowsToAgencies(rows) { return rows.slice(1).filter(r=>r[0]).map(r=>({name:r[0],abbr:r[1],lastContact:r[2],notes:r[3],contacts:JSON.parse(r[4]||'[]')})); }
function wlToRows() {

  S.winloss.forEach(w => rows.push([w.name||'',w.agency||'',w.value||0,w.outcome||'',w.date||'',w.reason||'']));

function rowsToWL(rows) { return rows.slice(1).filter(r=>r[0]).map(r=>({name:r[0],agency:r[1],value:parseFloat(r[2])||0,outcome:r[3],date:r[4],reason:r[5]})); }
function activityToRows() {

function settingsToRows() { return [['key','value'],['company',S.settings.company||'Ironwood Solutions'],['margin',S.settings.margin||15]]; }

async function syncToSheet(tab) {
  const map = {
    Pipeline: pipelineToRows, Subcontractors: subsToRows, Quotes: quotesToRows,
    Invoices: invoicesToRows, Agencies: agenciesToRows, WinLoss: wlToRows,
    Activity: activityToRows, Settings: settingsToRows,
    SubAssignments: subAssignmentsToRows,
    Contracts: contractsToRows,
    GovPayments: govPaymentsToRows,
    SubPayments: subPaymentsToRows,
    Attachments: attachmentsToRows
  };
  if (map[tab]) await sheetWrite(tab, map[tab]());
}

async function loadFromSheet() {
  setSyncStatus('syncing', 'Loading…');
  try {
    // Load all tabs in parallel, fall back to empty arrays on individual tab failures
    const safe = async (tab, fallback) => { try { return await sheetRead(tab); } catch(e) { console.warn(`Tab load failed: ${tab}`, e.message); return fallback; } };
    const [pipe, subs, quotes, inv, ag, wl, act, settings, sa, contracts, govpay, subpay, attachs] = await Promise.all([
      safe('Pipeline', [['pid','tag','title','agency','naics','solNum','deadline','url','notes','solNum2','finalBid','prevContractValue','prevContractSource']]),
      safe('Subcontractors', [['name','trade','phone','email','naics','samStatus','insExpiry','status','rating','notes']]),
      safe('Quotes', [['name','opportunity','marginPct','created','lines']]),
      safe('Invoices', [['desc','amount','date','type','status']]),
      safe('Agencies', [['name','abbr','lastContact','notes','contacts']]),
      safe('WinLoss', [['name','agency','value','outcome','date','reason']]),
      safe('Activity', [['text','color','time']]),
      safe('Settings', [['key','value']]),
      safe('SubAssignments', [['assignId','oppId','contractId','subName','scope','quotedAmount','status','notes']]),
      safe('Contracts', [['contractId','oppId','title','agency','contractNum','poNum','totalValue','startDate','endDate','status','paymentCadence','paymentAmount','paymentDay','netTermsGov','netTermsSub','retainage','notes']]),
      safe('GovPayments', [['payId','contractId','description','scheduledDate','receivedDate','amount','status','notes']]),
      safe('SubPayments', [['payId','contractId','subName','description','dueDate','paidDate','amount','status','govPayId','notes']]),
      safe('Attachments', [['attachId','recordType','recordId','fileName','fileType','driveFileId','driveUrl','uploadDate','uploadedBy']]),
    ]);
    S.pipeline = rowsToPipeline(pipe);
    S.subs = rowsToSubs(subs);
    S.quotes = rowsToQuotes(quotes);
    S.invoices = rowsToInvoices(inv);
    S.agencies = rowsToAgencies(ag);
    S.winloss = rowsToWL(wl);
    S.activity = rowsToActivity(act);
    S.settings = rowsToSettings(settings);
    S.subAssignments = rowsToSubAssignments(sa);
    S.contracts = rowsToContracts(contracts);
    S.govPayments = rowsToGovPayments(govpay);
    S.subPayments = rowsToSubPayments(subpay);
    S.attachments = rowsToAttachments(attachs);
    S.settings.samKey = localStorage.getItem(SAM_KEY_STORE) || '';
S.settings.driveClientId = localStorage.getItem(DRIVE_CLIENT_ID_STORE) || '';
S.settings.driveFolderName = localStorage.getItem(DRIVE_FOLDER_STORE) || 'Ironwood ERP Attachments';
    setSyncStatus('live', 'Synced');
    updateBadges();
    renderView(currentView);
    toast('Data loaded from Google Sheets ✓');
  } catch(e) {
    setSyncStatus('error', 'Sync failed');
    toast('Sync error: ' + e.message + ' — check your Apps Script deployment', true);
  }
}

async function save(tab) {
  setSyncStatus('syncing', 'Saving…');
  try {
    if (tab) await syncToSheet(tab);
    else await Promise.all(TABS.map(t => syncToSheet(t)));
    setSyncStatus('live', 'Saved ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}));
  } catch(e) {
    setSyncStatus('error', 'Save failed');
    toast('Save error — check your connection', true);
  }
}

      <input class="filter-sel" id="pfNaics" type="text" placeholder="NAICS (e.g. 5617)" oninput="applyPostFilters()" style="max-width:140px">
      <select class="filter-sel" id="pfNotice" onchange="applyPostFilters()"><option value="">Any Type</option></select>
      <select class="filter-sel" id="pfDeadline" onchange="applyPostFilters()">
        <option value="">Any Deadline</option>
        <option value="7">Due ≥ 7 days out</option>
        <option value="14">Due ≥ 14 days out</option>
        <option value="30">Due ≥ 30 days out</option>
        <option value="60">Due ≥ 60 days out</option>
        <option value="active">Not yet expired</option>
      </select>
      <button class="btn btn-ghost btn-sm" onclick="clearPostFilters()">Clear</button>
      <span id="postFilterCount" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--amber2);align-self:center;margin-left:auto"></span>
    </div>
  </div>
  <div id="searchResults"><div class="empty-state"><span class="empty-icon">🌲</span><div class="empty-title">Ready to Hunt</div><div class="empty-sub">Set your filters above and click Pull Opportunities. Defaults to Small Business set-asides.</div></div></div>
  <div id="searchPag" style="display:none;justify-content:center;align-items:center;gap:16px;padding:24px 0">
    <button class="btn btn-ghost btn-sm" id="prevBtn" onclick="changePage(-1)">← Prev</button>
    <span class="mono muted" id="pageInfo"></span>
    <button class="btn btn-ghost btn-sm" id="nextBtn" onclick="changePage(1)">Next →</button>
  </div>`;
  // Restore from localStorage cache if memory is empty (e.g. after refresh)
  if ((!window._allOpps || !window._allOpps.length)) {
    try {
      const cached = JSON.parse(localStorage.getItem('iw_last_pull') || 'null');
      if (cached && cached.opps && cached.opps.length) {
        window._allOpps = cached.opps;
        window._lastPullAt = cached.at;
      }
    } catch(e) { /* no cache */ }
  }
  // Restore previous pull if results exist
  if (window._allOpps && window._allOpps.length) {
    const pfBar = document.getElementById('postFilterBar');
    if (pfBar) pfBar.style.display = 'block';
    // Repopulate post-filter notice dropdown
    const noticeTypes = [...new Set(window._allOpps.map(o => o.type).filter(Boolean))].sort();
    const pfNotice = document.getElementById('pfNotice');
    if (pfNotice) pfNotice.innerHTML = '<option value="">Any Type</option>' + noticeTypes.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');
    // Show cached pull banner
    if (window._lastPullAt) {
      const ageMin = Math.round((new Date() - new Date(window._lastPullAt)) / 60000);
      const ageLabel = ageMin < 1 ? 'just now' : ageMin < 60 ? ageMin+' min ago' : Math.round(ageMin/60)+' hr ago';
      const sr = document.getElementById('searchResults');
      if (sr) {
        const banner = document.createElement('div');
        banner.innerHTML = `<div style="padding:8px 14px;background:rgba(69,123,157,0.08);border:1px solid rgba(69,123,157,0.2);border-radius:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--blue2);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px"><span>📦 Showing cached pull from ${ageLabel} (${window._allOpps.length} opps) — no API call used</span><button class="btn btn-ghost btn-xs" onclick="clearPullCache()">Clear cache</button></div>`;
        sr.parentNode.insertBefore(banner.firstChild, sr);
      }
    }
    setTimeout(() => applyPostFilters(), 50);
  }
}

function clearPullCache() {

async function doSearch() {
  const samKey = localStorage.getItem(SAM_KEY_STORE) || S.settings.samKey || '';
  if (!samKey) { toast('Add your SAM.gov API key in Settings first', true); nav('settings'); return; }

  const btn = document.getElementById('searchBtn');
  if (btn) btn.disabled = true;

  // Pre-pull filters sent to SAM.gov
  const fNotice = document.getElementById('fNotice')?.value || '';
  const fSetAside = document.getElementById('fSetAside')?.value || '';
  const fState = document.getElementById('fState')?.value || '';

  showSearchSpinner('Pulling up to 1000 opportunities from SAM.gov…');

  try {
    const params = new URLSearchParams({
      token: SECRET, action: 'samgov', sheetUrl: SHEET_URL,
      samKey,
      limit: 1000,
      offset: 0,
      postedFrom: postedFrom(),
      postedTo: `${String(new Date().getMonth()+1).padStart(2,'0')}/${String(new Date().getDate()).padStart(2,'0')}/${new Date().getFullYear()}`
    });
    // 'biddable' is a client-side filter (Sol + Combined), don't send to API
    if (fNotice && fNotice !== 'biddable') params.set('noticeType', fNotice);
    if (fSetAside) params.set('typeOfSetAside', fSetAside);
    if (fState) params.set('placeOfPerformanceState', fState);

    const res = await fetch(`${API_URL}?${params}`);
    if (!res.ok) throw new Error(`Proxy ${res.status}`);
    const proxy = await res.json();
    if (proxy.error) {
      if (proxy.error.includes('429') || proxy.error.includes('quota')) {
        localStorage.setItem('iw_sam_quota_hit', new Date().toISOString());
        throw new Error('SAM.gov: ' + proxy.error);
      }
      throw new Error(proxy.error);
    }

    let results = (proxy.data || proxy).opportunitiesData || [];
    searchTotal = (proxy.data || proxy).totalRecords || results.length;

    // Biddable filter — keep only Solicitation and Combined Synopsis/Solicitation
    if (fNotice === 'biddable') {
      results = results.filter(o => {
        const t = (o.type||'').toLowerCase();
        // Exclude pre-solicitation explicitly (it contains "solicitation")
        if (t.includes('presolicitation') || t.includes('pre-solicitation') || t.includes('pre solicitation')) return false;
        return t.includes('solicitation') || t.includes('combined');
      });
    }

    // Minimum lead time filter — drop opportunities due in < 7 days (not enough time to bid)
    const minDaysEl = document.getElementById('fMinDays');
    const minDays = minDaysEl ? parseInt(minDaysEl.value) : 7;
    if (minDays > 0) {
      const nowMs = new Date();
      results = results.filter(o => {
        if (!o.responseDeadLine) return true; // keep ones with no deadline
        const days = Math.ceil((new Date(o.responseDeadLine) - nowMs) / 86400000);
        return days >= minDays;
      });
    }

    // Sort by deadline soonest, expired pushed to end
    const now = new Date();
    results.sort((a, b) => {
      const dA = a.responseDeadLine ? new Date(a.responseDeadLine) : new Date('2099-01-01');
      const dB = b.responseDeadLine ? new Date(b.responseDeadLine) : new Date('2099-01-01');
      if (dA < now && dB >= now) return 1;
      if (dB < now && dA >= now) return -1;
      return dA - dB;
    });

    // Store the full pulled set for client-side filtering
    window._allOpps = results;
    window._lastPullAt = null;
    // Cache to localStorage so results survive a page refresh
    try {
      localStorage.setItem('iw_last_pull', JSON.stringify({ at: new Date().toISOString(), opps: results }));
    } catch(e) { /* localStorage full — skip cache */ }

    // Populate the post-filter notice type dropdown with what's actually present
    const noticeTypes = [...new Set(results.map(o => o.type).filter(Boolean))].sort();
    const pfNotice = document.getElementById('pfNotice');
    if (pfNotice) {
      pfNotice.innerHTML = '<option value="">Any Type</option>' + noticeTypes.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');
    }

    // Show the post-filter bar
    const pfBar = document.getElementById('postFilterBar');
    if (pfBar) pfBar.style.display = 'block';

    // Clear any existing post-filters
    ['pfKeyword','pfNaics'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
    ['pfNotice','pfDeadline'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });

    toast(`Pulled ${results.length} ${fNotice==='biddable'?'biddable ':''}opportunit${results.length===1?'y':'ies'} ✓`);
    renderSearchResults(results, 'federal contract opportunities');

  } catch(e) {
    if (e.message.includes('quota') || e.message.includes('429')) {
      localStorage.setItem('iw_sam_quota_hit', new Date().toISOString());
    }
    showSearchErr(`SAM.gov error: ${e.message}`);
  } finally {
    if (btn) btn.disabled = false;
  }
}

function applyPostFilters() {
  const all = window._allOpps || [];
  const kw = (document.getElementById('pfKeyword')?.value || '').toLowerCase().trim();
  const naics = (document.getElementById('pfNaics')?.value || '').trim();
  const notice = document.getElementById('pfNotice')?.value || '';
  const deadlineFilter = document.getElementById('pfDeadline')?.value || '';
  const now = new Date();

  let filtered = all.filter(o => {
    // Keyword in title or description
    if (kw) {
      const text = ((o.title||'') + ' ' + (o.description||'')).toLowerCase();
      if (!text.includes(kw)) return false;
    }
    // NAICS prefix match
    if (naics) {
      if (!(o.naicsCode||'').toString().startsWith(naics)) return false;
    }
    // Notice type
    if (notice && o.type !== notice) return false;
    // Deadline range — show opportunities due AT LEAST X days out (more lead time)
    if (deadlineFilter) {
      const dl = o.responseDeadLine ? new Date(o.responseDeadLine) : null;
      if (!dl) return false;
      const days = Math.ceil((dl - now) / 86400000);
      if (deadlineFilter === 'active') {
        if (days < 0) return false;
      } else {
        const min = parseInt(deadlineFilter);
        if (days < min) return false;
      }
    }
    return true;
  });

  // Update count banner
  const cnt = document.getElementById('postFilterCount');
  if (cnt) cnt.textContent = `${filtered.length} of ${all.length}`;

  renderSearchResults(filtered, 'filtered opportunities');
}

function clearPostFilters() {
  ['pfKeyword','pfNaics'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  ['pfNotice','pfDeadline'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  renderSearchResults(window._allOpps || [], 'all opportunities');
}

    el.innerHTML = '<div class="empty-state"><span class="empty-icon">🔍</span><div class="empty-title">No Results</div><div class="empty-sub">Try different filters or a broader keyword.</div></div>';

    const pid = o.noticeId || o.solicitationNumber || btoa(o.title||'').slice(0,12);
    const deadline = o.responseDeadLine || '';  // full ISO with time
    const deadlineTime = o.responseDeadLine && o.responseDeadLine.includes('T') ? o.responseDeadLine.split('T')[1].slice(0,5) : '';
    const inPipe = S.pipeline[pid];
    const daysLeft = deadline ? Math.ceil((new Date(deadline)-new Date())/86400000) : null;
    const urgent = daysLeft !== null && daysLeft <= 7 && daysLeft >= 0;
    const expired = daysLeft !== null && daysLeft < 0;

    // Extract all available fields
    const setAside = o.typeOfSetAsideDescription || o.typeOfSetAside || '';
    const noticeType = NOTICE_LABELS[(o.type||'').toLowerCase()] || o.type || '';
    const pop = o.placeOfPerformance || {};
    const popCity = pop.city?.name || '';
    const popState = pop.state?.code || pop.state?.name || '';
    const popLocation = [popCity, popState].filter(Boolean).join(', ');
    const psc = o.classificationCode || '';
    const naicsDesc = o.naicsDescription || '';
    const office = o.officeAddress?.city ? `${o.officeAddress.city}, ${o.officeAddress.state||''}` : '';
    const poc = (o.pointOfContact && o.pointOfContact[0]) || {};
    const pocName = poc.fullName || poc.name || '';
    const pocEmail = poc.email || '';
    const awardAmt = o.award?.amount ? parseFloat(o.award.amount) : 0;
    const awardee = o.award?.awardee?.name || '';
    const descPreview = o.description && !o.description.startsWith('http') ? trunc(o.description.replace(/<[^>]*>/g,'').replace(/\s+/g,' ').trim(), 600) : '';

    // Build detail chips
    const chips = [];
    if (o.naicsCode) chips.push(['NAICS', o.naicsCode + (naicsDesc?' · '+trunc(naicsDesc,28):'')]);
    if (psc) chips.push(['PSC', psc]);
    if (setAside) chips.push(['Set-Aside', trunc(setAside,30)]);
    if (popLocation) chips.push(['Place of Perf.', popLocation]);
    if (o.solicitationNumber) chips.push(['Sol #', o.solicitationNumber]);
    if (awardAmt > 0) chips.push(['Award', '$'+fmt(awardAmt)]);
    if (awardee) chips.push(['Awardee', trunc(awardee,28)]);

    return '<div class="opp-card">'
      +'<div class="opp-card-header">'
      +'<div style="flex:1;min-width:0">'
      +'<div class="opp-title">'+esc(o.title||'Untitled')+'</div>'
      +'<div class="opp-meta">'
      +'<span class="meta-agency">'+esc(o.fullParentPathName||o.departmentName||'')+'</span>'
      +(noticeType?'<span class="meta-naics">'+esc(noticeType)+'</span>':'')
      +'<span class="meta-posted">Posted '+fmtDate(o.postedDate)+'</span>'
      +'</div></div>'
      +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">'
      +(deadline?'<span class="deadline-badge '+(urgent?'deadline-urgent':expired?'deadline-expired':'')+'">'+(expired?'Expired ':urgent?'Due soon: ':'Due: ')+fmtDate(deadline)+(daysLeft!==null&&!expired?' ('+daysLeft+'d)':'')+'</span>':'')
      +(deadlineTime&&!expired?'<span class="mono muted" style="font-size:10px">by '+deadlineTime+' local</span>':'')
      +'</div></div>'
      // Detail chip grid
      +(chips.length?'<div style="display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 4px">'
        +chips.map(([k,v])=>'<span style="display:inline-flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-family:\'DM Mono\',monospace;font-size:10px"><span style="color:var(--muted)">'+esc(k)+'</span><span style="color:var(--cream)">'+esc(v)+'</span></span>').join('')
        +'</div>':'')
      // Description preview
      +(descPreview?'<div style="font-size:12px;color:var(--mist);line-height:1.5;margin:6px 0;padding:8px 10px;background:var(--bg2);border-radius:6px;border-left:2px solid var(--border)">'+esc(descPreview)+'</div>':'')
      // Contact
      +((pocName||pocEmail)?'<div class="mono muted" style="font-size:10px;margin:4px 0">👤 '+esc(pocName||'Contact')+(pocEmail?' · <a href="mailto:'+esc(pocEmail)+'" style="color:var(--blue2)">'+esc(pocEmail)+'</a>':'')+'</div>':'')
      +'<div class="opp-card-footer">'
      +(inPipe?'<span class="mono muted" style="font-size:11px">✓ In pipeline: '+(TAG_LABELS[inPipe.tag]||inPipe.tag)+'</span>'
        :'<button class="btn btn-primary btn-sm" data-pid="'+pid+'" data-meta="'+esc(JSON.stringify({title:o.title||'Untitled',agency:trunc(o.fullParentPathName||o.departmentName||'',50),naics:o.naicsCode||'',solNum:o.solicitationNumber||'',deadline,url:o.uiLink||'https://sam.gov',description:trunc(o.description||'',1000)}))+'" onclick="addToWatching(this)">+ Add to Watching</button>')
      +(o.uiLink?'<a class="btn btn-ghost btn-sm" href="'+esc(o.uiLink)+'" target="_blank">View on SAM →</a>':'')
      +'</div></div>';
  }).join('');
  if (pag) pag.style.display = 'none';
}

async function genOppInfoSummary(pid) {
  const p = S.pipeline[pid];

  el.innerHTML = '<span style="color:var(--muted)">● Analyzing opportunity…</span>';
  try {
    const descText = p.description && !p.description.startsWith('http') ? trunc(p.description.replace(/<[^>]*>/g,''), 500) : '';
    const aiText = await callAI('3-4 sentences. Assess this federal contract for a small business prime that manages subcontractors. Cover: is it a good fit, what work would be subbed out, and any risks or things to watch. Direct, no labels or headers.\nTitle:'+p.title+'\nAgency:'+p.agency+'\nNAICS:'+p.naics+'\nDeadline:'+fmtDate(p.deadline)+'\nDesc:'+descText, 250);

function addToWatching(btn) {
  const pid = btn.dataset.pid;
  const metaRaw = btn.dataset.meta;
  if (!pid || !metaRaw) return;
  try {
    const meta = JSON.parse(metaRaw);
    tagOpp(pid, 'watching', meta);
    btn.outerHTML = '<span class="mono muted" style="font-size:11px">✓ In pipeline: Watching</span>';
  } catch(e) {
    toast('Error adding to pipeline', true);
  }
}

function tagOppFromSelect(sel) {
  const pid = sel.dataset.pid;
  const tag = sel.value;
  const metaRaw = sel.dataset.meta;
  if (!pid || !tag || !metaRaw) return;
  try {
    const meta = JSON.parse(metaRaw);
    tagOpp(pid, tag, meta);
  } catch(e) {
    toast('Error reading opportunity data', true);
  }
}

async function tagOpp(pid, tag, meta) {
  if (!tag) {
    delete S.pipeline[pid];
    logActivity('Removed opportunity from pipeline', 'var(--mist)');
  } else {
    const existing = S.pipeline[pid] || {};
    S.pipeline[pid] = {
      ...existing,
      pid,
      tag,
      title: meta.title || existing.title || '',
      agency: meta.agency || existing.agency || '',
      naics: meta.naics || existing.naics || '',
      solNum: meta.solNum || existing.solNum || '',
      deadline: meta.deadline || existing.deadline || '',
      url: meta.url || existing.url || '',
      description: meta.description || existing.description || '',
      notes: existing.notes || ''
    };
    logActivity(`Tagged "${trunc(meta.title||'',40)}" as ${TAG_LABELS[tag]||tag}`, 'var(--green2)');
    toast(`Added to pipeline: ${TAG_LABELS[tag]||tag} ✓`);
  }
  updateBadges();
  await save('Pipeline');
}

  const daysLeft = p.deadline ? Math.ceil((new Date(p.deadline)-new Date())/86400000) : null;

  const expired = daysLeft !== null && daysLeft < 0;
  const descPreview = p.description && !p.description.startsWith('http')
    ? trunc(p.description.replace(/<[^>]*>/g,'').replace(/\s+/g,' ').trim(), 120) : '';
  const dl = p.deadline
    ? `<div class="pipe-meta" style="margin-top:3px">📅 <span style="color:${urgent?'var(--red2)':expired?'var(--muted)':'var(--cream)'}">${expired?'Expired ':'Due '}${fmtDateTime(p.deadline)}${daysLeft!==null&&!expired?` (${daysLeft}d)`:''}</span></div>`

async function dropCard(e, newTag) {
  e.preventDefault();
  const pid=e.dataTransfer.getData('text/plain')||dragPid;
  if(pid&&S.pipeline[pid]){S.pipeline[pid].tag=newTag;logActivity(`Moved "${trunc(S.pipeline[pid].title,30)}" to ${TAG_LABELS[newTag]}`,'var(--amber)');await save('Pipeline');renderPipeline();}
}
async function movePipe(pid,tag){if(S.pipeline[pid]){S.pipeline[pid].tag=tag;await save('Pipeline');renderPipeline();const hidden=(tag==='loss'||tag==='pass');toast(hidden?`Moved to ${TAG_LABELS[tag]} — hidden from board ✓`:`Moved to ${TAG_LABELS[tag]} ✓`);}}
async function removePipe(pid){const t=S.pipeline[pid]?.title||'opportunity';delete S.pipeline[pid];updateBadges();logActivity(`Removed "${trunc(t,30)}" from pipeline`,'var(--mist)');await save('Pipeline');renderPipeline();}

async function refreshOpp(pid) {
  const p = S.pipeline[pid];
  if (!p) return;
  const solNum = p.solNum || '';
  if (!solNum) {
    toast('No solicitation number on this opportunity — cannot refresh', true);
    return;
  }
  if (!confirm(`Refresh "${trunc(p.title||'this opportunity',40)}" from SAM.gov?\n\nThis uses 1 of your 10 daily API calls. Your notes, quotes, and bid data will NOT be changed.`)) return;

  const samKey = localStorage.getItem(SAM_KEY_STORE) || S.settings.samKey || '';
  if (!samKey) { toast('Add your SAM.gov API key in Settings first', true); return; }

  toast('Refreshing from SAM.gov…');
  try {
    // Search SAM.gov by solicitation number
    const params = new URLSearchParams({
      token: SECRET, action: 'samgov', sheetUrl: SHEET_URL,
      samKey, limit: 10, offset: 0,
      postedFrom: postedFrom(),
      postedTo: `${String(new Date().getMonth()+1).padStart(2,'0')}/${String(new Date().getDate()).padStart(2,'0')}/${new Date().getFullYear()}`,
      q: solNum
    });
    const res = await fetch(`${API_URL}?${params}`);
    if (!res.ok) throw new Error(`Proxy ${res.status}`);
    const proxy = await res.json();
    if (proxy.error) {
      if (proxy.error.includes('429') || proxy.error.includes('quota')) {
        throw new Error('Daily SAM.gov quota reached — try again tomorrow');
      }
      throw new Error(proxy.error);
    }
    const results = (proxy.data || proxy).opportunitiesData || [];
    // Match by solicitation number
    const match = results.find(o => (o.solicitationNumber||'') === solNum) || results[0];
    if (!match) {
      toast('Opportunity not found on SAM.gov — it may have been archived', true);
      return;
    }
    // Update SAM.gov fields, preserve user work
    const newDeadline = match.responseDeadLine || p.deadline;  // full ISO with time
    S.pipeline[pid] = {
      ...p,
      // Updated from SAM.gov:
      title: match.title || p.title,
      agency: trunc(match.fullParentPathName||match.departmentName||'', 50) || p.agency,
      naics: match.naicsCode || p.naics,
      deadline: newDeadline,
      url: match.uiLink || p.url,
      description: trunc(match.description||'', 1000) || p.description,
      // Preserved (untouched): notes, finalBid, prevContractValue, prevContractSource, solNum, tag
    };
    logActivity(`Refreshed "${trunc(match.title||'',30)}" from SAM.gov`, 'var(--blue2)');
    await save('Pipeline');
    renderPipeline();
    const deadlineChanged = newDeadline !== p.deadline;
    toast(`Refreshed ✓${deadlineChanged ? ' — deadline updated!' : ''}`);
  } catch(e) {
    if (e.message.includes('quota') || e.message.includes('429')) {
      localStorage.setItem('iw_sam_quota_hit', new Date().toISOString());
    }
    toast(`Refresh failed: ${e.message}`, true);
  }
}

  if (tab==='info') return renderOppInfoTab(pid);

function updateBidPreview(pid) {
  const input = document.getElementById('finalBidInput');
  const preview = document.getElementById('bidPreview');
  if (!input || !preview) return;
  const finalBid = parseFloat(input.value)||0;
  const awarded = S.subAssignments.find(a=>a.oppId===pid&&a.status==='awarded');
  const subCost = parseFloat(awarded?.quotedAmount||0);
  const prevVal = parseFloat(document.getElementById('prevContractInput')?.value)||parseFloat(S.pipeline[pid]?.prevContractValue||0);
  if (finalBid>0&&subCost>0) {
    const profit = finalBid-subCost;
    const margin = ((profit/finalBid)*100).toFixed(1);
    const color = profit>0?'var(--green2)':'var(--red2)';
    let html = `Final bid: <span style="color:var(--amber2)">$${fmt(finalBid)}</span> · Profit: <span style="color:${color}">$${fmt(profit)}</span> · Margin: <span style="color:${color}">${margin}%</span>`;
    if (prevVal>0) {
      const diff = ((finalBid-prevVal)/prevVal*100).toFixed(1);
      const diffColor = finalBid<=prevVal?'var(--green2)':'var(--amber2)';
      html += ` · vs Previous: <span style="color:${diffColor}">${diff>0?'+':''}${diff}%</span>`;
    }
    preview.innerHTML = html;
  } else if (finalBid>0) {
    preview.innerHTML = `Final bid: <span style="color:var(--amber2)">$${fmt(finalBid)}</span>`;
  } else {
    preview.innerHTML = '';
  }
}

async function saveFinalBid(pid) {
  const finalBid = parseFloat(document.getElementById('finalBidInput')?.value)||0;
  if (!finalBid) { toast('Enter a bid amount', true); return; }
  if (!S.pipeline[pid]) return;
  S.pipeline[pid].finalBid = finalBid;
  const prevVal = parseFloat(document.getElementById('prevContractInput')?.value)||0;
  const prevSrc = document.getElementById('prevContractSource')?.value||'';
  if (prevVal) S.pipeline[pid].prevContractValue = prevVal;
  if (prevSrc) S.pipeline[pid].prevContractSource = prevSrc;
  logActivity(`Set final bid for "${trunc(S.pipeline[pid].title,30)}": $${fmt(finalBid)}`, 'var(--gold2)');
  await save('Pipeline');
  toast('Final bid saved ✓');
  oppTab(pid, 'bid', null);
}

function useBidScenario(pid, amount) {
  const input = document.getElementById('finalBidInput');
  if (input) { input.value = Math.round(amount); updateBidPreview(pid); }
}

async function saveSubQuote(pid, existingId) {
  const subName = v('aqSub');
  if (!subName) { toast('Select a subcontractor', true); return; }
  const quote = {
    assignId: existingId || 'SA-' + Date.now(),
    oppId: pid,
    contractId: '',
    subName,
    scope: v('aqScope'),
    quotedAmount: parseFloat(v('aqAmount'))||0,
    status: v('aqStatus')||'quoting',
    notes: v('aqNotes')
  };
  if (existingId) {
    const idx = S.subAssignments.findIndex(a=>a.assignId===existingId);
    if (idx>=0) S.subAssignments[idx] = quote;
  } else {
    S.subAssignments.push(quote);
    logActivity(`Added sub quote: ${subName} for "${trunc(S.pipeline[pid]?.title||'',25)}"`, 'var(--blue2)');
  }
  await save('SubAssignments');
  closeModal();
  toast(`Quote saved ✓`);
  oppTab(pid, 'quotes', null);
  renderPipeline();
}

async function awardSubQuote(assignId, pid) {
  // Mark this one awarded, all others rejected
  S.subAssignments.filter(a=>a.oppId===pid).forEach(a => {
    if (a.assignId===assignId) { a.status='awarded'; }
    else if (a.status!=='quoting') { a.status='rejected'; }
    else { a.status='rejected'; }
  });
  const awarded = S.subAssignments.find(a=>a.assignId===assignId);
  logActivity(`Awarded sub quote: ${awarded?.subName} $${fmt(awarded?.quotedAmount)} for "${trunc(S.pipeline[pid]?.title||'',25)}"`, 'var(--green2)');
  await save('SubAssignments');
  toast(`${awarded?.subName} awarded ✓`);
  oppTab(pid, 'quotes', null);
  renderPipeline();
}

async function unawardSubQuote(assignId, pid) {
  S.subAssignments.filter(a=>a.oppId===pid).forEach(a => {
    if (a.status==='awarded'||a.status==='rejected') a.status='received';

  await save('SubAssignments');
  toast('Award cleared — all quotes reset to Received');
  oppTab(pid, 'quotes', null);

}

  const q = S.subAssignments.find(a=>a.assignId===assignId);

async function fetchOppDescription(pid, descUrl) {
  const box = document.getElementById('oppDescBox');
  try {
    // Fetch the description through the SAM.gov proxy
    const samKey = localStorage.getItem(SAM_KEY_STORE) || S.settings.samKey || '';
    const fullUrl = descUrl.includes('api_key=') ? descUrl : descUrl + (descUrl.includes('?') ? '&' : '?') + 'api_key=' + samKey;
    const proxyUrl = `${API_URL}?token=${SECRET}&action=samgov&sheetUrl=${encodeURIComponent(SHEET_URL)}&url=${encodeURIComponent(fullUrl)}`;
    const res = await fetch(proxyUrl);
    const proxy = await res.json();
    if (proxy.error) throw new Error(proxy.error);
    const data = proxy.data || proxy;
    // SAM.gov returns description as {description: "text"} or plain text
    const text = (typeof data === 'string') ? data : (data.description || data.body || JSON.stringify(data));
    if (text && box) {
      box.innerHTML = esc(text);
      // Save the actual text back so we don't re-fetch
      if (S.pipeline[pid]) {
        S.pipeline[pid].description = text.slice(0, 2000);
        save('Pipeline').catch(()=>{});
      }
    }
  } catch(e) {
    if (box) box.innerHTML = '<span style="color:var(--muted);font-style:italic">Description unavailable — view on SAM.gov for full details</span>';
  }
}

async function saveOppNotes(pid) {
  if (S.pipeline[pid]) {
    S.pipeline[pid].notes = v('oppNotes');
    S.pipeline[pid].solNum = v('oppSolNum');
    await save('Pipeline');
    toast('Notes saved ✓');
  }
}

function isInsExpiring(dateStr) {
  if (!dateStr) return false;
  const diff = (new Date(dateStr) - new Date()) / 86400000;
  return diff >= 0 && diff <= 60;
}

async function saveQuickSub(pid, assignId) {
  const name = v('qsName');
  if (!name) { toast('Company name required', true); return; }
  const sub = {
    name, trade: v('qsTrade'), phone: v('qsPhone'), email: v('qsEmail'),
    naics: v('qsNaics'), samStatus: v('qsSam'), insExpiry: '',
    status: 'active', rating: 0, notes: ''
  };
  S.subs.push(sub);
  logActivity(`Added sub: ${name} (from quote)`, 'var(--green2)');
  await save('Subcontractors');
  toast(`${name} added ✓`);
  // Reopen the quote modal with this sub pre-selected
  window._presetSubName = name;
  reopenQuoteModal(pid, assignId);
}

function reopenQuoteModal(pid, assignId) {
  const existing = assignId ? S.subAssignments.find(a=>a.assignId===assignId) : null;
  openAddQuoteModal(pid, existing);
  // Pre-select the newly created sub
  if (window._presetSubName) {
    setTimeout(() => {
      const sel = document.getElementById('aqSub');
      if (sel) sel.value = window._presetSubName;
      window._presetSubName = null;
    }, 50);
  }
}

// ══ PRICING ═══════════════════════════════════════════════════════════════════
function renderPricing(c, ta) {
  ta.innerHTML=`<button class="btn btn-primary btn-sm" onclick="openQuoteModal()">+ New Quote</button>`;
  if(S.quotes.length===0){c.innerHTML=`<div class="empty-state"><span class="empty-icon">💰</span><div class="empty-title">No Quotes Yet</div><div class="empty-sub">Build a quote for any opportunity to calculate your margin before bidding.</div></div>`;return;}
  c.innerHTML=S.quotes.map((q,i)=>{
    const subCost=(q.lines||[]).reduce((a,l)=>a+parseFloat(l.total||0),0);
    const margin=parseFloat(q.marginPct||S.settings.margin||15)/100;
    const price=subCost/(1-margin);
    const profit=price-subCost;
    const pct=Math.round(margin*100);
    return `<div class="card fade-in" style="margin-bottom:14px">
      <div class="section-header">
        <div><div class="section-title" style="font-size:18px">${esc(q.name||'Untitled Quote')}</div><div class="mono muted" style="font-size:11px">${esc(q.opportunity||'')} · ${fmtDate(q.created)}</div></div>
        <div style="display:flex;gap:8px"><button class="btn btn-ghost btn-sm" onclick="openQuoteModal(${i})">Edit</button><button class="btn btn-danger btn-sm" onclick="deleteQuote(${i})">Delete</button></div>
      </div>
      <div class="grid3" style="margin-bottom:14px">
        <div class="kpi kpi-amber" style="padding:12px 16px"><div class="kpi-label">Sub Cost</div><div class="kpi-value" style="font-size:24px">$${fmt(subCost)}</div></div>
        <div class="kpi kpi-green" style="padding:12px 16px"><div class="kpi-label">Bid Price</div><div class="kpi-value" style="font-size:24px">$${fmt(price)}</div></div>
        <div class="kpi kpi-purple" style="padding:12px 16px"><div class="kpi-label">Profit (${pct}%)</div><div class="kpi-value" style="font-size:24px">$${fmt(profit)}</div></div>
      </div>
      <div class="margin-bar"><div class="margin-fill" style="width:${Math.min(pct*3,100)}%"></div></div>
      ${(q.lines||[]).length>0?`<div class="divider"></div><table class="table"><thead><tr><th>Description</th><th>Sub</th><th style="text-align:right">Qty</th><th style="text-align:right">Rate</th><th style="text-align:right">Total</th></tr></thead><tbody>${(q.lines||[]).map(l=>`<tr><td>${esc(l.desc||'')}</td><td class="mono muted" style="font-size:11px">${esc(l.sub||'')}</td><td class="mono" style="text-align:right">${l.qty||1}</td><td class="mono" style="text-align:right">$${fmt(l.rate||0)}</td><td class="mono amber" style="text-align:right">$${fmt(l.total||0)}</td></tr>`).join('')}</tbody></table>`:''}
      ${renderAttachSection('quote', ('q'+i+'_'+(q.name||'').replace(/[^a-z0-9]/gi,'_').slice(0,20)))}
    </div>`;
  }).join('');
}

function openQuoteModal(idx){
  const q=idx!==undefined?S.quotes[idx]:{lines:[]};
  const subNames=S.subs.map(s=>s.name);
  openModal(idx!==undefined?'Edit Quote':'New Quote',
    `<div class="form-row"><div class="form-group"><label class="form-label">Quote Name</label><input class="form-input" id="qName" value="${esc(q.name||'')}"></div>
    <div class="form-group"><label class="form-label">Opportunity</label><input class="form-input" id="qOpp" value="${esc(q.opportunity||'')}"></div></div>
    <div class="form-group"><label class="form-label">Margin %</label><input class="form-input" type="number" id="qMargin" value="${q.marginPct||S.settings.margin||15}" style="width:100px"></div>
    <div class="divider"></div>
    <div class="form-label" style="margin-bottom:10px">Line Items</div>
    <div id="qLines">${(q.lines||[]).map((l,li)=>quoteLineHtml(li,l,subNames)).join('')}</div>
    <button class="btn btn-ghost btn-sm" onclick="addQL(${JSON.stringify(JSON.stringify(subNames))})">+ Add Line</button>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveQuote(${idx})">Save Quote</button>`,true);
}

function quoteLineHtml(li,l={},subs=[]){
  return `<div class="form-row3" id="ql-${li}" style="align-items:end;margin-bottom:8px">
    <input class="form-input" placeholder="Description" value="${esc(l.desc||'')}" oninput="calcLine(${li})">
    <select class="form-select" oninput="calcLine(${li})"><option value="">No Sub</option>${subs.map(s=>`<option ${l.sub===s?'selected':''}>${esc(s)}</option>`).join('')}</select>
    <div style="display:flex;gap:5px;align-items:center">
      <input class="form-input" type="number" placeholder="Qty" value="${l.qty||1}" style="width:55px" oninput="calcLine(${li})">
      <input class="form-input" type="number" placeholder="Rate $" value="${l.rate||''}" style="width:85px" oninput="calcLine(${li})">
      <span class="mono amber" id="lt-${li}" style="width:75px;text-align:right;font-size:12px">$${fmt(l.total||0)}</span>
      <button class="btn btn-danger btn-xs" onclick="document.getElementById('ql-${li}').remove()">✕</button>
    </div>
  </div>`;
}

function calcLine(li){const row=document.getElementById(`ql-${li}`);if(!row)return;const ins=row.querySelectorAll('input[type=number]');const t=document.getElementById(`lt-${li}`);if(t)t.textContent='$'+fmt((parseFloat(ins[0]?.value)||1)*(parseFloat(ins[1]?.value)||0));}
function addQL(snj){const subs=JSON.parse(snj);const c=document.getElementById('qLines');const li=c.children.length;const d=document.createElement('div');d.innerHTML=quoteLineHtml(li,{},subs);c.appendChild(d.firstChild);}

async function saveQuote(idx){
  const name=v('qName');if(!name){toast('Name required',true);return;}
  const lineEls=document.getElementById('qLines').children;
  const lines=Array.from(lineEls).map(row=>{const ins=row.querySelectorAll('input');const sel=row.querySelector('select');const qty=parseFloat(ins[1]?.value)||1;const rate=parseFloat(ins[2]?.value)||0;return{desc:ins[0]?.value||'',sub:sel?.value||'',qty,rate,total:qty*rate};});
  const q={name,opportunity:v('qOpp'),marginPct:parseFloat(v('qMargin'))||15,lines,created:S.quotes[idx]?.created||new Date().toISOString()};
  if(idx!==undefined)S.quotes[idx]=q;else S.quotes.push(q);
  logActivity(`${idx!==undefined?'Updated':'Created'} quote: ${name}`,'var(--gold2)');
  await save('Quotes');closeModal();renderPricing(document.getElementById('content'),document.getElementById('topbarActions'));toast('Quote saved ✓');
}
async function deleteQuote(i){if(!confirm('Delete?'))return;S.quotes.splice(i,1);await save('Quotes');renderPricing(document.getElementById('content'),document.getElementById('topbarActions'));}

// ══ CONTRACTS ═════════════════════════════════════════════════════════════════
function renderContracts(c, ta) {
  ta.innerHTML = `<button class="btn btn-primary btn-sm" onclick="openNewContractModal()">+ New Contract</button>`;
  if (S.contracts.length === 0) {
    c.innerHTML = `<div class="empty-state"><span class="empty-icon">📑</span><div class="empty-title">No Contracts Yet</div><div class="empty-sub">Convert a won opportunity into a contract, or create one manually.</div><div style="margin-top:16px"><button class="btn btn-primary" onclick="openNewContractModal()">+ New Contract</button></div></div>`;
    return;
  }
  const active = S.contracts.filter(c=>c.status==='active').length;
  const totalValue = S.contracts.filter(c=>c.status==='active').reduce((a,b)=>a+parseFloat(b.totalValue||0),0);
  c.innerHTML = `
  <div class="grid3" style="margin-bottom:20px">
    <div class="kpi kpi-green"><div class="kpi-label">Active Contracts</div><div class="kpi-value">${active}</div></div>
    <div class="kpi kpi-amber"><div class="kpi-label">Total Active Value</div><div class="kpi-value">$${fmt(totalValue)}</div></div>
    <div class="kpi kpi-blue"><div class="kpi-label">Total Contracts</div><div class="kpi-value">${S.contracts.length}</div></div>
  </div>
  ${S.contracts.map((ct,i) => contractCard(ct, i)).join('')}`;
}

function contractCard(ct, i) {
  const assigns = S.subAssignments.filter(a=>a.contractId===ct.contractId||a.oppId===ct.oppId);
  const awardedAssigns = assigns.filter(a=>a.status==='awarded'||a.status==='active');
  const totalSubCost = awardedAssigns.length>0
    ? awardedAssigns.reduce((s,a)=>s+parseFloat(a.quotedAmount||0),0)
    : assigns.filter(a=>a.status!=='rejected'&&a.status!=='quoting').reduce((s,a)=>s+parseFloat(a.quotedAmount||0),0);
  const profit = parseFloat(ct.totalValue||0) - totalSubCost;
  const schedule = generatePaymentSchedule(ct);
  const nextPay = schedule.find(s=>s.status==='upcoming'||s.status==='due');
  const statusClass = 'contract-' + (ct.status||'active').replace(' ','-');

  return `<div class="contract-card ${statusClass} fade-in" style="animation-delay:${i*0.04}s">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
      <div>
        <div class="contract-title">${esc(ct.title||'Untitled Contract')}</div>
        <div class="contract-agency">${esc(ct.agency||'')}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="badge badge-${ct.status==='active'?'active':ct.status==='complete'?'won':ct.status==='terminated'?'lost':'watching'}">${ct.status||'active'}</span>
        <button class="btn btn-ghost btn-xs" onclick="openContractDetail(${i})">Detail</button>
        <button class="rm-btn" onclick="deleteContract(${i})">✕</button>
      </div>
    </div>

    <div class="contract-nums">
      <div class="contract-num"><span class="meta-k">Contract #</span><span class="mono" style="font-size:12px;color:var(--cream)">${esc(ct.contractNum||'—')}</span></div>
      <div class="contract-num"><span class="meta-k">PO #</span><span class="mono" style="font-size:12px;color:var(--cream)">${esc(ct.poNum||'—')}</span></div>
      <div class="contract-num"><span class="meta-k">Period</span><span class="mono" style="font-size:12px;color:var(--cream)">${fmtDate(ct.startDate)} → ${fmtDate(ct.endDate)}</span></div>
      <div class="contract-num"><span class="meta-k">Cadence</span><span class="mono" style="font-size:12px;color:var(--cream)">${ct.paymentCadence||'monthly'}</span></div>
    </div>

    <div class="terms-grid">
      <div class="terms-box"><div class="terms-val">$${fmt(ct.totalValue||0)}</div><div class="terms-key">Contract Value</div></div>
      <div class="terms-box"><div class="terms-val">$${fmt(profit)}</div><div class="terms-key">Est. Profit</div></div>
      <div class="terms-box"><div class="terms-val">${assigns.length}</div><div class="terms-key">Subs Assigned</div></div>
    </div>

    <div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:12px">
      <div><span class="meta-k">Gov Payment Terms</span><br><span class="mono" style="font-size:12px;color:var(--cream)">Net-${ct.netTermsGov||30}</span></div>
      <div><span class="meta-k">Sub Payment Terms</span><br><span class="mono" style="font-size:12px;color:var(--cream)">Net-${ct.netTermsSub||30} after receipt</span></div>
      ${ct.retainage>0?`<div><span class="meta-k">Retainage</span><br><span class="mono" style="font-size:12px;color:var(--amber2)">${ct.retainage}%</span></div>`:''}
    </div>

    ${nextPay ? `<div class="sched-item sched-${nextPay.status}"><span>Next: ${nextPay.label}</span><span style="font-weight:700">$${fmt(nextPay.amount)} · ${fmtDate(nextPay.date)}</span></div>` : ''}
    ${(()=>{
      const opts = ct.optionYears||[];
      const pending = opts.filter(o=>o.status==='pending');
      if (pending.length===0) return '';
      const next = pending.sort((a,b)=>new Date(a.notifDeadline||a.startDate||0)-new Date(b.notifDeadline||b.startDate||0))[0];
      const notifDiff = next.notifDeadline ? Math.floor((new Date(next.notifDeadline)-new Date())/86400000) : null;
      const urgent = notifDiff!==null && notifDiff<=30;
      return '<div class="sched-item" style="background:'+(urgent?'rgba(230,57,70,0.08)':'rgba(196,123,43,0.06)')+';border:1px solid '+(urgent?'rgba(230,57,70,0.2)':'rgba(196,123,43,0.15)')+'">'
        +'<span style="color:'+(urgent?'var(--red2)':'var(--amber2)')+'">📅 '+(next.label||'Option Year')+' decision'+(notifDiff!==null?' ('+notifDiff+'d)':'')+' </span>'
        +'<span style="font-weight:600;color:'+(urgent?'var(--red2)':'var(--amber2)')+'">'+(next.notifDeadline?fmtDate(next.notifDeadline):'—')+'</span>'
        +'</div>';
    })()}

  </div>`;
}

function generatePaymentSchedule(ct) {
  if (!ct.startDate || !ct.endDate || !ct.paymentAmount) return [];
  const schedule = [];
  const start = new Date(ct.startDate);
  const end = new Date(ct.endDate);
  const now = new Date();
  const cadence = ct.paymentCadence || 'monthly';
  let current = new Date(start);
  let idx = 0;

  const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate()+n); return r; };
  const addMonths = (d, n) => { const r = new Date(d); r.setMonth(r.getMonth()+n); return r; };

  while (current <= end && idx < 60) {
    const payDate = new Date(current);
    const diff = (payDate - now) / 86400000;
    const status = diff < -1 ? 'past' : diff <= 7 ? 'due' : 'upcoming';
    schedule.push({ date: payDate.toISOString().split('T')[0], amount: ct.paymentAmount, status, label: `Payment ${idx+1}` });
    if (cadence === 'weekly') current = addDays(current, 7);
    else if (cadence === 'monthly') current = addMonths(current, 1);
    else if (cadence === 'quarterly') current = addMonths(current, 3);
    else break;
    idx++;
  }
  return schedule;
}

async function saveNewContract() {
  const title = v('ctTitle');
  if (!title) { toast('Contract title required', true); return; }
  const ct = {
    contractId: 'CT-' + Date.now(),
    oppId: v('ctOppId'),
    title,
    agency: v('ctAgency'),
    contractNum: v('ctNum'),
    poNum: v('ctPO'),
    totalValue: parseFloat(v('ctValue'))||0,
    paymentAmount: parseFloat(v('ctPayAmt'))||0,
    startDate: v('ctStart'),
    endDate: v('ctEnd'),
    paymentCadence: v('ctCadence')||'monthly',
    netTermsGov: parseInt(v('ctNetGov'))||30,
    netTermsSub: parseInt(v('ctNetSub'))||30,
    retainage: parseFloat(v('ctRetainage'))||0,
    status: 'active',
    notes: v('ctNotes')
  };
  S.contracts.push(ct);
  // Update linked sub assignments with contractId
  if (ct.oppId) {
    S.subAssignments.filter(a=>a.oppId===ct.oppId).forEach(a=>{ a.contractId=ct.contractId; a.status='active'; });
    await save('SubAssignments');
  }
  logActivity(`Created contract: ${trunc(title,40)}`, 'var(--green2)');
  await save('Contracts');
  closeModal();
  toast('Contract created ✓');
  renderContracts(document.getElementById('content'), document.getElementById('topbarActions'));
}

async function updateContractStatus(i, status) {

async function deleteContract(i) {

  const title = S.contracts[i]?.title||'contract';

}

function addDaysToDate(dateStr, days) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}

      ${daysOverdue>0?`<div><span class="meta-k">Days Overdue</span><br><span class="mono" style="font-size:12px;color:var(--red2)">${daysOverdue} days</span></div>`:''}
    </div>
    ${p.notes?`<div style="font-size:12px;color:var(--mist);margin-bottom:10px">${esc(p.notes)}</div>`:''}
