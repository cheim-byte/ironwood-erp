function openGovPayModal(existing) {
  const p = existing || {};
  openModal(existing ? 'Edit Payment' : 'Log Government Payment', `
    <div class="form-group"><label class="form-label">Contract</label>
      <select class="form-select" id="gpContract">
        <option value="">— Select contract —</option>
        ${S.contracts.map(ct=>`<option value="${ct.contractId}" ${p.contractId===ct.contractId?'selected':''}>${esc(trunc(ct.title,50))}</option>`).join('')}
      </select>
    </div>
    <div class="form-group"><label class="form-label">Description</label>
      <input class="form-input" id="gpDesc" value="${esc(p.description||'')}" placeholder="e.g. Monthly Payment — June 2026">
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Amount ($)</label>
        <input class="form-input" type="number" id="gpAmount" value="${p.amount||''}" placeholder="0">
      </div>
      <div class="form-group"><label class="form-label">Status</label>
        <select class="form-select" id="gpStatus">
          ${['scheduled','received','overdue','cancelled'].map(s=>`<option value="${s}" ${(p.status||'scheduled')===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Scheduled Date</label>
        <input class="form-input" type="date" id="gpSched" value="${p.scheduledDate||''}">
      </div>
      <div class="form-group"><label class="form-label">Received Date</label>
        <input class="form-input" type="date" id="gpReceived" value="${p.receivedDate||''}">
      </div>
    </div>
    <div class="form-group"><label class="form-label">Notes</label>
      <textarea class="form-textarea" id="gpNotes" placeholder="Invoice number, reference, any details…">${esc(p.notes||'')}</textarea>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveGovPay('${p.payId||''}')">Save Payment</button>`,true);
}

async function saveGovPay(existingId) {
  const contractId = v('gpContract');
  const description = v('gpDesc');
  if (!description) { toast('Description required', true); return; }
  const pay = {
    payId: existingId || 'GP-' + Date.now(),
    contractId, description,
    amount: parseFloat(v('gpAmount'))||0,
    status: v('gpStatus')||'scheduled',
    scheduledDate: v('gpSched'),
    receivedDate: v('gpReceived'),
    notes: v('gpNotes')
  };
  if (existingId) {
    const idx = S.govPayments.findIndex(p=>p.payId===existingId);
    if (idx>=0) S.govPayments[idx] = pay;
  } else {
    S.govPayments.push(pay);
    const contract = S.contracts.find(c=>c.contractId===contractId);
    logActivity(`Logged gov payment: ${description} $${fmt(pay.amount)}`, 'var(--green2)');
  }
  await save('GovPayments');
  closeModal();
  toast('Payment saved ✓');
  renderGovPayments(document.getElementById('content'), document.getElementById('topbarActions'));
}

async function markGovPayReceived(payId) {
  const p = S.govPayments.find(p=>p.payId===payId);
  if (p) {
    p.status = 'received';
    p.receivedDate = new Date().toISOString().split('T')[0];
    logActivity(`Gov payment received: ${p.description} $${fmt(p.amount)}`, 'var(--green2)');
    await save('GovPayments');
    toast('Marked as received ✓');
    renderGovPayments(document.getElementById('content'), document.getElementById('topbarActions'));
  }
}

async function markGovPayOverdue(payId) {
  const p = S.govPayments.find(p=>p.payId===payId);
  if (p) {
    p.status = 'overdue';
    await save('GovPayments');
    toast('Marked as overdue');
    renderGovPayments(document.getElementById('content'), document.getElementById('topbarActions'));
  }
}

function editGovPay(payId) {
  const p = S.govPayments.find(p=>p.payId===payId);
  if (p) openGovPayModal(p);
}

async function deleteGovPay(payId) {
  if (!confirm('Delete this payment record?')) return;
  S.govPayments = S.govPayments.filter(p=>p.payId!==payId);
  await save('GovPayments');
  toast('Payment deleted');
  renderGovPayments(document.getElementById('content'), document.getElementById('topbarActions'));
}



// ══ SUB PAYMENTS ══════════════════════════════════════════════════════════════
function renderSubPayments(c, ta) {
  ta.innerHTML = `
    <select class="contract-filter" id="spContractFilter" onchange="renderSubPayments(document.getElementById('content'),document.getElementById('topbarActions'))">
      <option value="">All Contracts</option>
      ${S.contracts.map(ct=>`<option value="${ct.contractId}">${esc(trunc(ct.title,40))}</option>`).join('')}
    </select>
    <select class="contract-filter" id="spSubFilter" onchange="renderSubPayments(document.getElementById('content'),document.getElementById('topbarActions'))">
      <option value="">All Subs</option>
      ${S.subs.map(s=>`<option value="${s.name}">${esc(s.name)}</option>`).join('')}
    </select>
    <button class="btn btn-primary btn-sm" onclick="openSubPayModal()">+ Log Sub Payment</button>`;

  const contractFilter = document.getElementById('spContractFilter')?.value||'';
  const subFilter = document.getElementById('spSubFilter')?.value||'';
  let payments = S.subPayments;
  if (contractFilter) payments = payments.filter(p=>p.contractId===contractFilter);
  if (subFilter) payments = payments.filter(p=>p.subName===subFilter);

  const paid = payments.filter(p=>p.status==='paid').reduce((a,b)=>a+parseFloat(b.amount||0),0);
  const pending = payments.filter(p=>p.status==='pending').reduce((a,b)=>a+parseFloat(b.amount||0),0);
  const overdue = payments.filter(p=>p.status==='overdue').reduce((a,b)=>a+parseFloat(b.amount||0),0);
  const waiting = payments.filter(p=>p.status==='waiting').reduce((a,b)=>a+parseFloat(b.amount||0),0);
  const totalOwed = pending + overdue + waiting;

  // Cash position: gov received vs sub owed
  const govReceived = S.govPayments.filter(p=>p.status==='received'&&(contractFilter?p.contractId===contractFilter:true)).reduce((a,b)=>a+parseFloat(b.amount||0),0);
  const netPosition = govReceived - paid;

  c.innerHTML = `
  <div class="grid4" style="margin-bottom:20px">
    <div class="kpi kpi-green"><div class="kpi-label">Paid to Subs</div><div class="kpi-value">$${fmt(paid)}</div><div class="kpi-sub">${payments.filter(p=>p.status==='paid').length} payments</div></div>
    <div class="kpi kpi-amber"><div class="kpi-label">Pending / Due</div><div class="kpi-value">$${fmt(pending+overdue)}</div><div class="kpi-sub">${payments.filter(p=>p.status==='pending'||p.status==='overdue').length} outstanding</div></div>
    <div class="kpi kpi-blue"><div class="kpi-label">Waiting on Gov</div><div class="kpi-value">$${fmt(waiting)}</div><div class="kpi-sub">Pay-when-paid</div></div>
    <div class="kpi ${netPosition>=0?'kpi-green':'kpi-purple'}"><div class="kpi-label">Your Net Position</div><div class="kpi-value">$${fmt(Math.abs(netPosition))}</div><div class="kpi-sub">${netPosition>=0?'cash positive':'cash deficit'}</div></div>
  </div>

  <div class="pwp-banner">
    ℹ️ Pay-when-paid: sub payments with status "Waiting" are owed but held until gov payment is received.
  </div>

  ${payments.length===0
    ? `<div class="empty-state"><span class="empty-icon">🔄</span><div class="empty-title">No Sub Payments Logged</div><div class="empty-sub">Track payments you owe to subcontractors, tied to government payment receipts.</div><div style="margin-top:16px"><button class="btn btn-primary" onclick="openSubPayModal()">+ Log Sub Payment</button></div></div>`
    : `<div class="card" style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px">
          <div class="section-title" style="font-size:18px">Sub Payment Log</div>
          <div class="mono muted" style="font-size:11px">${payments.length} payment${payments.length!==1?'s':''}</div>
        </div>
        ${[...payments].sort((a,b)=>new Date(b.dueDate||0)-new Date(a.dueDate||0)).map(p=>subPayCard(p)).join('')}
      </div>`}

  ${S.subs.length>0 ? `
  <div class="card">
    <div class="card-title">Owed by Subcontractor</div>
    ${[...new Set(S.subPayments.filter(p=>contractFilter?p.contractId===contractFilter:true).map(p=>p.subName))].map(subName => {
      const subPays = S.subPayments.filter(p=>p.subName===subName&&(contractFilter?p.contractId===contractFilter:true));
      const subPaid = subPays.filter(p=>p.status==='paid').reduce((a,b)=>a+parseFloat(b.amount||0),0);
      const subOwed = subPays.filter(p=>p.status!=='paid').reduce((a,b)=>a+parseFloat(b.amount||0),0);
      const sub = S.subs.find(s=>s.name===subName);
      return `<div class="fin-row">
        <div>
          <div style="font-size:13px;color:var(--cream)">${esc(subName)}</div>
          <div class="mono muted" style="font-size:10px">${esc(sub?.trade||'')}</div>
        </div>
        <div style="text-align:right">
          <div class="fin-amount ${subOwed>0?'fin-negative':'fin-positive'}">$${fmt(subOwed)} owed</div>
          <div class="mono muted" style="font-size:10px">$${fmt(subPaid)} paid total</div>
        </div>
      </div>`;
    }).join('') || '<div class="muted" style="font-size:13px;padding:10px 0">No sub payments recorded yet</div>'}
  </div>` : ''}`;
}

function subPayCard(p) {
  const contract = S.contracts.find(c=>c.contractId===p.contractId);
  const govPay = p.govPayId ? S.govPayments.find(g=>g.payId===p.govPayId) : null;
  const daysOverdue = p.status==='overdue'&&p.dueDate ? Math.floor((new Date()-new Date(p.dueDate))/86400000) : 0;
  const cardClass = `subpay-${p.status||'pending'}`;
  const statusClass = `subpay-status-${p.status||'pending'}`;

  return `<div class="subpay-card ${cardClass} fade-in">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-size:14px;font-weight:700;color:var(--cream);margin-bottom:2px">${esc(p.subName||'Unknown Sub')}</div>
        <div style="font-size:12px;color:var(--mist)">${esc(p.description||'')}</div>
        ${contract?`<div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--amber2);margin-top:2px">${esc(trunc(contract.title,45))}</div>`:''}
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
        <div class="pay-amount ${p.status==='paid'?'green':p.status==='overdue'?'red':'amber'}">$${fmt(p.amount||0)}</div>
        <span class="subpay-status ${statusClass}">${p.status==='waiting'?'waiting on gov':p.status||'pending'}</span>
      </div>
    </div>

    <div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:10px">
      <div><span class="meta-k">Due Date</span><br><span class="mono" style="font-size:12px;color:${p.status==='overdue'?'var(--red2)':'var(--cream)'}">${fmtDate(p.dueDate)||'—'}</span></div>
      ${p.status==='paid'?`<div><span class="meta-k">Paid Date</span><br><span class="mono" style="font-size:12px;color:var(--green2)">${fmtDate(p.paidDate)||'—'}</span></div>`:''}
      ${contract?`<div><span class="meta-k">Net Terms</span><br><span class="mono" style="font-size:12px;color:var(--cream)">Net-${contract.netTermsSub||30} after receipt</span></div>`:''}
      ${daysOverdue>0?`<div><span class="meta-k">Days Overdue</span><br><span class="mono" style="font-size:12px;color:var(--red2)">${daysOverdue} days</span></div>`:''}
      ${govPay?`<div><span class="meta-k">Triggered by</span><br><span class="mono" style="font-size:12px;color:var(--blue2)">${esc(trunc(govPay.description,30))}</span></div>`:''}
    </div>

    ${p.notes?`<div style="font-size:12px;color:var(--mist);margin-bottom:10px">${esc(p.notes)}</div>`:''}

    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${p.status!=='paid'?`<button class="btn btn-primary btn-xs" onclick="markSubPayPaid('${p.payId}')">✓ Mark Paid</button>`:''}
      ${p.status==='waiting'?`<button class="btn btn-ghost btn-xs" onclick="markSubPayPending('${p.payId}')">Set Pending</button>`:''}
      ${p.status==='pending'?`<button class="btn btn-danger btn-xs" onclick="markSubPayOverdue('${p.payId}')">Mark Overdue</button>`:''}
      <button class="btn btn-ghost btn-xs" onclick="editSubPay('${p.payId}')">Edit</button>
      <button class="rm-btn" onclick="deleteSubPay('${p.payId}')">✕</button>
    </div>
    ${renderAttachSection('subpayment', p.payId)}
  </div>`;
}

    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveSubPay('${p.payId||''}')">Save Payment</button>`,true);

function spPopulateSubs(contractId) {
  const assigns = S.subAssignments.filter(a=>a.contractId===contractId||a.oppId===(S.contracts.find(c=>c.contractId===contractId)?.oppId));
  const sel = document.getElementById('spSub');
  if (!sel || assigns.length===0) return;
  sel.innerHTML = '<option value="">— Select sub —</option>' +
    assigns.map(a=>`<option value="${esc(a.subName)}">${esc(a.subName)}</option>`).join('');
}

async function saveSubPay(existingId) {
  const subName = v('spSub');
  const description = v('spDesc');
  if (!subName || !description) { toast('Sub and description required', true); return; }
  const pay = {
    payId: existingId || 'SP-' + Date.now(),
    contractId: v('spContract'),
    subName, description,
    amount: parseFloat(v('spAmount'))||0,
    status: v('spStatus')||'pending',
    dueDate: v('spDue'),
    paidDate: v('spPaid'),
    govPayId: v('spGovPay'),
    notes: v('spNotes')
  };
  if (existingId) {
    const idx = S.subPayments.findIndex(p=>p.payId===existingId);
    if (idx>=0) S.subPayments[idx] = pay;
  } else {
    S.subPayments.push(pay);
    logActivity(`Logged sub payment: ${subName} $${fmt(pay.amount)}`, 'var(--blue2)');
  }
  await save('SubPayments');
  closeModal();
  toast('Sub payment saved ✓');
  renderSubPayments(document.getElementById('content'), document.getElementById('topbarActions'));
}

async function markSubPayPaid(payId) {
  const p = S.subPayments.find(p=>p.payId===payId);
  if (p) {
    p.status = 'paid';
    p.paidDate = new Date().toISOString().split('T')[0];
    logActivity(`Paid sub: ${p.subName} $${fmt(p.amount)}`, 'var(--green2)');
    await save('SubPayments');
    toast('Marked as paid ✓');
    renderSubPayments(document.getElementById('content'), document.getElementById('topbarActions'));
  }
}

async function markSubPayPending(payId) {
  const p = S.subPayments.find(p=>p.payId===payId);
  if (p) { p.status='pending'; await save('SubPayments'); toast('Marked as pending'); renderSubPayments(document.getElementById('content'), document.getElementById('topbarActions')); }
}

async function markSubPayOverdue(payId) {
  const p = S.subPayments.find(p=>p.payId===payId);
  if (p) { p.status='overdue'; await save('SubPayments'); toast('Marked as overdue'); renderSubPayments(document.getElementById('content'), document.getElementById('topbarActions')); }
}

function editSubPay(payId) {
  const p = S.subPayments.find(p=>p.payId===payId);
  if (p) openSubPayModal(p);
}

async function deleteSubPay(payId) {
  if (!confirm('Delete this sub payment record?')) return;
  S.subPayments = S.subPayments.filter(p=>p.payId!==payId);
  await save('SubPayments');
  toast('Deleted');
  renderSubPayments(document.getElementById('content'), document.getElementById('topbarActions'));
}

function renderContractOptionsTab(ct, ci) {
  const opts = ct.optionYears || [];

  // Status summary
  const exercised = opts.filter(o=>o.status==='exercised');
  const pending   = opts.filter(o=>o.status==='pending');
  const declined  = opts.filter(o=>o.status==='declined');
  const totalOptValue = opts.reduce((s,o)=>s+parseFloat(o.value||0),0);
  const exercisedValue = exercised.reduce((s,o)=>s+parseFloat(o.value||0),0);

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--mist);text-transform:uppercase;letter-spacing:0.1em">
        ${opts.length} option year${opts.length!==1?'s':''} · $${fmt(exercisedValue)} exercised of $${fmt(totalOptValue)} potential
      </div>
      <button class="btn btn-primary btn-sm" onclick="openAddOptionModal(${ci})">+ Add Option Year</button>
    </div>

    ${opts.length===0
      ? `<div class="empty-state" style="padding:30px">
          <span class="empty-icon">📅</span>
          <div class="empty-title">No Option Years</div>
          <div class="empty-sub">Most federal contracts include option years. Add them here to track exercise deadlines and total contract ceiling.</div>
          <div style="margin-top:14px"><button class="btn btn-primary btn-sm" onclick="openAddOptionModal(${ci})">+ Add Option Year</button></div>
        </div>`
      : `<div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
          <div class="kpi kpi-green" style="padding:10px 14px;flex:1;min-width:120px"><div class="kpi-label">Exercised</div><div class="kpi-value" style="font-size:20px">${exercised.length}</div><div class="kpi-sub">$${fmt(exercisedValue)}</div></div>
          <div class="kpi kpi-amber" style="padding:10px 14px;flex:1;min-width:120px"><div class="kpi-label">Pending</div><div class="kpi-value" style="font-size:20px">${pending.length}</div></div>
          <div class="kpi kpi-purple" style="padding:10px 14px;flex:1;min-width:120px"><div class="kpi-label">Total Ceiling</div><div class="kpi-value" style="font-size:20px">$${fmt(parseFloat(ct.totalValue||0)+totalOptValue)}</div><div class="kpi-sub">base + all options</div></div>
          <div class="kpi kpi-blue" style="padding:10px 14px;flex:1;min-width:120px"><div class="kpi-label">Declined</div><div class="kpi-value" style="font-size:20px">${declined.length}</div></div>
        </div>
        ${opts.map((o,oi)=>{
          const notifDiff = o.notifDeadline ? Math.floor((new Date(o.notifDeadline)-new Date())/86400000) : null;
          const startDiff = o.startDate ? Math.floor((new Date(o.startDate)-new Date())/86400000) : null;

          const urgentNotif = notifDiff!==null && notifDiff>=0 && notifDiff<=30 && o.status==='pending';
          return `<div style="background:var(--bg2);border:1px solid ${urgentNotif?'var(--amber)':'var(--border)'};border-radius:8px;margin-bottom:10px;overflow:hidden">

                </div>
              </div>
              <div style="display:flex;gap:8px;align-items:center">
                <span style="font-family:'DM Mono',monospace;font-size:22px;font-weight:700;color:var(--amber2)">$${fmt(o.value||0)}</span>
                <span style="font-family:'DM Mono',monospace;font-size:10px;padding:3px 8px;border-radius:3px;background:rgba(255,255,255,0.05);color:${statusColor};text-transform:uppercase;border:1px solid ${statusColor}22">${o.status||'pending'}</span>
              </div>
            </div>

            <!-- Detail grid -->
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;padding:10px 16px">
              <div>
                <div class="meta-k">CO Notification Deadline</div>
                <div class="meta-v" style="color:${urgentNotif?'var(--amber2)':'var(--cream)'}">
                  ${o.notifDeadline?fmtDate(o.notifDeadline):'—'}
                  ${urgentNotif?` <span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--amber2);">(${notifDiff}d left)</span>`:''}
                  ${notifDiff!==null&&notifDiff<0&&o.status==='pending'?` <span style="color:var(--red2);font-size:10px;">(PASSED)</span>`:''}
                </div>
              </div>
              <div>
                <div class="meta-k">Days Until Start</div>
                <div class="meta-v">${startDiff!==null?(startDiff>0?startDiff+' days':startDiff===0?'Today':'Started'):'—'}</div>
              </div>
              <div>
                <div class="meta-k">Period</div>
                <div class="meta-v">${o.startDate&&o.endDate?Math.round((new Date(o.endDate)-new Date(o.startDate))/86400000/30)+' months':'—'}</div>
              </div>
              <div>
                <div class="meta-k">Exercised On</div>
                <div class="meta-v">${o.exercisedDate?fmtDate(o.exercisedDate):'—'}</div>
              </div>
            </div>

            ${urgentNotif?`<div style="margin:0 16px 10px;padding:8px 12px;background:rgba(196,123,43,0.08);border-left:3px solid var(--amber);border-radius:0 4px 4px 0;font-family:'DM Mono',monospace;font-size:11px;color:var(--amber2)">
              ⚠ CO notification due in ${notifDiff} day${notifDiff!==1?'s':''} — confirm exercise decision with contracting officer
            </div>`:''}

            ${o.notes?`<div style="padding:0 16px 10px;font-size:12px;color:var(--mist);line-height:1.5">${esc(o.notes)}</div>`:''}

            <!-- Actions -->
            <div style="padding:8px 16px 12px;border-top:1px solid rgba(255,255,255,0.04);display:flex;gap:6px;flex-wrap:wrap">
              ${o.status==='pending'?`<button class="btn btn-primary btn-xs" onclick="exerciseOption(${ci},${oi})">✓ Mark Exercised</button>`:''}
              ${o.status==='pending'?`<button class="btn btn-danger btn-xs" onclick="declineOption(${ci},${oi})">✕ Decline</button>`:''}
              ${o.status==='declined'||o.status==='exercised'?`<button class="btn btn-ghost btn-xs" onclick="resetOption(${ci},${oi})">Reset to Pending</button>`:''}
              <button class="btn btn-ghost btn-xs" onclick="editOption(${ci},${oi})">Edit</button>
              <button class="rm-btn" onclick="deleteOption(${ci},${oi})">✕</button>
            </div>
          </div>`;
        }).join('')}`}`;
}

function openAddOptionModal(ci, existing, oi) {
  const o = existing || {};
  const ct = S.contracts[ci];
  // Default start = day after contract end
  const defaultStart = ct.endDate ? new Date(new Date(ct.endDate).getTime()+86400000).toISOString().split('T')[0] : '';
  const defaultEnd = defaultStart ? new Date(new Date(defaultStart).getTime()+365*86400000).toISOString().split('T')[0] : '';
  const defaultNotif = ct.endDate ? new Date(new Date(ct.endDate).getTime()-60*86400000).toISOString().split('T')[0] : '';
  const optNum = (ct.optionYears||[]).length + 1;

  openModal(existing?'Edit Option Year':'Add Option Year', `
    <div class="form-group"><label class="form-label">Label</label>
      <input class="form-input" id="optLabel" value="${esc(o.label||'Option Year '+optNum)}" placeholder="Option Year 1">
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Option Value ($)</label>
        <input class="form-input" type="number" id="optValue" value="${o.value||''}" placeholder="e.g. 224000">
      </div>
      <div class="form-group"><label class="form-label">Status</label>
        <select class="form-select" id="optStatus">
          <option value="pending" ${(o.status||'pending')==='pending'?'selected':''}>Pending</option>
          <option value="exercised" ${o.status==='exercised'?'selected':''}>Exercised</option>
          <option value="declined" ${o.status==='declined'?'selected':''}>Declined</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Start Date</label>
        <input class="form-input" type="date" id="optStart" value="${o.startDate||defaultStart}">
      </div>
      <div class="form-group"><label class="form-label">End Date</label>
        <input class="form-input" type="date" id="optEnd" value="${o.endDate||defaultEnd}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">CO Notification Deadline</label>
        <input class="form-input" type="date" id="optNotif" value="${o.notifDeadline||defaultNotif}">
        <div style="font-size:11px;color:var(--mist);margin-top:4px">Typically 60-90 days before option start. Check your contract clause.</div>
      </div>
      <div class="form-group"><label class="form-label">Exercised Date</label>
        <input class="form-input" type="date" id="optExDate" value="${o.exercisedDate||''}">
      </div>
    </div>
    <div class="form-group"><label class="form-label">Notes</label>
      <textarea class="form-textarea" id="optNotes" placeholder="CO conversation, modification number, any conditions…">${esc(o.notes||'')}</textarea>
    </div>`,
    `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveOption(${ci},${oi!==undefined?oi:'undefined'})">Save Option Year</button>`,
    true
  );
}

async function saveOption(ci, oi) {
  const ct = S.contracts[ci];
  if (!ct) return;
  if (!ct.optionYears) ct.optionYears = [];
  const opt = {
    label: v('optLabel')||'Option Year',
    value: parseFloat(v('optValue'))||0,
    status: v('optStatus')||'pending',
    startDate: v('optStart'),
    endDate: v('optEnd'),
    notifDeadline: v('optNotif'),
    exercisedDate: v('optExDate'),
    notes: v('optNotes')
  };
  if (oi !== undefined && oi !== 'undefined' && !isNaN(parseInt(oi))) {
    ct.optionYears[parseInt(oi)] = opt;
  } else {
    ct.optionYears.push(opt);
  }
  await save('Contracts');
  closeModal();
  toast('Option year saved ✓');
  // Refresh the options tab
  const body = document.getElementById('contractDetailBody');
  if (body) body.innerHTML = renderContractOptionsTab(ct, ci);
  renderContracts(document.getElementById('content'), document.getElementById('topbarActions'));
}

async function exerciseOption(ci, oi) {
  const ct = S.contracts[ci];
  if (!ct?.optionYears?.[oi]) return;
  ct.optionYears[oi].status = 'exercised';
  ct.optionYears[oi].exercisedDate = new Date().toISOString().split('T')[0];
  // Extend contract end date to option end date
  if (ct.optionYears[oi].endDate) {
    ct.endDate = ct.optionYears[oi].endDate;
    ct.status = 'active';
  }
  logActivity(`Option year exercised: ${ct.optionYears[oi].label} — ${ct.title}`, 'var(--green2)');
  await save('Contracts');
  toast(`${ct.optionYears[oi].label} exercised ✓ — contract end date extended`);
  const body = document.getElementById('contractDetailBody');
  if (body) body.innerHTML = renderContractOptionsTab(ct, ci);
  renderContracts(document.getElementById('content'), document.getElementById('topbarActions'));
}

async function declineOption(ci, oi) {
  if (!confirm('Mark this option year as declined? This will not affect the contract end date.')) return;
  const ct = S.contracts[ci];
  if (!ct?.optionYears?.[oi]) return;
  ct.optionYears[oi].status = 'declined';
  logActivity(`Option year declined: ${ct.optionYears[oi].label} — ${ct.title}`, 'var(--mist)');
  await save('Contracts');
  toast('Option year marked as declined');
  const body = document.getElementById('contractDetailBody');
  if (body) body.innerHTML = renderContractOptionsTab(ct, ci);
  renderContracts(document.getElementById('content'), document.getElementById('topbarActions'));
}

async function resetOption(ci, oi) {
  const ct = S.contracts[ci];
  if (!ct?.optionYears?.[oi]) return;
  ct.optionYears[oi].status = 'pending';
  ct.optionYears[oi].exercisedDate = '';
  await save('Contracts');
  toast('Option year reset to pending');
  const body = document.getElementById('contractDetailBody');
  if (body) body.innerHTML = renderContractOptionsTab(ct, ci);
}

async function deleteOption(ci, oi) {
  if (!confirm('Delete this option year?')) return;
  const ct = S.contracts[ci];
  if (!ct?.optionYears) return;
  ct.optionYears.splice(oi, 1);
  await save('Contracts');
  toast('Option year deleted');
  const body = document.getElementById('contractDetailBody');
  if (body) body.innerHTML = renderContractOptionsTab(ct, ci);
  renderContracts(document.getElementById('content'), document.getElementById('topbarActions'));
}

function editOption(ci, oi) {
  const ct = S.contracts[ci];
  if (!ct?.optionYears?.[oi]) return;
  openAddOptionModal(ci, ct.optionYears[oi], oi);
}

function renderWinLoss(c,ta){
  ta.innerHTML=`<button class="btn btn-primary btn-sm" onclick="openWLModal()">+ Log Bid</button>`;
  const won=S.winloss.filter(w=>w.outcome==='won').length;
  const lost=S.winloss.filter(w=>w.outcome==='lost').length;
  const total=won+lost;
  const rate=total>0?Math.round(won/total*100):0;
  const wonRev=S.winloss.filter(w=>w.outcome==='won').reduce((a,b)=>a+parseFloat(b.value||0),0);
  c.innerHTML=`
  <div class="grid4" style="margin-bottom:20px">
    <div class="kpi kpi-green"><div class="kpi-label">Won</div><div class="kpi-value">${won}</div></div>
    <div class="kpi kpi-amber"><div class="kpi-label">Lost</div><div class="kpi-value">${lost}</div></div>
    <div class="kpi kpi-blue"><div class="kpi-label">Win Rate</div><div class="kpi-value">${rate}%</div></div>
    <div class="kpi kpi-purple"><div class="kpi-label">Revenue Won</div><div class="kpi-value">$${fmt(wonRev)}</div></div>
  </div>
  ${S.winloss.length===0?'<div class="empty-state"><span class="empty-icon">🏆</span><div class="empty-title">No Bids Logged Yet</div><div class="empty-sub">Track every bid — won or lost — to build your pattern recognition over time.</div></div>':
  `<div class="card"><table class="table"><thead><tr><th>Opportunity</th><th>Agency</th><th>Value</th><th>Outcome</th><th>Reason</th><th>Date</th><th></th></tr></thead><tbody>
  ${S.winloss.map((w,i)=>`<tr><td>${esc(trunc(w.name||'',40))}</td><td class="muted" style="font-size:12px">${esc(trunc(w.agency||'',30))}</td><td class="mono amber">$${fmt(w.value||0)}</td><td><span class="badge badge-${w.outcome==='won'?'won':'lost'}">${w.outcome}</span></td><td class="muted" style="font-size:12px">${esc(trunc(w.reason||'',35))}</td><td class="mono muted" style="font-size:11px">${fmtDate(w.date)}</td><td><button class="rm-btn" onclick="deleteWL(${i})">✕</button></td></tr>`).join('')}</tbody></table></div>`}`;

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
      try {
        const d = JSON.parse(ev.target.result);
        if (d.pipeline) S.pipeline = d.pipeline;
        if (d.subs) S.subs = d.subs;
        if (d.quotes) S.quotes = d.quotes;
        if (d.invoices) S.invoices = d.invoices;
        if (d.agencies) S.agencies = d.agencies;
        if (d.winloss) S.winloss = d.winloss;
        if (d.subAssignments) S.subAssignments = d.subAssignments;
        if (d.contracts) S.contracts = d.contracts;
        if (d.govPayments) S.govPayments = d.govPayments;
        if (d.subPayments) S.subPayments = d.subPayments;
        if (d.settings) { S.settings.company = d.settings.company; S.settings.margin = d.settings.margin; }
        await save();
        updateBadges();
        nav(currentView);
        toast('Data imported and synced to Sheet ✓');
      } catch(e) { toast('Invalid JSON file', true); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function v(id){const el=document.getElementById(id);return el?el.value:'';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function trunc(s,n){s=String(s||'');return s.length>n?s.slice(0,n)+'…':s;}
function fmt(n){return parseFloat(n||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fmtDate(s){if(!s)return'—';try{return new Date(s).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch{return s;}}
function fmtDateTime(s){if(!s)return'—';try{const d=new Date(s);const hasTime=typeof s==='string'&&s.includes('T')&&!s.endsWith('T00:00:00')&&s.split('T')[1]&&!s.split('T')[1].startsWith('00:00');const dateStr=d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});if(hasTime){const timeStr=d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});return dateStr+' at '+timeStr;}const prev=new Date(d.getTime()-86400000);const prevStr=prev.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});return dateStr+' (by EOD '+prevStr+')';}catch{return s;}}
function isUrgent(s){if(!s)return false;const d=(new Date(s)-new Date())/86400000;return d>=0&&d<=7;}
function postedFrom(){const d=new Date();d.setMonth(d.getMonth()-3);return`${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}/${d.getFullYear()}`;}
function timeAgo(iso){const s=Math.floor((Date.now()-new Date(iso))/1000);if(s<60)return'just now';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago';}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function setQ(el){const ta=document.getElementById('aiQuery');if(ta){ta.value=el.textContent;autoResize(ta);}}
function toast(msg,isErr=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(isErr?' error':'');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}

// Drive Auth State
let driveAccessToken = null;
let driveTokenExpiry = 0;

function isDriveConnected() {
  return driveAccessToken && Date.now() < driveTokenExpiry;
}

function updateDriveStatus() {
  const btn = document.getElementById('driveAuthBtn');
  const status = document.getElementById('driveAuthStatus');
  if (!btn) return;
  if (isDriveConnected()) {
    btn.textContent = '✓ Drive Connected';
    btn.className = 'btn btn-ghost btn-sm';
    btn.style.color = 'var(--green2)';
    if (status) status.textContent = 'Authorized — ready to upload';
  } else {
    btn.textContent = 'Connect Google Drive';
    btn.className = 'btn btn-ghost btn-sm';
    btn.style.color = '';
    if (status) status.textContent = '';
  }
}

function initDriveAuth() {
  const clientId = S.settings.driveClientId || localStorage.getItem(DRIVE_CLIENT_ID_STORE);
  if (!clientId) {
    toast('Add your OAuth Client ID in Drive Settings first', true);
    return;
  }
  // Load Google Identity Services
  if (!window.google?.accounts?.oauth2) {
    const script = document.createElement('script');
    script.src = 'https://accounts.google.com/gsi/client';
    script.onload = () => doAuth(clientId);
    document.head.appendChild(script);
  } else {
    doAuth(clientId);
  }
}

function doAuth(clientId) {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: 'https://www.googleapis.com/auth/drive.file',
    callback: (resp) => {
      if (resp.error) { toast('Drive auth failed: ' + resp.error, true); return; }
      driveAccessToken = resp.access_token;
      driveTokenExpiry = Date.now() + (resp.expires_in * 1000);
      toast('Google Drive connected ✓');
      updateDriveStatus();
    }
  });
  client.requestAccessToken({ prompt: 'select_account', login_hint: 'cheimmarketing@gmail.com' });
}

// Get or create ERP folder in Drive
async function getDriveFolderId(subfolder) {
  const folderName = S.settings.driveFolderName || localStorage.getItem(DRIVE_FOLDER_STORE) || 'Ironwood ERP Attachments';
  const fullName = subfolder ? `${folderName}/${subfolder}` : folderName;

  // Search for existing folder
  const search = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=name='${encodeURIComponent(folderName)}' and mimeType='application/vnd.google-apps.folder' and trashed=false&fields=files(id,name)`,
    { headers: { Authorization: `Bearer ${driveAccessToken}` } }
  );
  const sd = await search.json();
  let parentId = sd.files?.[0]?.id;

  // Create parent folder if missing
  if (!parentId) {
    const create = await fetch('https://www.googleapis.com/drive/v3/files', {
      method: 'POST',
      headers: { Authorization: `Bearer ${driveAccessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: folderName, mimeType: 'application/vnd.google-apps.folder' })
    });
    const cd = await create.json();
    parentId = cd.id;
  }

  if (!subfolder) return parentId;

  // Search for subfolder
  const search2 = await fetch(
    `https://www.googleapis.com/drive/v3/files?q=name='${encodeURIComponent(subfolder)}' and '${parentId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false&fields=files(id)`,
    { headers: { Authorization: `Bearer ${driveAccessToken}` } }
  );
  const sd2 = await search2.json();
  if (sd2.files?.[0]?.id) return sd2.files[0].id;

  // Create subfolder
  const create2 = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { Authorization: `Bearer ${driveAccessToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ name: subfolder, mimeType: 'application/vnd.google-apps.folder', parents: [parentId] })
  });
  const cd2 = await create2.json();
  return cd2.id;
}

// Upload file to Drive
async function uploadToDrive(file, subfolder) {
  const folderId = await getDriveFolderId(subfolder);

  // Create metadata
  const metadata = { name: file.name, parents: [folderId] };
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(metadata)], { type: 'application/json' }));
  form.append('file', file);

  const res = await fetch(
    'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink',
    { method: 'POST', headers: { Authorization: `Bearer ${driveAccessToken}` }, body: form }
  );
  if (!res.ok) throw new Error(`Upload failed: ${res.status}`);
  return await res.json(); // { id, name, webViewLink }
}

// Delete file from Drive
async function deleteFromDrive(fileId) {
  if (!driveAccessToken) return;
  await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}`,
    { method: 'DELETE', headers: { Authorization: `Bearer ${driveAccessToken}` } }
  );
}

// Trigger file picker
function triggerAttachUpload(recordType, recordId) {
  if (!isDriveConnected()) {
    toast('Connect Google Drive in Settings first', true);
    return;
  }
  const input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.onchange = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    const btn = document.querySelector(`#attach-${recordType}-${recordId} .attach-upload-btn`);
    if (btn) { btn.textContent = '⏳ Uploading…'; btn.classList.add('attach-uploading'); btn.disabled = true; }
    try {
      for (const file of files) {
        const subfolder = recordType.charAt(0).toUpperCase() + recordType.slice(1);
        const result = await uploadToDrive(file, subfolder);
        const attach = {
          attachId: 'ATT-' + Date.now() + '-' + Math.random().toString(36).slice(2,6),
          recordType, recordId,
          fileName: result.name,
          fileType: file.type || '',
          driveFileId: result.id,
          driveUrl: result.webViewLink,
          uploadDate: new Date().toISOString().split('T')[0],
          uploadedBy: S.settings.company || 'Ironwood Solutions'
        };
        S.attachments.push(attach);
        logActivity(`Attached "${trunc(result.name,35)}" to ${recordType}`, 'var(--amber2)');
      }
      await save('Attachments');
      toast(`${files.length} file${files.length>1?'s':''} uploaded ✓`);
      refreshAttachSection(recordType, recordId);
    } catch(e) {
      toast('Upload failed: ' + e.message, true);
    } finally {
      if (btn) { btn.textContent = '⬆ Attach File'; btn.classList.remove('attach-uploading'); btn.disabled = false; }
    }
  };
  input.click();
}

async function deleteAttach(attachId, recordType, recordId) {
  if (!confirm('Remove this attachment?')) return;
  const att = S.attachments.find(a=>a.attachId===attachId);
  if (!att) return;
  // Try to delete from Drive if connected
  if (isDriveConnected() && att.driveFileId) {
    try { await deleteFromDrive(att.driveFileId); } catch(e) { /* file may be gone already */ }
  }
  S.attachments = S.attachments.filter(a=>a.attachId!==attachId);
  await save('Attachments');
  toast('Attachment removed');
  refreshAttachSection(recordType, recordId);
}

function refreshAttachSection(recordType, recordId) {
  const el = document.getElementById(`attach-${recordType}-${recordId}`);
  if (el) el.outerHTML = renderAttachSection(recordType, recordId);
  // Re-query after replacement since outerHTML swaps the element
  const newEl = document.getElementById(`attach-${recordType}-${recordId}`);
}

    for (const n of allNaics) {
      try {
        const url = `https://api.sam.gov/entity-information/v3/entities?api_key=${samKey}&naicsCode=${n}&stateOrProvinceCode=${state}&entityEFTIndicator=~&registrationStatus=A&purposeOfRegistrationCode=Z2&samRegistered=Yes&limit=10&offset=0`;
        const res = await fetch(url);
        if (!res.ok) continue;
        const data = await res.json();
        const entities = (data.entityData || []).map(e => ({ ...e, _searchNaics: n }));
        allEntities = allEntities.concat(entities);
      } catch(e) { /* skip this NAICS */ }
    }

    // Deduplicate by UEI
    const seen = new Set();
    allEntities = allEntities.filter(e => {
      const uei = e.entityRegistration?.ueiSAM;
      if (!uei || seen.has(uei)) return false;
      seen.add(uei);
      return true;
    });

    if (allEntities.length === 0) {
      resultsEl.innerHTML = `<div style="padding:12px;background:rgba(107,122,153,0.08);border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--mist)">No registered contractors found for NAICS ${naics} in ${state}. Try a neighboring state or check the NAICS code.</div>`;
      btn.disabled = false; btn.textContent = 'Search SAM.gov';
      return;
    }

    // Show initial results while AI enriches
    renderSubFinderResults(pid, allEntities, naics, scope, false);
    btn.disabled = false; btn.textContent = 'Search Again';

    // AI enrichment — analyze each entity for fit + competitor risk
    enrichSubFinderResults(pid, allEntities, naics, scope);

  } catch(e) {
    resultsEl.innerHTML = `<div style="padding:10px 14px;background:rgba(230,57,70,0.07);border:1px solid rgba(230,57,70,0.2);border-radius:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--red2)">Search failed: ${esc(e.message)}</div>`;
    btn.disabled = false; btn.textContent = 'Search SAM.gov';
  }
}

async function enrichSubFinderResults(pid, entities, primaryNaics, scope) {
  const opp = pid ? S.pipeline[pid] : null;

  for (let idx = 0; idx < entities.length; idx++) {
    const e = entities[idx];
    const reg = e.entityRegistration || {};
    const core = e.coreData || {};
    const name = reg.legalBusinessName || '';
    const uei = reg.ueiSAM || '';
    const city = core.physicalAddress?.city || '';
    const state = core.physicalAddress?.stateOrProvinceCode || '';
    const entityNaics = (e.assertions?.naicsCode?.naicsCode || []).map(n=>n.naicsCode).join(', ');
    const bizTypes = (reg.businessTypes?.businessTypeList || []).map(b=>b.businessTypeDesc).filter(Boolean).join(', ');
    const isPrimary = e._searchNaics === primaryNaics;

    const aiEl = document.getElementById(`sfai-${idx}`);
    const actionsEl = document.getElementById(`sfactions-${idx}`);
    if (!aiEl) continue;

    try {
      const prompt = `SAM.gov sub analysis. JSON only:
{"fitScore":<1-5>,"fitLabel":"<Excellent|Good|Fair|Poor> Sub Fit","competitorRisk":"<low|medium|high>","competitorNote":"<1 reason>","website":"<url or empty>","email":"<email or empty>","phone":"<phone or empty>","fitNote":"<1 sentence>"}

Sub: ${name} | ${city},${state} | NAICS:${entityNaics} | Types:${bizTypes}
${opp?`Opp: ${trunc(opp.title,60)} | ${opp.agency} | NAICS ${opp.naics}`:`Scope: ${trunc(scope,80)}`}`;

      const payload = encodeURIComponent(JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 200,
        messages: [{ role: 'user', content: prompt }]
      }));
      const rawSF = await callAI(prompt, 200);
      const result = JSON.parse(rawSF);

      // Check SAM.gov exclusions — debarred/suspended subs must be flagged
      let isExcluded = false;
      let exclusionNote = '';
      try {
        const samKey = S.settings.samKey || localStorage.getItem(SAM_KEY_STORE) || '';
        if (samKey && uei) {
          const exUrl = `https://api.sam.gov/exclusions/v1/search?api_key=${samKey}&ueiSAM=${uei}&status=Active&limit=1`;
          const exRes = await fetch(exUrl);
          if (exRes.ok) {
            const exData = await exRes.json();
            const hits = exData.totalRecords || exData.exclusionDetails?.length || 0;
            if (hits > 0) {
              isExcluded = true;
              const ex = exData.exclusionDetails?.[0] || {};
              exclusionNote = ex.exclusionType || 'Debarred/Suspended';
            }
          }
        }
      } catch(exErr) { /* exclusion check failed — proceed without */ }

      // Skip if no contact info found
      if (!result.email && !result.phone && !result.website) {
        if (aiEl) aiEl.innerHTML = `<span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)">No contact info found — skipped</span>`;
        if (actionsEl) actionsEl.style.display = 'none';
        document.getElementById(`sfcard-${idx}`)?.style.setProperty('opacity','0.4');
        continue;
      }

      const fitColors = { 5:'var(--green2)', 4:'var(--green2)', 3:'var(--amber2)', 2:'var(--mist)', 1:'var(--muted)' };
      const riskColors = { low:'var(--green2)', medium:'var(--amber2)', high:'var(--red2)' };
      const stars = '★'.repeat(result.fitScore||0) + '☆'.repeat(5-(result.fitScore||0));

      if (aiEl) aiEl.innerHTML = `
        ${isExcluded ? `<div style="padding:8px 12px;background:rgba(230,57,70,0.1);border:1px solid rgba(230,57,70,0.3);border-radius:6px;margin-bottom:8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--red2)">🚫 EXCLUDED FROM FEDERAL CONTRACTING — ${esc(exclusionNote)} — Do not use as subcontractor</div>` : ''}
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
          <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--amber);text-transform:uppercase;letter-spacing:0.1em">AI Analysis</span>
          <span style="font-family:'DM Mono',monospace;font-size:12px;color:${fitColors[result.fitScore]||'var(--mist)'}">${stars}</span>
          <span style="font-family:'DM Mono',monospace;font-size:10px;color:${fitColors[result.fitScore]||'var(--mist)'}">${esc(result.fitLabel||'')}</span>
          <span style="font-family:'DM Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;background:rgba(255,255,255,0.04);color:${riskColors[result.competitorRisk]||'var(--mist)'};border:1px solid ${riskColors[result.competitorRisk]||'var(--mist)'}22">
            ${result.competitorRisk==='high'?'⚠ ':''}Competitor Risk: ${result.competitorRisk||'unknown'}
          </span>
        </div>
        <div style="font-size:12px;color:var(--mist);line-height:1.5;margin-bottom:4px">${esc(result.fitNote||'')}</div>
        ${result.competitorNote?`<div style="font-size:11px;color:${riskColors[result.competitorRisk]||'var(--mist)'}">⚠ ${esc(result.competitorNote)}</div>`:''}
        <div style="margin-top:8px;display:flex;gap:16px;flex-wrap:wrap">
          ${result.website?`<span class="mono muted" style="font-size:11px">🌐 <a href="${esc(result.website)}" target="_blank" style="color:var(--amber2)">${esc(result.website)}</a></span>`:''}
          ${result.email?`<span class="mono muted" style="font-size:11px">✉️ ${esc(result.email)}</span>`:''}
          ${result.phone?`<span class="mono muted" style="font-size:11px">📞 ${esc(result.phone)}</span>`:''}
        </div>`;

      if (actionsEl) {
        actionsEl.style.display = 'flex';
        actionsEl.style.gap = '8px';
        actionsEl.style.flexWrap = 'wrap';
        actionsEl.innerHTML = `
          ${isExcluded
            ? `<span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--red2);padding:6px 10px;background:rgba(230,57,70,0.08);border:1px solid rgba(230,57,70,0.2);border-radius:4px">🚫 Cannot add — Excluded</span>`
            : `<button class="btn btn-primary btn-sm" onclick="addSubFromFinder(${idx},'${esc(name.replace(/'/g,"\'"))}','${esc(result.website||'')}','${esc(result.email||'')}','${esc(result.phone||'')}','${e._searchNaics}','${pid||''}')">
            + Add to Roster${pid?' & Quote':''}
          </button>`}
          <a class="btn btn-ghost btn-sm" href="https://www.sam.gov/entity/${uei}/core" target="_blank">View on SAM.gov ↗</a>`;
      }

    } catch(err) {
      if (aiEl) aiEl.innerHTML = `<span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)">Analysis unavailable</span>`;
    }
  }
}

async function addSubFromFinder(idx, name, website, email, phone, naics, pid) {
  // Check if already in roster
  const existing = S.subs.find(s=>s.name.toLowerCase()===name.toLowerCase());
  if (!existing) {
    const newSub = {
      name, trade: '', phone, email, naics,
      samStatus: 'Active', insExpiry: '', status: 'active',
      rating: 0, notes: `Added via Sub Finder. Website: ${website||'—'}`
    };
    S.subs.push(newSub);
    await save('Subcontractors');
    toast(`${trunc(name,30)} added to roster ✓`);
    logActivity(`Added sub from finder: ${trunc(name,35)}`, 'var(--blue2)');
  } else {
    toast(`${trunc(name,25)} already in roster`);
  }

  // Add sub quote to opportunity if we came from one
  if (pid && S.pipeline[pid]) {
    const alreadyQuoting = S.subAssignments.some(a=>a.oppId===pid&&a.subName===name);
    if (!alreadyQuoting) {
      const quote = {
        assignId: 'SA-' + Date.now(),
        oppId: pid, contractId: '', subName: name,
        scope: '', quotedAmount: 0, status: 'quoting',
        notes: 'Added via Sub Finder — contact for quote'
      };
      S.subAssignments.push(quote);
      await save('SubAssignments');
      toast(`Sub quote created for ${trunc(name,25)} — contact to get their number`);
      // Refresh the quotes tab
      oppTab(pid, 'quotes', null);
    } else {
      toast(`${trunc(name,25)} already has a quote on this opportunity`);
    }
  }

  // Update button to show added
  const actionsEl = document.getElementById(`sfactions-${idx}`);
  if (actionsEl) {
    const btn = actionsEl.querySelector('.btn-primary');
    if (btn) { btn.textContent = '✓ Added'; btn.disabled = true; btn.style.opacity='0.6'; }
  }

  // Refresh subcontractors if we're on that view
  if (currentView === 'subs') renderSubs(document.getElementById('content'), document.getElementById('topbarActions'));
}

async function searchSAMAwards(pid) {
  const p = S.pipeline[pid];
  if (!p) return;
  const samKey = S.settings.samKey || localStorage.getItem(SAM_KEY_STORE) || '';
  if (!samKey) { toast('SAM.gov API key required — go to Settings', true); return; }

  const resultEl = document.getElementById(`usaSpendingResults-${pid}`);
  const manualEl = document.getElementById(`prevManualEntry-${pid}`);
  if (!resultEl) return;

  resultEl.style.display = 'block';
  if (manualEl) manualEl.style.display = 'none';
  resultEl.innerHTML = `<div style="display:flex;align-items:center;gap:10px;padding:12px 0;font-family:'DM Mono',monospace;font-size:12px;color:var(--mist)"><div class="spinner" style="width:20px;height:20px;border-width:2px;flex-shrink:0"></div>Searching SAM.gov contract awards (NAICS: ${esc(p.naics||'')})</div>`;

  try {
    // Build params — route through proxy to avoid CORS, no duplicate limit
    const params = new URLSearchParams({
      token: SECRET, action: 'samgov', sheetUrl: SHEET_URL,
      samKey,
      naicsCode: p.naics || '',
      limit: 20,
      offset: 0,
      postedFrom: '01/01/2023',
      postedTo: `${String(new Date().getMonth()+1).padStart(2,'0')}/${String(new Date().getDate()).padStart(2,'0')}/${new Date().getFullYear()}`,
      noticeType: 'a'
    });

    const res = await fetch(`${API_URL}?${params}`);
    if (!res.ok) throw new Error(`Proxy ${res.status}`);
    const proxy = await res.json();
    if (proxy.error) throw new Error('SAM.gov: ' + proxy.error);
    const data = proxy.data || proxy;
    const opps = data.opportunitiesData || [];

    // Filter to awards (type = 'Award Notice')
    const awards = opps.filter(o => (o.type||'').toLowerCase().includes('award') || o.baseType === 'Award Notice');

    if (awards.length === 0) {
      // If no award notices, show all results as reference
      if (opps.length > 0) {
        renderSAMAwardResults(pid, opps.slice(0,8), p, true);
      } else {
        resultEl.innerHTML = `
          <div style="padding:10px 14px;background:rgba(107,122,153,0.08);border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--mist)">
            No recent award notices found for NAICS ${esc(p.naics||'')} on SAM.gov.
            <button class="btn btn-ghost btn-xs" style="margin-left:8px" onclick="searchUSASpending('${pid}')">Try USASpending.gov</button>
            <button class="btn btn-ghost btn-xs" style="margin-left:4px" onclick="showManualEntry('${pid}')">Enter manually</button>
          </div>`;
      }
    } else {
      renderSAMAwardResults(pid, awards.slice(0,8), p, false);
    }

  } catch(e) {
    resultEl.innerHTML = `
      <div style="padding:10px 14px;background:rgba(230,57,70,0.07);border:1px solid rgba(230,57,70,0.2);border-radius:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--red2)">
        SAM.gov search failed: ${esc(e.message)}
        <button class="btn btn-ghost btn-xs" style="margin-left:8px" onclick="searchUSASpending('${pid}')">Try USASpending.gov instead</button>
      </div>`;
  }
}

// ══ USASPENDING.GOV API ════════════════════════════════════════════════════════

async function searchUSASpending(pid) {
  const p = S.pipeline[pid];
  if (!p) return;

  const resultEl = document.getElementById(`usaSpendingResults-${pid}`);
  const manualEl = document.getElementById(`prevManualEntry-${pid}`);
  if (!resultEl) return;

  resultEl.style.display = 'block';
  if (manualEl) manualEl.style.display = 'none';
  resultEl.innerHTML = `<div style="display:flex;align-items:center;gap:10px;padding:12px 0;font-family:'DM Mono',monospace;font-size:12px;color:var(--mist)"><div class="spinner" style="width:20px;height:20px;border-width:2px;flex-shrink:0"></div>Searching USASpending.gov by NAICS ${esc(p.naics||'')}…</div>`;

  try {
    // Primary: search by NAICS code — most reliable since agency names vary
    // naics_codes per API spec: use NAICSCodeObject with require array of strings
    const naicsStr = p.naics ? String(p.naics).replace(/[^0-9]/g,'') : null;

    // Build filters
    const filters = { award_type_codes: ["A","B","C","D"] };
    if (naicsStr) filters.naics_codes = { require: [naicsStr] };

    // Log exact payload

    // Valid fields per API spec (spending_by_award contracts endpoint)
    const body = {
      filters,
      fields: [
        "Award ID","Recipient Name","Award Amount",
        "Awarding Agency","Awarding Sub Agency",
        "Start Date","End Date","Period of Performance Current End Date",
        "Description","NAICS","Contract Award Type",
        "Place of Performance State Code","Place of Performance Zip5",
        "Recipient Location","Primary Place of Performance"
      ],
      sort: "Award Amount",
      order: "desc",
      limit: 8,
      page: 1
    };

    const res = await fetch('https://api.usaspending.gov/api/v2/search/spending_by_award/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const errText = await res.text().catch(()=>'');
      throw new Error(`HTTP ${res.status} — ${errText.slice(0,200)}`);
    }

    const data = await res.json();
    const awards = data.results || [];

    if (awards.length === 0) {
      resultEl.innerHTML = `
        <div style="padding:10px 14px;background:rgba(107,122,153,0.08);border:1px solid var(--border);border-radius:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--mist)">
          No contracts found for NAICS ${esc(p.naics||'(none)')} on USASpending.gov.
          <button class="btn btn-ghost btn-xs" style="margin-left:8px" onclick="showManualEntry('${pid}')">Enter manually</button>
        </div>`;
      return;
    }

    // Show results first, then enrich with AI summaries
    renderUSASpendingResults(pid, awards, p);

  } catch(e) {
    resultEl.innerHTML = `
      <div style="padding:10px 14px;background:rgba(230,57,70,0.07);border:1px solid rgba(230,57,70,0.2);border-radius:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--red2)">
        Search failed: ${esc(e.message)}
        <button class="btn btn-ghost btn-xs" style="margin-left:8px" onclick="showManualEntry('${pid}')">Enter manually</button>
      </div>`;
  }
}

// ══ AI PROXY HELPER ═══════════════════════════════════════════════════════════
// Routes AI calls through Apps Script — uses GET to avoid CORS preflight
async function callAI(prompt, maxTokens=200, model='claude-haiku-4-5') {
  const payload = encodeURIComponent(JSON.stringify({
    model, max_tokens: maxTokens,
    messages: [{ role: 'user', content: prompt }]
  }));
  // Use no-cors mode first attempt won't work for reading response
  // Instead ensure URL stays under 8KB limit
  const url = `${API_URL}?token=${SECRET}&action=ai&sheetUrl=${encodeURIComponent(SHEET_URL)}&payload=${payload}`;
  const res = await fetch(url, { redirect: 'follow' });
  if (!res.ok) throw new Error(`AI proxy ${res.status}`);
  const d = await res.json();
  const text = d.content?.[0]?.text || d.text || '';
  if (!text || d.error) throw new Error(d.error?.message || 'No response');
  return text.replace(/```json|```/g,'').trim();
}

// ══ SECURE KEY MANAGEMENT ═════════════════════════════════════════════════════
// Keys fetched from Apps Script PropertiesService — never stored in Sheet or code

async function fetchSecureKeys() {
  try {
    const url = `${API_URL}?token=${SECRET}&action=getkeys&sheetUrl=${encodeURIComponent(SHEET_URL)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    if (d.samKey) {
      S.settings.samKey = d.samKey;
      localStorage.setItem(SAM_KEY_STORE, d.samKey);
    }
    if (d.driveClientId) {
      S.settings.driveClientId = d.driveClientId;
      localStorage.setItem(DRIVE_CLIENT_ID_STORE, d.driveClientId);
    }
    if (d.driveFolderName) {
      S.settings.driveFolderName = d.driveFolderName;
      localStorage.setItem(DRIVE_FOLDER_STORE, d.driveFolderName);
    }
    console.log('Secure keys loaded ✓');
    updateDriveStatus();
    updateBadges();
  } catch(e) {
    // Fall back to localStorage — this is normal if getkeys not yet in Apps Script
    console.log('Keys: using localStorage fallback (' + e.message + ')');
    S.settings.samKey = localStorage.getItem(SAM_KEY_STORE) || '';
    S.settings.driveClientId = localStorage.getItem(DRIVE_CLIENT_ID_STORE) || '';
    S.settings.driveFolderName = localStorage.getItem(DRIVE_FOLDER_STORE) || 'Ironwood ERP Attachments';
  }
}

async function saveSecureKey(keyName, value) {
  // Save key to Apps Script PropertiesService via a write action
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        token: SECRET,
        action: 'setkey',
        sheetUrl: SHEET_URL,
        key: keyName,
        value: value
      })
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    return true;
  } catch(e) {
    console.warn('Key save to Apps Script failed:', e.message);
    return false;
  }
}
